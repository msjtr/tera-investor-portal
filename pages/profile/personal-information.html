<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المعلومات الشخصية | Tera Investor Portal</title>
    
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <style>
        body { background-color: #f1f5f9; font-family: 'Tajawal', sans-serif; margin: 0; color: #334155; }
        
        .focused-header {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .page-subheader {
            background: #0A1B3F;
            padding: 40px 5% 60px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-subheader h1 { margin: 0; color: #ffffff; font-family: 'Cairo', sans-serif; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .btn-back { background: rgba(255,255,255,0.1); color: #ffffff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 700; }

        .content-container { max-width: 900px; margin: -40px auto 40px auto; padding: 0 20px; }
        
        .page-desc { background: #e0f2fe; color: #0369a1; padding: 20px; border-radius: 12px; border-right: 4px solid #028090; margin-bottom: 25px; }

        .panel-card { background: #ffffff; border-radius: 20px; padding: 35px; margin-bottom: 30px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .panel-header { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #f1f5f9; }
        .panel-header h3 { margin: 0; font-size: 18px; color: #0A1B3F; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .full-width { grid-column: 1 / -1; }
        
        .form-control { padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; transition: 0.3s; }
        .form-control:focus { border-color: #028090; outline: none; background: #f8fafc; }

        .upload-zone { border: 2px dashed #cbd5e1; border-radius: 15px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-zone:hover { border-color: #028090; background: #f0fdfa; }

        .btn-submit { background: #028090; color: #fff; padding: 18px; border-radius: 12px; font-weight: 800; width: 100%; border: none; cursor: pointer; font-size: 16px; }
        .btn-submit:hover { background: #0A1B3F; }
    </style>
</head>
<body>

    <header class="focused-header">
        <div class="logo"><img src="/images/logo.svg" alt="Tera Logo" height="40"></div>
        <div class="client-info"><h5>محمد عبدالله الشمري</h5></div>
    </header>

    <div class="page-subheader">
        <h1><i class="fas fa-user-shield"></i> المعلومات الشخصية</h1>
        <a href="/pages/dashboard/index.html" class="btn-back">العودة للوحة التحكم <i class="fas fa-arrow-left"></i></a>
    </div>

    <main class="content-container">
        <div class="page-desc">
            <i class="fas fa-info-circle"></i> يرجى إدخال بياناتك الشخصية كما هي مدونة في الهوية الرسمية.
        </div>

        <form id="personalInfoForm">
            <div class="panel-card">
                <div class="panel-header"><i class="fas fa-user-edit"></i><h3>البيانات الأساسية</h3></div>
                <div class="form-grid">
                    <div class="form-group full-width"><label>الاسم الكامل بالعربية</label><input type="text" class="form-control" required></div>
                    <div class="form-group full-width"><label>Full Name in English</label><input type="text" class="form-control" required></div>
                    <div class="form-group"><label>الجنسية</label><select class="form-control"><option>سعودي</option></select></div>
                    <div class="form-group"><label>نوع الهوية</label><select class="form-control" id="idType" onchange="handleIdTypeChange()"><option value="">اختر...</option><option value="national">هوية وطنية</option><option value="passport">جواز سفر</option></select></div>
                    <div class="form-group"><label>رقم الهوية</label><input type="text" class="form-control" id="idNumber"></div>
                </div>
            </div>

            <div class="panel-card" id="documentsCard" style="display: none;">
                <div class="panel-header"><i class="fas fa-file-upload"></i><h3>الوثائق المطلوبة</h3></div>
                <div id="dynamicUploadArea" class="form-grid"></div>
            </div>

            <button type="submit" class="btn-submit">حفظ ومتابعة الاعتماد</button>
        </form>
    </main>

    <script>
        function handleIdTypeChange() {
            const type = document.getElementById('idType').value;
            const docsCard = document.getElementById('documentsCard');
            const uploadArea = document.getElementById('dynamicUploadArea');
            if (!type) { docsCard.style.display = 'none'; return; }
            docsCard.style.display = 'block';
            uploadArea.innerHTML = `
                <div class="form-group"><label>صورة الوثيقة (أمام)</label><label class="upload-zone"><i class="fas fa-id-card"></i><input type="file" style="display:none;"></label></div>
                <div class="form-group"><label>صورة الوثيقة (خلف)</label><label class="upload-zone"><i class="fas fa-id-card"></i><input type="file" style="display:none;"></label></div>
            `;
        }
    </script>
</body>
</html>
