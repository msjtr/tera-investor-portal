<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المعلومات الشخصية | Tera Investor Portal</title>
    <!-- استيراد الخطوط والتنسيقات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <style>
        :root { --tera-teal: #028090; --tera-navy: #0A1B3F; --tera-bg: #f8fafc; --tera-gray: #64748b; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--tera-bg); color: #334155; padding: 20px; }
        .form-card { background: #fff; padding: 30px; border-radius: 16px; border: 1px solid #e2e8f0; max-width: 900px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .section-title { font-family: 'Cairo'; color: var(--tera-navy); margin-bottom: 25px; border-bottom: 2px solid var(--tera-bg); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--tera-navy); font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--tera-teal); ring: 2px solid rgba(2, 128, 144, 0.2); }
        
        .upload-box { border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 12px; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .upload-box:hover { border-color: var(--tera-teal); background: #f0fdfa; }
        
        .btn-submit { background: var(--tera-teal); color: #fff; padding: 14px 30px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 16px; }
        
        .attachments-section { display: none; margin-top: 20px; padding: 20px; background: var(--tera-bg); border-radius: 12px; }
        .otp-section { display: none; margin-top: 20px; padding: 20px; border: 1px solid var(--tera-teal); border-radius: 12px; }
    </style>
</head>
<body>

<div class="form-card">
    <h2 class="section-title"><i class="fas fa-user-edit"></i> المعلومات الشخصية</h2>
    
    <form id="personalInfoForm">
        <div class="form-group">
            <label>الاسم الكامل بالعربية *</label>
            <input type="text" id="nameAr" pattern="^[\u0600-\u06FF\s]+$" placeholder="مثال: محمد بن عبدالله الشمري" required oninput="validateArabic(this)">
        </div>

        <div class="form-group">
            <label>Full Name in English *</label>
            <input type="text" id="nameEn" pattern="^[A-Za-z\s]+$" placeholder="Example: Mohammed Abdullah Alshammari" required oninput="validateEnglish(this)">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>الجنسية *</label>
                <select required><option>سعودي</option><option>أخرى</option></select>
            </div>
            <div class="form-group">
                <label>نوع الهوية *</label>
                <select id="idType" required onchange="handleIdTypeChange()">
                    <option value="">اختر نوع الهوية...</option>
                    <option value="national">هوية وطنية</option>
                    <option value="residency">هوية مقيم</option>
                    <option value="gcc">هوية خليجية</option>
                    <option value="arab">هوية عربية</option>
                    <option value="passport">جواز سفر</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>رقم الهوية / الإقامة / الجواز *</label>
            <input type="text" id="idNumber" required placeholder="أدخل الرقم هنا...">
        </div>

        <!-- المرفقات الديناميكية -->
        <div id="attachmentsSection" class="attachments-section">
            <label id="fileLabel">المرفقات المطلوبة</label>
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>اضغط لرفع الملفات (الأمام والخلف)</p>
                <input type="file" id="fileInput" multiple style="display: none;">
            </div>
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <input type="checkbox" id="declaration" required> 
            <label style="display: inline;" for="declaration">أقر بأن الاسم مطابق للهوية، وأن جميع البيانات والمرفقات صحيحة.</label>
        </div>

        <button type="button" class="btn-submit" onclick="showOtp()">حفظ ومتابعة للتحقق</button>
    </form>

    <!-- قسم التحقق OTP -->
    <div id="otpSection" class="otp-section">
        <label>أدخل رمز التحقق المرسل لهاتفك</label>
        <input type="text" placeholder="0000" maxlength="4" style="text-align: center; font-size: 20px; letter-spacing: 10px;">
        <button class="btn-submit" style="margin-top: 10px;" onclick="alert('تم التحقق بنجاح!')">اعتماد البيانات</button>
    </div>
</div>

<script>
    // 1. التحقق من النصوص العربية
    function validateArabic(input) {
        input.value = input.value.replace(/[^ \u0600-\u06FF]/g, '');
    }

    // 2. التحقق من النصوص الإنجليزية
    function validateEnglish(input) {
        input.value = input.value.replace(/[^a-zA-Z\s]/g, '');
    }

    // 3. إدارة المرفقات بناءً على نوع الهوية
    function handleIdTypeChange() {
        const type = document.getElementById('idType').value;
        const section = document.getElementById('attachmentsSection');
        const label = document.getElementById('fileLabel');
        
        if (type) {
            section.style.display = 'block';
            label.innerText = type === 'passport' ? 'يرجى رفع صفحة الجواز الأولى' : 'يرجى رفع صورة الهوية (الأمام والخلف)';
        } else {
            section.style.display = 'none';
        }
    }

    // 4. إظهار قسم الـ OTP
    function showOtp() {
        if(document.getElementById('personalInfoForm').checkValidity()){
            document.getElementById('otpSection').style.display = 'block';
        } else {
            alert('يرجى تعبئة كافة الحقول المطلوبة بشكل صحيح.');
        }
    }
</script>

</body>
</html>
