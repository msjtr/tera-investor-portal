<div class="card profile-card" style="max-width: 800px; margin: 2rem auto;">
    <div class="card-header">
        <h3><i class="fas fa-user-circle" style="margin-left: 10px; color: var(--primary-color);"></i>المعلومات الشخصية</h3>
    </div>
    <div class="card-body">
        <form id="profileForm" novalidate>
            <div class="form-row">
                <!-- الاسم الكامل -->
                <div class="form-group">
                    <label for="fullName" class="form-label">الاسم الكامل <span class="required">*</span></label>
                    <input type="text" id="fullName" name="fullName" class="form-control" value="أحمد محمد" required>
                </div>
                <!-- رقم الهوية -->
                <div class="form-group">
                    <label for="idNumber" class="form-label">رقم الهوية <span class="required">*</span></label>
                    <input type="text" id="idNumber" name="idNumber" class="form-control" value="1234567890" required>
                </div>
                <!-- الجنسية -->
                <div class="form-group">
                    <label for="nationality" class="form-label">الجنسية</label>
                    <input type="text" id="nationality" name="nationality" class="form-control" value="سعودي">
                </div>
                <!-- تاريخ الميلاد -->
                <div class="form-group">
                    <label for="birthDate" class="form-label">تاريخ الميلاد</label>
                    <input type="date" id="birthDate" name="birthDate" class="form-control" value="1985-05-15">
                </div>
            </div>

            <!-- حالة التحقق -->
            <div class="verification-status">
                <span class="badge status-active"><i class="fas fa-check-circle"></i> موثق</span>
                <span class="status-text">تم التحقق من الهوية</span>
            </div>

            <!-- أزرار الإجراء -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> حفظ التغييرات
                </button>
                <button type="reset" class="btn btn-secondary">
                    <i class="fas fa-undo"></i> إلغاء
                </button>
            </div>
        </form>
    </div>
</div>
