<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>المصادقة الثنائية | تيرا</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="apple-touch-icon" href="/images/share-thumb.png">

    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- أيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ملفات CSS الأساسية -->
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/responsive.css">
    <link rel="stylesheet" href="/assets/css/security.css">

    <style>
        :root {
            --primary: #028090;
            --primary-dark: #0A1B3F;
            --danger: #dc2626;
            --success: #10b981;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #d1d9e6;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gray-900: #0A1B3F;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--gray-50);
            margin: 0;
            color: var(--gray-900);
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }

        .page-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .page-subheader {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }
        .page-subheader h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }
        .btn-back {
            background: var(--gray-100);
            color: var(--gray-700);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
            font-size: 14px;
        }
        .btn-back:hover { background: var(--gray-200); }

        .card {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 24px 26px;
            border: 1px solid var(--gray-200);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-action:hover { background: #016f7a; transform: translateY(-1px); }
        .btn-action.danger { background: var(--danger); }
        .btn-action.danger:hover { background: #b91c1c; }

        .form-input-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-size: 22px;
            font-family: inherit;
            transition: border-color 0.3s;
            background: var(--gray-50);
            color: var(--gray-900);
            text-align: center;
            letter-spacing: 6px;
            max-width: 160px;
        }
        .form-input-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(2,128,144,0.1);
            background: #fff;
            outline: none;
        }

        .totp-card h4 {
            font-size: 18px;
            color: var(--primary-dark);
            margin: 0 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .totp-card h4 i { color: var(--primary); font-size: 22px; }

        .setup-box {
            background: #f0fdf4;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #bbf7d0;
            margin-top: 16px;
        }
        .setup-box p { margin: 0 0 8px; }
        .setup-box code {
            background: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 14px;
            word-break: break-all;
        }

        @media (max-width: 480px) {
            .page-subheader h1 { font-size: 20px; }
            .card { padding: 18px; }
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header class="focused-header no-print">
        <div class="logo"><img src="/images/logo.svg" alt="تيرا"></div>
        <div class="client-info">
            <h5 id="headerUserName">مستخدم</h5>
            <div class="avatar" id="headerAvatar">م</div>
        </div>
    </header>

    <!-- عنوان الصفحة -->
    <div class="page-subheader no-print">
        <h1><i class="fas fa-shield-alt"></i> المصادقة الثنائية</h1>
        <a href="/pages/dashboard/index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> العودة للوحة التحكم
        </a>
    </div>

    <!-- المحتوى الرئيسي -->
    <main class="page-container">
        <div class="card">
            <div id="totp-container">
                <p style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin"></i> جاري تحميل إعدادات المصادقة...</p>
            </div>
        </div>
    </main>

    <footer class="page-footer no-print">
        © 2026 بوابة تيرا للمستثمرين. جميع الحقوق محفوظة.
    </footer>

    <!-- السكربتات الأساسية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>

    <!-- وحدات النظام -->
    <script src="/assets/js/modules/ui-helpers.js"></script>
    <script src="/assets/js/modules/activity-tracker.js"></script>
    <script src="/assets/js/modules/session-manager.js"></script>

    <!-- سكربت المصادقة الثنائية -->
    <script src="/assets/js/security-two-factor-authentication.js"></script>

    <!-- بدء تشغيل الواجهة (مع requireAuth) -->
    <script>
        (async function() {
            // التحقق من صلاحية الجلسة – إذا كانت غير صالحة سيتم توجيه المستخدم إلى صفحة الدخول
            const user = await window.Auth?.requireAuth();
            if (!user) return; // تم توجيه المستخدم بالفعل

            // تحديث الهيدر
            const name = user.user_metadata?.full_name || user.email || 'مستخدم';
            document.getElementById('headerUserName').textContent = name;
            document.getElementById('headerAvatar').textContent = name.charAt(0).toUpperCase();

            // بدء حماية الجلسة
            const sessionId = sessionStorage.getItem('currentSessionId');
            if (window.SessionManager?.startSessionGuard && sessionId) {
                window.SessionManager.startSessionGuard(user.id, sessionId);
            }

            // بدء واجهة 2FA
            if (window.TwoFactorAuth) {
                window.TwoFactorAuth.render('totp-container');
            } else {
                document.getElementById('totp-container').innerHTML = '<p style="color:var(--danger);">تعذر تحميل وحدة المصادقة الثنائية.</p>';
            }
        })();
    </script>
</body>
</html>
