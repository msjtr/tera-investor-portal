<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>المصادقة الثنائية | تيرا</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="apple-touch-icon" href="/images/share-thumb.png">

    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- أيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ملفات CSS الأساسية (قد تُترك للتوافق) -->
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/responsive.css">
    <link rel="stylesheet" href="/assets/css/security.css">

    <!-- ========== تنسيق خاص إضافي للصفحة (يغطي جميع الاحتياجات) ========== -->
    <style>
        :root {
            --primary: #028090;
            --primary-dark: #0A1B3F;
            --danger: #dc2626;
            --success: #10b981;
            --warning: #f59e0b;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #d1d9e6;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0A1B3F;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --transition: 0.2s ease;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--gray-50);
            margin: 0;
            color: var(--gray-900);
            line-height: 1.7;
            min-height: 100vh;
        }

        .page-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* رأس الصفحة */
        .page-subheader {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
        }
        .page-subheader h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }
        .page-subheader h1 i { color: var(--primary); font-size: 28px; }
        .btn-back {
            background: var(--gray-100);
            color: var(--gray-700);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition);
            font-size: 14px;
            border: 1px solid var(--gray-200);
        }
        .btn-back:hover { background: var(--gray-200); color: var(--gray-900); }

        /* البطاقات */
        .card {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 24px 26px;
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-900);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header h3 i { color: var(--primary); font-size: 20px; width: 24px; text-align: center; }

        /* شارة الحالة */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
        }
        .status-badge.active { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .status-badge.inactive { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-dot.green { background: var(--success); }
        .status-dot.gray { background: var(--gray-400); }

        /* شبكة المعلومات */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
        .info-item { background: var(--gray-50); border-radius: var(--radius-md); padding: 14px 16px; border: 1px solid var(--gray-200); }
        .info-item .info-label { font-size: 12px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .info-item .info-value { font-size: 15px; font-weight: 700; color: var(--gray-900); word-break: break-word; }

        /* الأزرار */
        .btn {
            padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 700;
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
            transition: all var(--transition); border: 2px solid transparent;
            font-family: inherit; text-decoration: none;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #016f7a; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-outline { background: #fff; color: var(--gray-700); border-color: var(--gray-300); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: #f0fdfa; }
        .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 14px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; }

        /* النافذة المنبثقة */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(10,27,63,0.7);
            backdrop-filter: blur(6px); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: #fff; border-radius: var(--radius-xl);
            padding: 32px 28px; max-width: 520px; width: 100%;
            box-shadow: var(--shadow-lg); text-align: center;
            animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal h3 { font-size: 22px; margin: 0 0 16px; color: var(--gray-900); }
        .modal p { color: var(--gray-600); margin: 0 0 16px; font-size: 14px; }

        .qr-wrapper {
            display: inline-flex; background: #fff; padding: 20px;
            border: 2px solid var(--gray-200); border-radius: var(--radius-lg);
            margin: 16px auto;
        }
        .qr-wrapper img { max-width: 200px; height: auto; display: block; }

        .manual-key-box {
            background: var(--gray-50); border: 1px solid var(--gray-200);
            border-radius: var(--radius-md); padding: 12px; margin: 16px 0;
            display: flex; align-items: center; gap: 8px; word-break: break-all;
        }
        .manual-key-box span { flex: 1; font-family: monospace; font-size: 14px; direction: ltr; text-align: left; }
        .btn-copy { background: var(--gray-200); border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

        .form-input-control {
            width: 100%; padding: 14px; border: 2px solid var(--gray-200);
            border-radius: var(--radius-md); font-size: 22px; text-align: center;
            letter-spacing: 8px; max-width: 180px; margin: 16px auto; display: block;
        }
        .form-input-control:focus {
            border-color: var(--primary); box-shadow: 0 0 0 4px rgba(2,128,144,0.1);
            background: #fff; outline: none;
        }

        /* رموز الاسترداد */
        .backup-codes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .backup-code {
            background: var(--gray-50);
            padding: 12px 10px;
            border-radius: var(--radius-sm);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-align: center;
            border: 1px solid var(--gray-200);
            color: var(--gray-800);
            letter-spacing: 1px;
            user-select: all;
            cursor: text;
            word-break: break-all;
        }

        /* تفضيلات الإشعارات */
        .notification-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-100);
            gap: 12px;
        }
        .notification-toggle:last-child { border-bottom: none; }
        .notification-toggle span {
            font-size: 14px;
            color: var(--gray-700);
            font-weight: 500;
        }
        .toggle-switch { position: relative; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--gray-300); border-radius: 24px; transition: var(--transition); }
        .toggle-slider::before { content: ""; position: absolute; height: 18px; width: 18px; right: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: var(--transition); }
        .toggle-switch input:checked + .toggle-slider { background: var(--primary); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

        /* التنبيهات (Toast) */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--gray-900); color: #fff; padding: 12px 24px;
            border-radius: 24px; font-weight: 600; font-size: 14px; z-index: 2000;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
        }
        .toast.success { background: #065f46; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(-50%) translateY(20px); } }

        /* الخطوات التعليمية */
        .steps-container { margin-top: 8px; }
        .step { display: flex; gap: 14px; margin-bottom: 20px; }
        .step-number {
            width: 32px; height: 32px; background: var(--primary); color: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px; flex-shrink: 0; margin-top: 2px;
        }
        .step-content { flex: 1; }
        .step-content strong { display: block; margin-bottom: 4px; color: var(--gray-900); }
        .step-content p { margin: 0; color: var(--gray-600); font-size: 14px; }
        .app-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

        /* الملاحظات المهمة */
        .important-notes {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: var(--radius-md);
            padding: 16px 18px;
            margin-top: 20px;
            font-size: 14px;
            color: var(--gray-700);
        }
        .important-notes strong { color: var(--gray-800); }
        .important-notes ul {
            margin: 10px 0 0 16px;
            padding: 0;
            list-style-type: disc;
        }
        .important-notes ul li {
            margin-bottom: 6px;
            line-height: 1.6;
        }

        /* شاشة التحميل */
        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--gray-500);
        }

        /* تجاوب الشاشات */
        @media (max-width: 600px) {
            .page-subheader h1 { font-size: 20px; }
            .card { padding: 16px; }
            .info-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .backup-codes-grid { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .modal { padding: 24px 18px; }
            .qr-wrapper img { max-width: 150px; }
        }
        @media (max-width: 400px) {
            .info-grid { grid-template-columns: 1fr; }
        }

        /* طباعة */
        @media print {
            .no-print { display: none !important; }
            body { background: #fff; }
            .card { box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

    <header class="focused-header no-print">
        <div class="logo"><img src="/images/logo.svg" alt="تيرا"></div>
        <div class="client-info">
            <h5 id="headerUserName">مستخدم</h5>
            <div class="avatar" id="headerAvatar">م</div>
        </div>
    </header>

    <div class="page-subheader no-print">
        <h1><i class="fas fa-shield-alt"></i> المصادقة الثنائية</h1>
        <a href="/pages/dashboard/index.html" class="btn-back">
            <i class="fas fa-arrow-right"></i> العودة للوحة التحكم
        </a>
    </div>

    <main class="page-container" id="main-content">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-pulse"></i>
            <span>جاري تحميل إعدادات المصادقة...</span>
        </div>
    </main>

    <div id="modal-container"></div>
    <div id="toast-container"></div>

    <footer class="page-footer no-print">
        © 2026 بوابة تيرا للمستثمرين. جميع الحقوق محفوظة.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/modules/ui-helpers.js"></script>
    <script src="/assets/js/modules/activity-tracker.js"></script>
    <script src="/assets/js/modules/session-manager.js"></script>
    <script src="/assets/js/security-two-factor-authentication.js"></script>
</body>
</html>
