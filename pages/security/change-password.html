<section class="security-section glass-panel">
    <div class="section-header">
        <h1>تغيير كلمة المرور</h1>
        <p>تأكد من اختيار كلمة مرور قوية لحماية حسابك الاستثماري.</p>
    </div>

    <form id="changePasswordForm" class="security-form">
        <div class="form-group">
            <label for="currentPassword">كلمة المرور الحالية</label>
            <input type="password" id="currentPassword" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="newPassword">كلمة المرور الجديدة</label>
            <input type="password" id="newPassword" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="confirmPassword">تأكيد كلمة المرور الجديدة</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-action btn-login">
            <i class="fa-solid fa-save"></i> حفظ التغييرات
        </button>
    </form>
</section>

<style>
    .security-section { padding: 40px; max-width: 500px; margin: 20px auto; }
    .section-header { margin-bottom: 30px; }
    .section-header h1 { color: var(--tera-navy); font-size: 22px; margin-bottom: 10px; }
    .section-header p { color: #64748b; font-size: 14px; }
    
    .security-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 14px; font-weight: 600; color: #334155; }
    .form-group input { 
        padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; 
        font-size: 16px; outline: none; transition: 0.3s;
    }
    .form-group input:focus { border-color: var(--tera-teal); box-shadow: 0 0 0 3px rgba(2, 128, 144, 0.1); }
    .btn-action { cursor: pointer; width: 100%; border: none; }
</style>

<script>
    document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;

        if (newPass !== confirmPass) {
            alert('❌ كلمة المرور الجديدة وتأكيدها غير متطابقين!');
            return;
        }

        // هنا يتم إضافة اتصال الـ API الخاص بك
        alert('✅ تم تحديث كلمة المرور بنجاح.');
        this.reset();
    });
</script>
