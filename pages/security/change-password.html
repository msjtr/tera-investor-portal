<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تغيير كلمة المرور | TERA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="/assets/css/core.css" />
    <link rel="stylesheet" href="/assets/css/app.css" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    
    <link rel="stylesheet" href="/assets/css/security.css" />
</head>
<body class="bg-white">
    
    <div data-include="/components/loader.html"></div>

    <div class="app-wrapper">
        <main class="main-content" style="margin-right: 0;">
            
            <div data-include="/components/header.html"></div>

            <div data-include="/components/logo.html"></div>

            <div class="container page-container">
                
                <div data-include="/components/breadcrumb.html" data-current-page="تغيير كلمة المرور" data-parent="الأمان"></div>

                <div class="page-header-text">
                    <h1 class="page-title text-primary font-cairo">تغيير كلمة المرور</h1>
                    <p class="page-desc">يرجى إدخال كلمة المرور الحالية، ثم تعيين كلمة مرور جديدة قوية لضمان حماية حسابك.</p>
                </div>

                <div class="card security-form-card">
                    <form id="changePasswordForm" class="tera-form" novalidate>
                        
                        <div class="form-group">
                            <label class="form-label text-primary font-cairo">كلمة المرور الحالية <span class="text-danger">*</span></label>
                            <div class="input-icon-wrapper">
                                <input type="password" id="currentPassword" class="form-control font-inter" required />
                                <button type="button" class="btn-toggle-password" data-target="currentPassword" tabindex="-1">
                                    <i data-lucide="eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label text-primary font-cairo">كلمة المرور الجديدة <span class="text-danger">*</span></label>
                            <div class="input-icon-wrapper">
                                <input type="password" id="newPassword" class="form-control font-inter" required />
                                <button type="button" class="btn-toggle-password" data-target="newPassword" tabindex="-1">
                                    <i data-lucide="eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label text-primary font-cairo">تأكيد كلمة المرور الجديدة <span class="text-danger">*</span></label>
                            <div class="input-icon-wrapper">
                                <input type="password" id="confirmPassword" class="form-control font-inter" required />
                                <button type="button" class="btn-toggle-password" data-target="confirmPassword" tabindex="-1">
                                    <i data-lucide="eye"></i>
                                </button>
                            </div>
                            <span class="input-error-msg text-danger font-cairo" id="passwordMatchError" style="display: none;">كلمتا المرور غير متطابقتين.</span>
                        </div>

                        <div class="password-requirements bg-secondary-light">
                            <h4 class="req-title text-primary font-cairo"><i data-lucide="shield-check"></i> شروط كلمة المرور:</h4>
                            <ul class="req-list">
                                <li id="req-length" class="req-item text-muted"><i data-lucide="x-circle" class="icon-danger"></i> 8 أحرف على الأقل</li>
                                <li id="req-upper" class="req-item text-muted"><i data-lucide="x-circle" class="icon-danger"></i> حرف كبير واحد (A-Z)</li>
                                <li id="req-number" class="req-item text-muted"><i data-lucide="x-circle" class="icon-danger"></i> رقم واحد على الأقل (0-9)</li>
                                <li id="req-special" class="req-item text-muted"><i data-lucide="x-circle" class="icon-danger"></i> رمز خاص واحد (!@#$%^&*)</li>
                            </ul>
                        </div>

                        <div class="form-actions mt-4">
                            <button type="submit" class="btn btn-block btn-gradient font-cairo" id="submitBtn" disabled>
                                تحديث كلمة المرور
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div data-include="/components/footer.html"></div>

            <div data-include="/components/modals.html"></div>

        </main>
    </div>

    <script src="/assets/js/core.js"></script>
    <script src="/assets/js/main.js"></script>
    
    <script src="/assets/js/security.js"></script>
    
    <script>
        lucide.createIcons();
        // دالة مساعدة لتنفيذ الاستدعاء (Include) للمكونات برمجياً أثناء تطوير الواجهات
        document.querySelectorAll('[data-include]').forEach(async (el) => {
            const file = el.getAttribute('data-include');
            try {
                const response = await fetch(file);
                if (response.ok) {
                    el.outerHTML = await response.text();
                    lucide.createIcons(); // إعادة تهيئة الأيقونات بعد جلب المكون
                }
            } catch (error) {
                console.error(`خطأ في استدعاء المكون: ${file}`);
            }
        });
    </script>
</body>
</html>
