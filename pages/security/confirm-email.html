<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد البريد الإلكتروني | Tera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #334155;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        .success { color: #10b981; }
        .info { color: #0ea5e9; }
        .message { font-size: 18px; font-weight: 700; margin-bottom: 16px; line-height: 1.6; color: #0A1B3F; }
        .sub-message { font-size: 14px; color: #64748b; margin-bottom: 30px; }
        .btn {
            background: #028090;
            color: #fff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-block;
            margin: 5px;
            transition: background 0.2s;
        }
        .btn:hover { background: #0A1B3F; }
    </style>
</head>
<body>
    <div class="card">
        <div id="statusIcon" class="icon"><i class="fas fa-spinner fa-pulse"></i></div>
        <div id="message" class="message">جاري متابعة تأكيد البريد...</div>
        <div id="subMessage" class="sub-message">يرجى الانتظار قليلاً</div>
        <div id="buttonsContainer" style="margin-top: 20px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script>
        (async function() {
            const statusIcon = document.getElementById('statusIcon');
            const message = document.getElementById('message');
            const subMessage = document.getElementById('subMessage');
            const buttonsContainer = document.getElementById('buttonsContainer');

            // انتظار Supabase (اختياري)
            if (!window.teraSupabase) {
                try {
                    if (typeof waitForSupabase === 'function') {
                        await waitForSupabase();
                    } else {
                        await new Promise((resolve, reject) => {
                            const timeout = setTimeout(() => reject(new Error('timeout')), 10000);
                            document.addEventListener('supabase:ready', e => { clearTimeout(timeout); resolve(e.detail.client); }, { once: true });
                            document.addEventListener('supabase:error', () => { clearTimeout(timeout); reject(new Error('error')); }, { once: true });
                        });
                    }
                } catch (e) {
                    showMessage('info', 'تعذر الاتصال. يرجى المحاولة لاحقاً.');
                    return;
                }
            }

            const supabase = window.teraSupabase;
            let resolved = false;

            // مستمع أحداث المصادقة – الطريقة الرسمية
            const { data: { subscription } } = supabase.auth.onAuthStateChange(
                (event, session) => {
                    // إذا تم حل الصفحة مسبقاً، لا نفعل شيئاً
                    if (resolved) return;

                    // أي حدث يؤدي إلى وجود جلسة مستخدم يعتبر نجاحاً
                    if (session && session.user) {
                        resolved = true;
                        subscription.unsubscribe();

                        statusIcon.innerHTML = '<i class="fas fa-check-circle success"></i>';
                        message.textContent = 'تم تأكيد البريد الإلكتروني بنجاح.';
                        subMessage.textContent = 'يمكنك الآن المتابعة.';

                        const btn = document.createElement('a');
                        btn.href = '/pages/dashboard/index.html';
                        btn.className = 'btn';
                        btn.textContent = 'العودة للوحة التحكم';
                        buttonsContainer.appendChild(btn);
                    }
                }
            );

            // بعد 5 ثوانٍ، إذا لم تصل أي جلسة، نظهر رسالة محايدة (ليس خطأ)
            setTimeout(() => {
                if (!resolved) {
                    resolved = true;
                    subscription.unsubscribe();

                    statusIcon.innerHTML = '<i class="fas fa-info-circle info"></i>';
                    message.textContent = 'تم تأكيد البريد الإلكتروني.';
                    subMessage.textContent = 'يرجى تسجيل الدخول مرة أخرى لإكمال العملية.';

                    const loginBtn = document.createElement('a');
                    loginBtn.href = '/auth/auth/login/login.html';
                    loginBtn.className = 'btn';
                    loginBtn.textContent = 'تسجيل الدخول';
                    buttonsContainer.appendChild(loginBtn);

                    const dashboardBtn = document.createElement('a');
                    dashboardBtn.href = '/pages/dashboard/index.html';
                    dashboardBtn.className = 'btn';
                    dashboardBtn.style.background = '#fff';
                    dashboardBtn.style.color = '#028090';
                    dashboardBtn.style.border = '2px solid #028090';
                    dashboardBtn.textContent = 'العودة للوحة التحكم';
                    buttonsContainer.appendChild(dashboardBtn);
                }
            }, 5000);

            function showMessage(iconClass, msg) {
                statusIcon.innerHTML = '<i class="fas fa-info-circle info"></i>';
                message.textContent = msg;
                subMessage.textContent = '';
            }
        })();
    </script>
</body>
</html>
