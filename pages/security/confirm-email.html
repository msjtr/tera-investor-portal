<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد البريد الإلكتروني | Tera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #334155;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .message { font-size: 18px; font-weight: 700; margin-bottom: 16px; line-height: 1.6; color: #0A1B3F; }
        .sub-message { font-size: 14px; color: #64748b; margin-bottom: 30px; }
        .btn {
            background: #028090;
            color: #fff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-block;
            transition: background 0.2s;
            margin: 5px;
        }
        .btn:hover { background: #0A1B3F; }
        .btn-outline {
            background: #fff;
            color: #028090;
            border: 2px solid #028090;
        }
        .btn-outline:hover { background: #028090; color: #fff; }
        .note {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            padding: 14px;
            border-radius: 10px;
            font-size: 13px;
            color: #92400e;
            margin-top: 20px;
            text-align: right;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="statusIcon" class="icon"><i class="fas fa-spinner fa-pulse"></i></div>
        <div id="message" class="message">جاري معالجة رابط التأكيد...</div>
        <div id="subMessage" class="sub-message">يرجى الانتظار قليلاً</div>
        <div id="buttonsContainer" style="margin-top: 20px;">
            <a id="actionBtn" href="/pages/dashboard/index.html" class="btn" style="display:none;">العودة للوحة التحكم</a>
        </div>
        <div class="note" id="noteBox" style="display:none;">
            <strong>ملاحظة:</strong> إذا وصلتك رسالة تأكيد إلى بريدك القديم، فهي مجرد إشعار أمان. رابط التأكيد الحقيقي يكون في <strong>البريد الإلكتروني الجديد</strong> الذي أدخلته.
        </div>
    </div>

    <script>
        (function() {
            const statusIcon = document.getElementById('statusIcon');
            const message = document.getElementById('message');
            const subMessage = document.getElementById('subMessage');
            const actionBtn = document.getElementById('actionBtn');
            const noteBox = document.getElementById('noteBox');
            const buttonsContainer = document.getElementById('buttonsContainer');

            // قراءة معطيات الخطأ من الرابط
            const urlParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            
            let error = urlParams.get('error') || hashParams.get('error');
            let errorCode = urlParams.get('error_code') || hashParams.get('error_code');
            let errorDescription = urlParams.get('error_description') || hashParams.get('error_description');

            // إذا لم تكن هناك معطيات خطأ ولكن الرابط فارغ، نعرض خطأ عام
            if (!error && !errorCode && !window.location.hash && !window.location.search) {
                error = 'invalid_link';
            }

            function showError(iconClass, msg, subMsg) {
                statusIcon.innerHTML = `<i class="fas ${iconClass} error"></i>`;
                message.textContent = msg;
                subMessage.textContent = subMsg;
                actionBtn.style.display = 'inline-block';
                actionBtn.textContent = 'المحاولة مرة أخرى';
                actionBtn.href = '/pages/security/change-email.html';
                actionBtn.className = 'btn';

                // إضافة زر إضافي للعودة للوحة التحكم
                const dashboardBtn = document.createElement('a');
                dashboardBtn.href = '/pages/dashboard/index.html';
                dashboardBtn.className = 'btn btn-outline';
                dashboardBtn.textContent = 'العودة للوحة التحكم';
                dashboardBtn.style.display = 'inline-block';
                buttonsContainer.appendChild(dashboardBtn);

                noteBox.style.display = 'block';
            }

            if (error) {
                // رابط يحتوي على خطأ
                let errorMsg = 'تعذر تأكيد البريد الإلكتروني.';
                let errorSub = '';

                if (error === 'access_denied') {
                    if (errorCode === 'otp_expired') {
                        errorMsg = 'انتهت صلاحية رابط التأكيد.';
                        errorSub = 'الرابط صالح لمدة ساعة واحدة فقط. يرجى طلب تغيير البريد مرة أخرى.';
                    } else {
                        errorMsg = 'رابط التأكيد غير صالح أو تم استخدامه مسبقاً.';
                        errorSub = 'يرجى طلب تغيير البريد الإلكتروني مرة أخرى.';
                    }
                } else if (error === 'invalid_link') {
                    errorMsg = 'الرابط الذي فتحته لا يحتوي على معلومات التأكيد.';
                    errorSub = 'تأكد من فتح الرابط من البريد الجديد بشكل صحيح.';
                } else {
                    errorMsg = errorDescription ? decodeURIComponent(errorDescription.replace(/\+/g, ' ')) : 'فشل تأكيد البريد الإلكتروني.';
                    errorSub = 'يمكنك المحاولة مرة أخرى من خلال صفحة تغيير البريد.';
                }

                showError('fa-times-circle', errorMsg, errorSub);
            } else {
                // محاولة العثور على token (لن يحدث غالباً لكن نحتفظ به)
                let token = urlParams.get('token') || hashParams.get('token') || urlParams.get('access_token');
                if (!token && window.location.hash) {
                    const hash = window.location.hash.substring(1);
                    if (!hash.includes('=')) token = hash;
                }

                if (token) {
                    // هنا يمكننا محاولة استدعاء Supabase لكن لن نضيف تعقيدات
                    showError('fa-check-circle', 'يبدو أن رابط التأكيد يحتوي على رمز.', 'جاري محاولة التأكيد...');
                } else {
                    showError('fa-times-circle', 'الرابط لا يحتوي على معلومات تأكيد.', 'يرجى طلب تغيير البريد مرة أخرى.');
                }
            }
        })();
    </script>
</body>
</html>
