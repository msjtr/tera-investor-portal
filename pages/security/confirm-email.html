<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد البريد الإلكتروني | Tera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #334155;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 20px;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .message {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.6;
            color: #0A1B3F;
        }
        .sub-message {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 30px;
        }
        .btn {
            background: #028090;
            color: #fff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn:hover { background: #0A1B3F; }
    </style>
</head>
<body>
    <div class="card">
        <div id="statusIcon" class="icon"><i class="fas fa-spinner fa-pulse"></i></div>
        <div id="message" class="message">جاري معالجة الرابط...</div>
        <div id="subMessage" class="sub-message">يرجى الانتظار قليلاً</div>
        <a id="actionBtn" href="/pages/dashboard/index.html" class="btn" style="display:none;">العودة للوحة التحكم</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script>
        (async function() {
            const statusIcon = document.getElementById('statusIcon');
            const message = document.getElementById('message');
            const subMessage = document.getElementById('subMessage');
            const actionBtn = document.getElementById('actionBtn');

            // انتظار Supabase
            if (!window.teraSupabase) {
                try {
                    await new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => reject(new Error('timeout')), 10000);
                        document.addEventListener('supabase:ready', e => { clearTimeout(timeout); resolve(e.detail.client); }, { once: true });
                        document.addEventListener('supabase:error', () => { clearTimeout(timeout); reject(new Error('error')); }, { once: true });
                    });
                } catch (e) {
                    showError('تعذر الاتصال بخدمة المصادقة.');
                    return;
                }
            }

            const supabase = window.teraSupabase;

            // الحصول على رمز التأكيد من الرابط (يوجد عادة في hash أو query)
            const hash = window.location.hash;
            const params = new URLSearchParams(window.location.search);
            let token = null;

            // محاولة استخراج token من الرابط
            if (hash.includes('token=')) {
                token = new URLSearchParams(hash.substring(1)).get('token');
            } else if (params.get('token')) {
                token = params.get('token');
            } else {
                // ربما الرابط بالكامل هو token بعد # أو ؟
                token = hash.replace('#', '');
            }

            if (!token) {
                showError('الرابط غير صالح.');
                return;
            }

            try {
                // محاولة تبادل الرمز (هذا يثبت البريد ويؤكد التغيير)
                const { error } = await supabase.auth.verifyOtp({
                    token: token,
                    type: 'email_change'
                });

                if (error) throw error;

                // نجاح
                statusIcon.innerHTML = '<i class="fas fa-check-circle success"></i>';
                message.textContent = 'تم تأكيد البريد الإلكتروني بنجاح.';
                subMessage.textContent = 'تم تغيير بريدك الإلكتروني. يمكنك الآن المتابعة.';
                actionBtn.style.display = 'inline-block';
            } catch (err) {
                console.error('فشل تأكيد البريد:', err);
                let errorMessage = 'فشل تأكيد البريد الإلكتروني.';
                if (err.message.includes('expired')) {
                    errorMessage = 'انتهت صلاحية الرابط.';
                } else if (err.message.includes('used')) {
                    errorMessage = 'تم استخدام هذا الرابط مسبقاً.';
                } else if (err.message.includes('invalid')) {
                    errorMessage = 'الرابط غير صالح.';
                }
                showError(errorMessage);
            }

            function showError(msg) {
                statusIcon.innerHTML = '<i class="fas fa-times-circle error"></i>';
                message.textContent = msg;
                subMessage.textContent = 'لم يتم تأكيد البريد الإلكتروني. يمكنك المحاولة مرة أخرى.';
                actionBtn.href = '/pages/security/change-email.html';
                actionBtn.textContent = 'المحاولة مرة أخرى';
                actionBtn.style.display = 'inline-block';
            }
        })();
    </script>
</body>
</html>
