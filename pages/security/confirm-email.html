<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد البريد الإلكتروني | Tera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #334155;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .message { font-size: 18px; font-weight: 700; margin-bottom: 16px; line-height: 1.6; color: #0A1B3F; }
        .sub-message { font-size: 14px; color: #64748b; margin-bottom: 30px; }
        .btn {
            background: #028090;
            color: #fff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 700;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn:hover { background: #0A1B3F; }
        .note {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            padding: 14px;
            border-radius: 10px;
            font-size: 13px;
            color: #92400e;
            margin-top: 20px;
            text-align: right;
            line-height: 1.6;
        }
        .debug {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #64748b;
            margin-top: 16px;
            word-break: break-all;
            text-align: left;
            direction: ltr;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="statusIcon" class="icon"><i class="fas fa-spinner fa-pulse"></i></div>
        <div id="message" class="message">جاري معالجة رابط التأكيد...</div>
        <div id="subMessage" class="sub-message">يرجى الانتظار قليلاً</div>
        <a id="actionBtn" href="/pages/dashboard/index.html" class="btn" style="display:none;">العودة للوحة التحكم</a>

        <div class="note" id="noteBox" style="display:none;">
            <strong>ملاحظة:</strong> إذا وصلتك رسالة تأكيد إلى بريدك القديم، فهي مجرد إشعار أمان. رابط التأكيد الحقيقي يكون في <strong>البريد الإلكتروني الجديد</strong> الذي أدخلته.
        </div>
        <div class="debug" id="debugBox" style="display:none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script>
        (async function() {
            const statusIcon = document.getElementById('statusIcon');
            const message = document.getElementById('message');
            const subMessage = document.getElementById('subMessage');
            const actionBtn = document.getElementById('actionBtn');
            const noteBox = document.getElementById('noteBox');
            const debugBox = document.getElementById('debugBox');

            // انتظار Supabase
            if (!window.teraSupabase) {
                try {
                    if (typeof waitForSupabase === 'function') {
                        await waitForSupabase();
                    } else {
                        await new Promise((resolve, reject) => {
                            const timeout = setTimeout(() => reject(new Error('timeout')), 10000);
                            document.addEventListener('supabase:ready', e => { clearTimeout(timeout); resolve(e.detail.client); }, { once: true });
                            document.addEventListener('supabase:error', () => { clearTimeout(timeout); reject(new Error('error')); }, { once: true });
                        });
                    }
                } catch (e) {
                    showError('تعذر الاتصال بخدمة المصادقة.', true);
                    return;
                }
            }

            const supabase = window.teraSupabase;

            // ---- استخراج الرمز (token) بكل الطرق الممكنة ----
            let token = null;
            const fullUrl = window.location.href;
            const queryString = window.location.search.substring(1);
            const hash = window.location.hash.substring(1);

            // عرض معلومات الرابط للمساعدة في التشخيص (يمكن إخفاؤها لاحقاً)
            debugBox.style.display = 'block';
            debugBox.innerHTML = `<strong>الرابط الكامل:</strong><br>${fullUrl}<br><br><strong>query:</strong> ${queryString || '(فارغ)'}<br><strong>hash:</strong> ${hash || '(فارغ)'}`;

            // 1. محاولة استخراج token من query string
            if (queryString) {
                const qParams = new URLSearchParams(queryString);
                token = qParams.get('token') || qParams.get('access_token') || qParams.get('confirmation_token');
            }

            // 2. إذا لم يوجد، نبحث في hash
            if (!token && hash) {
                // إذا كان hash يحتوي على معطيات (مثل token=...)
                if (hash.includes('=')) {
                    const hParams = new URLSearchParams(hash);
                    token = hParams.get('token') || hParams.get('access_token') || hParams.get('confirmation_token');
                } else {
                    // ربما hash هو الرمز نفسه
                    token = hash;
                }
            }

            // 3. إذا لم يوجد بعد، قد يكون الرمز مدمجًا في المسار (pathname) – نأخذ الجزء الأخير
            if (!token) {
                const pathParts = window.location.pathname.split('/');
                const lastPart = pathParts[pathParts.length - 1];
                if (lastPart && lastPart.length > 30) { // رمز طويل عادة
                    token = lastPart;
                }
            }

            console.log('الرمز المستخرج:', token);

            if (!token) {
                showError('الرابط لا يحتوي على رمز تأكيد. يرجى نسخ الرابط كاملاً من البريد الجديد وإعادة لصقه في المتصفح. تأكد من فتح الرابط من البريد الجديد وليس القديم.', true);
                return;
            }

            // ---- محاولة تأكيد البريد باستخدام الرمز ----
            try {
                // نجرب type 'email_change' أولاً
                let { error } = await supabase.auth.verifyOtp({
                    token: token,
                    type: 'email_change'
                });

                // إذا فشل، نجرب type 'signup' أو 'recovery' كتجربة
                if (error) {
                    console.warn('فشل email_change، نجرب signup:', error.message);
                    const { error: error2 } = await supabase.auth.verifyOtp({
                        token: token,
                        type: 'signup'
                    });
                    error = error2;
                }

                if (error) throw error;

                // نجاح
                statusIcon.innerHTML = '<i class="fas fa-check-circle success"></i>';
                message.textContent = 'تم تأكيد البريد الإلكتروني بنجاح.';
                subMessage.textContent = 'تم تغيير بريدك الإلكتروني. يمكنك الآن المتابعة.';
                actionBtn.style.display = 'inline-block';
                noteBox.style.display = 'none';
                debugBox.style.display = 'none';

            } catch (err) {
                console.error('فشل تأكيد البريد:', err);
                let errorMessage = 'فشل تأكيد البريد الإلكتروني.';
                if (err.message.includes('expired')) {
                    errorMessage = 'انتهت صلاحية رابط التأكيد. يرجى طلب تغيير البريد مرة أخرى.';
                } else if (err.message.includes('used')) {
                    errorMessage = 'تم استخدام رابط التأكيد مسبقاً. البريد الإلكتروني مؤكد بالفعل.';
                } else if (err.message.includes('invalid')) {
                    errorMessage = 'الرابط غير صالح أو تم التلاعب به. تأكد من فتح الرابط من البريد الجديد.';
                }
                showError(errorMessage, true);
            }

            function showError(msg, showNote = false) {
                statusIcon.innerHTML = '<i class="fas fa-times-circle error"></i>';
                message.textContent = msg;
                subMessage.textContent = 'يمكنك المحاولة مرة أخرى من خلال صفحة تغيير البريد الإلكتروني.';
                actionBtn.href = '/pages/security/change-email.html';
                actionBtn.textContent = 'المحاولة مرة أخرى';
                actionBtn.style.display = 'inline-block';
                if (showNote) noteBox.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
