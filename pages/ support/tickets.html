<section class="support-section">

    <h1>الدعم الفني</h1>

    <form>

        <label>نوع التذكرة</label>

        <select>
            <option>استفسار</option>
            <option>مشكلة تقنية</option>
            <option>مشكلة مالية</option>
            <option>اقتراح</option>
        </select>

        <label>عنوان التذكرة</label>

        <input type="text">

        <label>وصف المشكلة</label>

        <textarea rows="6"></textarea>

        <button type="submit">
            إرسال التذكرة
        </button>

    </form>

</section>
<section class="tickets-table">

    <h2>التذاكر السابقة</h2>

    <table>

        <tr>
            <th>رقم التذكرة</th>
            <th>العنوان</th>
            <th>الحالة</th>
            <th>التاريخ</th>
        </tr>

    </table>

</section>
