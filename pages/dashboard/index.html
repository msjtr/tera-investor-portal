<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>لوحة التحكم | Tera Investor Portal</title>

    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="apple-touch-icon" href="/images/share-thumb.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/assets/css/core.css" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/responsive.css" />

    <style>
        /* ... جميع التنسيقات كما هي في ملفك الأصلي بدون تغيير ... */
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><p>جاري تحميل لوحة التحكم...</p></div>

    <div class="app-wrapper">
        <header class="top-header no-print">
            <div class="header-right-actions">
                <button class="menu-toggle-btn" id="sidebarToggle" aria-label="تبديل القائمة الجانبية"><i class="fas fa-bars"></i></button>
                <div class="header-logo"><a href="/pages/dashboard/index.html"><img src="/images/logo.svg" alt="Tera Logo"></a></div>
            </div>
            <div class="header-left-actions">
                <div class="user-profile-block">
                    <div class="user-meta"><h5 id="headerUserName">مستخدم</h5><p>بوابة المستثمر</p></div>
                    <div class="user-avatar-circle" id="headerAvatar">م</div>
                </div>
            </div>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- القائمة الجانبية -->
        <aside class="sidebar-container" id="sidebar">
            <div class="sidebar-mobile-header">
                <span class="sidebar-title">القائمة الرئيسية</span>
                <button class="sidebar-close-btn" id="closeSidebarBtn" aria-label="إغلاق القائمة"><i class="fas fa-times"></i></button>
            </div>
            <nav class="sidebar-menu">
                <ul class="nav-list">
                    <li class="nav-item active"><a href="/pages/dashboard/index.html"><i class="fas fa-th-large"></i><span class="nav-label">لوحة التحكم</span></a></li>
                    <!-- ... باقي القائمة ... -->
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="nav-label">تسجيل الخروج</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <!-- ... المحتوى كما هو ... -->
        </main>
    </div>

    <!-- ============================================
         السكربتات – ترتيب مُحكم لمنع التضارب
         ============================================ -->
    
    <!-- الأساسيات -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>
    
    <!-- الوحدات المساعدة -->
    <script src="/assets/js/modules/activity-tracker.js"></script>
    <script src="/assets/js/modules/device-info.js"></script>
    <script src="/assets/js/modules/location-services.js"></script>
    <script src="/assets/js/modules/session-manager.js"></script>
    <script src="/assets/js/modules/ui-helpers.js"></script>
    
    <!-- ⚡ سكربت موحد للقائمة وزر الخروج (بدلاً من sidebar.js + main.js) -->
    <script>
    (function() {
        if (window.__sidebarInitialized) return;
        window.__sidebarInitialized = true;

        function init() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const closeBtn = document.getElementById('closeSidebarBtn');
            const overlay = document.getElementById('sidebarOverlay');

            // فتح/إغلاق القائمة
            if (toggleBtn && sidebar) {
                toggleBtn.addEventListener('click', () => {
                    if (window.innerWidth < 992) {
                        sidebar.classList.toggle('sidebar-open');
                        if (overlay) overlay.classList.toggle('active');
                    } else {
                        sidebar.classList.toggle('collapsed');
                    }
                });
            }

            if (closeBtn && overlay) {
                closeBtn.addEventListener('click', () => {
                    sidebar.classList.remove('sidebar-open');
                    overlay.classList.remove('active');
                });
            }

            if (overlay) {
                overlay.addEventListener('click', () => {
                    sidebar.classList.remove('sidebar-open');
                    overlay.classList.remove('active');
                });
            }

            // القوائم الفرعية
            document.querySelectorAll('.has-submenu > a').forEach(link => {
                link.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (href && href !== '#' && href !== 'javascript:void(0)') return;
                    e.preventDefault();
                    this.closest('.has-submenu').classList.toggle('submenu-open');
                });
            });

            // 🟢 زر الخروج – يعمل دائمًا
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    if (!confirm('هل أنت متأكد من تسجيل الخروج؟')) return;
                    logoutBtn.disabled = true;
                    try {
                        if (window.Auth && window.Auth.logout) {
                            await window.Auth.logout();
                        } else {
                            localStorage.clear();
                            sessionStorage.clear();
                            window.location.replace('/auth/auth/login/login.html');
                        }
                    } catch (err) {
                        window.location.replace('/auth/auth/login/login.html');
                    }
                });
            }

            console.log('✅ Sidebar ready');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
    
    <!-- أخيرًا: سكريبت لوحة التحكم -->
    <script src="/assets/js/dashboard.js"></script>
</body>
</html>
