<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا | لوحة تحكم المستثمر</title>
    
    <link rel="icon" type="image/svg+xml" href="../../images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght=400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../assets/css/core.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">

    <style>
        /* التنسيقات الأساسية لتأمين التصميم في حال تأخر ملفات CSS */
        :root { --tera-navy: #0A2540; --tera-teal: #028090; }
        body { background: #f4f7fa; margin: 0; font-family: 'Tajawal', sans-serif; display: flex; color: var(--tera-navy); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(226, 232, 240, 0.8); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(10, 37, 64, 0.05); }
        .sidebar { width: 280px; padding: 30px 20px; display: flex; flex-direction: column; min-height: 100vh; }
        .brand-logo img { width: 140px; display: block; margin: 0 auto 40px auto; }
        .nav-menu { display: flex; flex-direction: column; gap: 10px; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px; text-decoration: none; color: #475569; border-radius: 12px; font-weight: 500; }
        .nav-item.active { background: var(--tera-teal); color: white; }
        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .stat-card { padding: 25px; border-right: 4px solid var(--tera-teal); }
        .header-panel { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <aside class="sidebar glass-panel">
        <div class="brand-logo">
            <img src="../../images/logo.svg" alt="تيرا">
        </div>
        
        <nav class="nav-menu">
            <a href="./index.html" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> نظرة عامة</a>
            
            <a href="../investments/opportunities.html" class="nav-item"><i class="fa-solid fa-briefcase"></i> الفرص الاستثمارية</a>
            <a href="../portfolio/portfolio-overview.html" class="nav-item"><i class="fa-solid fa-wallet"></i> المحفظة والأصول</a>
            <a href="../reports/reports-dashboard.html" class="nav-item"><i class="fa-solid fa-file-invoice-dollar"></i> التقارير المالية</a>
        </nav>
        
        <a href="../../index.html" class="nav-item" style="margin-top: auto; color: #ef4444;"><i class="fa-solid fa-arrow-right-from-bracket"></i> العودة للرئيسية</a>
    </aside>

    <main class="main-content">
        <header class="header-panel glass-panel">
            <div>
                <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 5px;">حياك الله، شريك تيرا 👋</h1>
                <p style="color: #64748b; font-size: 15px;">إليك ملخص أداء محفظتك الاستثمارية اليوم.</p>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card glass-panel" style="border-right-color: var(--tera-navy);">
                <p style="color: #64748b; font-size: 14px; margin-bottom: 5px;">إجمالي قيمة المحفظة</p>
                <h3 style="font-size: 28px;">245,500 ر.س</h3>
            </div>
            <div class="stat-card glass-panel">
                <p style="color: #64748b; font-size: 14px; margin-bottom: 5px;">إجمالي الأرباح الموزعة</p>
                <h3 style="font-size: 28px;">18,250 ر.س</h3>
            </div>
            <div class="stat-card glass-panel" style="border-right-color: #D4AF37;">
                <p style="color: #64748b; font-size: 14px; margin-bottom: 5px;">الاستثمارات النشطة</p>
                <h3 style="font-size: 28px;">4 فرص</h3>
            </div>
        </div>
    </main>

    <script src="../../assets/js/core.js"></script>
    <script src="../../assets/js/app.js"></script>
</body>
</html>
