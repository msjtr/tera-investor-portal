<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | تيرا للاستثمار</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>

    <div id="loader-container"></div>

    <div class="tera-wrapper">
        <div id="sidebar-container"></div>

        <div class="tera-main-content">
            <div id="header-container"></div>

            <main class="content-area">
                <div class="dashboard-header">
                    <h1>لوحة التحكم</h1>
                    <p>مرحباً بك مجدداً في منصة تيرا للاستثمار</p>
                </div>

                <div class="stats-grid" id="stats-container">
                    <div class="card">
                        <div class="card-title">إجمالي المحفظة</div>
                        <div class="card-value">125,400 ر.س</div>
                    </div>
                    <div class="card">
                        <div class="card-title">الاستثمارات النشطة</div>
                        <div class="card-value">12</div>
                    </div>
                    <div class="card">
                        <div class="card-title">الأرباح المتوقعة</div>
                        <div class="card-value text-profit">+8.5%</div>
                    </div>
                </div>
            </main>

            <div id="footer-container"></div>
        </div>
    </div>

    <div id="alerts-container"></div>

    <script src="/assets/js/core.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/dashboard.js"></script>

    <script>
        // تفعيل النظام
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadComponents === 'function') {
                loadComponents(); // هذا يستدعي الدوال من core.js لجلب الهيدر والسايدبار
            }
        });
    </script>
</body>
</html>
