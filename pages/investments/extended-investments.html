<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشراكة الممتدة | Tera Investor Portal</title>
    
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/investments.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="app-wrapper">
    <main class="main-content">
        
        <nav class="filters-nav">
            <button class="filter-tab active" data-status="all">الكل</button>
            <button class="filter-tab" data-status="pending">بانتظار الاعتماد</button>
            <button class="filter-tab" data-status="expired">منتهية</button>
            <button class="filter-tab" data-status="cancelled">ملغاة</button>
        </nav>

        <section class="card table-card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>رقم الشراكة</th>
                                <th>تاريخ الشراكة</th>
                                <th>انتهاء الشراكة</th>
                                <th>نسبة الشريك</th>
                                <th>قيمة الشراكة</th>
                                <th>متوقع إجمالي الأرباح</th>
                                <th>المدة</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="investmentsTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

        <footer class="footer-actions">
            <a href="/pages/dashboard/index.html" class="btn btn-outline">العودة للوحة التحكم</a>
        </footer>
    </main>
</div>

<script src="/assets/js/core.js"></script>
<script src="/assets/js/investments.js"></script>

</body>
</html>
