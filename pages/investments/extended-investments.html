<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الشراكة الممتدة | Tera Investor Portal</title>
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="app-wrapper">
    <main class="main-content">
        
        <nav class="filters-nav">
            <button class="filter-tab active" data-status="all">الكل</button>
            <button class="filter-tab" data-status="pending">بانتظار الاعتماد</button>
            <button class="filter-tab" data-status="expired">منتهية</button>
            <button class="filter-tab" data-status="cancelled">ملغاة</button>
        </nav>

        <section class="card table-card">
            <div class="card-body">
                <div class="table-responsive"> <table class="table">
                        <thead>
                            <tr>
                                <th>رقم الشراكة</th>
                                <th>تاريخ الشراكة</th>
                                <th>انتهاء الشراكة</th>
                                <th>نسبة الشريك</th>
                                <th>قيمة الشراكة</th>
                                <th>متوقع إجمالي الأرباح</th>
                                <th>المدة</th>
                                <th>الحالة</th>
                                <th>التفاصيل</th>
                            </tr>
                        </thead>
                        <tbody id="investmentsTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

        <div id="detailedView" class="hidden">
            </div>

        <footer class="footer-actions">
            <button onclick="window.history.back()">العودة للصفحة السابقة</button>
            <button onclick="window.print()">طباعة</button>
            <button id="exportPdf">تصدير PDF</button>
            <button id="exportExcel">تصدير إكسل</button>
        </footer>
    </main>
</div>

<script>
    /**
     * القواعد المحاسبية والفنية [cite: 44]
     * 1. التقريب: toFixed(2) [cite: 46]
     * 2. تنسيق الأرقام: toLocaleString() 
     * 3. معادلة الربح الشهري: Total / Duration [cite: 21, 23]
     * 4. تسوية الشهر الأخير: ضمان أن المتبقي = 0.00 [cite: 49]
     */
    
    // مثال منطق حسابي للتوضيح [cite: 24]
    function calculateMonthlyProfit(totalProfit, duration) {
        let monthly = totalProfit / duration;
        return monthly.toFixed(2); // التقريب [cite: 46]
    }
</script>

</body>
</html>
