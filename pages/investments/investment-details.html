<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق الفرص والشركات المطروحة | Tera Investor Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root { --tera-teal: #028090; --tera-navy: #0A1B3F; --tera-gray: #64748b; --tera-bg: #f8fafc; }
        body { background-color: var(--tera-bg); font-family: 'Tajawal', sans-serif; margin: 0; color: #334155; }
        
        /* الهيدر المحدث */
        .top-header { background: #fff; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .logo-area img { height: 50px; width: auto; transition: 0.3s; }
        .user-area { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 45px; height: 45px; background: var(--tera-teal); color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 800; font-size: 18px; }
        .user-info h4 { margin: 0; color: var(--tera-navy); }
        .user-info p { margin: 0; font-size: 12px; color: var(--tera-gray); }

        /* حاوية العنوان والزر */
        .page-action-bar { padding: 30px 40px 10px 40px; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 24px; font-weight: 800; color: var(--tera-navy); margin: 0; }
        .btn-back { background: var(--tera-navy); color: #fff; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .btn-back:hover { background: var(--tera-teal); }

        .container { padding: 20px 40px; }

        /* تنسيقات البطاقات والجدول (نفس الأنماط السابقة مع تحسين المسافات) */
        .glass-panel { background: #fff; border-radius: 16px; padding: 30px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 30px; }
        .summary-card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .summary-card h3 { font-size: 28px; color: var(--tera-teal); margin-top: 10px; }

        /* العناصر الأخرى تبقى كما هي مع تحديث الحواف */
        .btn-action { padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: 1px solid #cbd5e1; background: #fff; transition: 0.2s; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <!-- الهيدر المحدث -->
        <header class="top-header">
            <div class="logo-area">
                <img src="../../images/logo.svg" alt="Tera Logo">
            </div>
            <div class="user-area">
                <div class="user-info">
                    <h4>محمد صالح جميعان الشمري</h4>
                    <p>مستثمر - بوابة حائل</p>
                </div>
                <div class="user-avatar">م</div>
            </div>
        </header>

        <!-- حاوية العنوان وزر الرجوع -->
        <div class="page-action-bar">
            <h2 class="page-title">سوق الفرص والشركات</h2>
            <a href="../dashboard/index.html" class="btn-back"><i class="fas fa-home"></i> العودة للقائمة الرئيسية</a>
        </div>

        <div class="container">
            <div id="marketAlertsWrapper"></div>

            <div class="summary-grid">
                <div class="summary-card">
                    <p>الفرص الحالية</p>
                    <h3 id="sumActive">0</h3>
                </div>
                <div class="summary-card">
                    <p>الفرص القادمة</p>
                    <h3 id="sumUpcoming">0</h3>
                </div>
                <div class="summary-card">
                    <p>الفرص المكتملة</p>
                    <h3 id="sumCompleted">0</h3>
                </div>
            </div>

            <!-- بقية المحتوى (الفلاتر، الجدول، الكروت) -->
            <div class="glass-panel">
                <div class="filters-container">
                    <!-- الفلاتر هنا كما في الكود السابق -->
                </div>
                <div id="gridContainer" class="grid-view-container" style="display: none;"></div>
                <div id="listContainer" class="list-view-container">
                    <table class="tera-table">
                        <!-- الجدول هنا كما في الكود السابق -->
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- السكريبتات -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../assets/js/investments.js"></script>
    <script src="../../assets/js/investment-details.js"></script>
</body>
</html>
