<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد طلب الانضمام | Tera Investor Portal</title>
    
    <link rel="icon" type="image/svg+xml" href="../../images/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/core.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/app.css">
    <link rel="stylesheet" href="../../assets/css/investments.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --tera-teal: #028090; 
            --tera-navy: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 12px 40px rgba(2, 128, 144, 0.08);
            --glass-blur: blur(16px);
        }

        body { background: radial-gradient(circle at top right, #e0f2fe 0%, #f8fafc 50%, #ccfbf1 100%); background-attachment: fixed; font-family: 'Tajawal', sans-serif; margin: 0; color: #334155; }
        .container { max-width: 1600px; margin: 0 auto; padding: 40px 45px; }

        /* الهيدر الموحد */
        .top-header { background: #fff; padding: 20px 45px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; border-radius: 0 0 20px 20px; margin-bottom: 40px;}
        .header-logo img { height: 85px; width: auto; display: block; }

        /* البطاقات والآلة الحاسبة */
        .content-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px; box-shadow: var(--glass-shadow); margin-bottom: 30px; }
        .detail-block-title { color: var(--tera-navy); font-family: 'Cairo', sans-serif; font-weight: 800; border-bottom: 2px solid rgba(2, 128, 144, 0.1); padding-bottom: 15px; margin-bottom: 25px; font-size: 1.25rem; }
        
        .info-grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .info-card-item { background: rgba(255, 255, 255, 0.5); padding: 20px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.8); text-align: center; }
        
        /* التجاوب للجوال */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .top-header { flex-direction: column; gap: 15px; }
            .header-logo img { height: 60px; }
            .info-grid-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="header-logo"><img src="../../images/logo.svg" alt="Tera"></div>
        <div class="user-info"><h4>محمد صالح جميعان الشمري</h4></div>
    </header>

    <main class="container">
        <!-- المحتوى هنا يتم ملؤه عبر cancelled-investments.js -->
        <div id="invOppName" style="display:none;">جاري تحميل البيانات...</div>
        
        <!-- هيكل الآلة الحاسبة -->
        <div class="content-card">
            <h2 class="detail-block-title">تأكيد طلب الانضمام للفرصة</h2>
            <div id="invOppId"></div>
            <!-- باقي الحاويات -->
        </div>
    </main>

    <script src="../../assets/js/investments.js"></script>
    <script src="../../assets/js/cancelled-investments.js"></script>
</body>
</html>
