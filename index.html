<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="بوابة المستثمر - تيرا">

    <title>TERA Investor Portal</title>

    <!-- Global CSS -->

    <link rel="stylesheet"
          href="assets/css/app.css">

    <link rel="stylesheet"
          href="assets/css/responsive.css">

</head>

<body>

    <div class="loader">

        <div class="logo">
            TERA
        </div>

        <div class="spinner"></div>

        <p>
            جاري تحميل النظام...
        </p>

    </div>

    <!-- Global JS -->

    <script src="assets/js/app.js"></script>

    <script>

        document.addEventListener(
            'DOMContentLoaded',
            () => {

                const token =
                localStorage.getItem(
                    'investorToken'
                );

                if(token){

                    window.location.href =
                    'pages/dashboard/index.html';

                }else{

                    window.location.href =
                    'auth/login.html';

                }

            }
        );

    </script>

</body>

</html>
