<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="بوابة المستثمر - تيرا">

    <title>بوابة المستثمر | تيرا</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f8fafc;
            font-family:Tahoma, Arial, sans-serif;
        }

        .loader{
            text-align:center;
        }

        .logo{
            font-size:42px;
            font-weight:700;
            color:#0f766e;
            margin-bottom:20px;
        }

        .spinner{
            width:45px;
            height:45px;
            border:4px solid #e5e7eb;
            border-top:4px solid #0f766e;
            border-radius:50%;
            margin:auto;
            animation:spin 1s linear infinite;
        }

        p{
            margin-top:15px;
            color:#6b7280;
        }

        @keyframes spin{
            from{
                transform:rotate(0deg);
            }
            to{
                transform:rotate(360deg);
            }
        }

    </style>

</head>

<body>

    <div class="loader">

        <div class="logo">
            TERA
        </div>

        <div class="spinner"></div>

        <p>
            جاري تحميل بوابة المستثمر...
        </p>

    </div>

    <script>

        document.addEventListener('DOMContentLoaded', () => {

            const token =
            localStorage.getItem('investorToken');

            setTimeout(() => {

                if(token){

                    window.location.href =
                    'pages/dashboard/index.html';

                }else{

                    window.location.href =
                    'auth/login.html';

                }

            }, 1000);

        });

    </script>

</body>

</html>
