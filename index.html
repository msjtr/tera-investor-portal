    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Tajawal',sans-serif;
        }

        body{
            background:#f4f7fa;
            min-height:100vh;
        }

        .hero{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px;
        }

        .hero-card{
            width:100%;
            max-width:1200px;
            background:#ffffff;
            border-radius:24px;
            padding:60px;
            text-align:center;
            box-shadow:0 20px 50px rgba(15, 23, 42, 0.05);
            border: 1px solid rgba(229, 231, 235, 0.6);
        }

        .logo{
            margin-bottom:30px;
        }

        .logo img{
            width:150px;
            height:auto;
        }

        h1{
            font-size:38px;
            color:#0f172a;
            margin-bottom:15px;
            font-weight: 800;
        }

        .subtitle{
            font-size:18px;
            color:#475569;
            margin-bottom:40px;
            line-height:1.8;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .actions{
            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;
            margin-bottom:50px;
        }

        .btn{
            text-decoration:none;
            padding:14px 35px;
            border-radius:12px;
            font-weight:700;
            transition:.3s ease-in-out;
        }

        .btn-primary{
            background:#1e3a8a; /* الأزرق الملكي */
            color:#fff;
            box-shadow: 0 4px 14px rgba(30, 58, 138, 0.3);
        }

        .btn-primary:hover{
            background:#1d4ed8;
            transform: translateY(-2px);
        }

        .btn-secondary{
            background:#f1f5f9;
            color:#1e293b;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover{
            background:#e2e8f0;
            transform: translateY(-2px);
        }

        .stats{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-top:40px;
        }

        .card{
            background:#fff;
            border:1px solid #e2e8f0;
            border-radius:16px;
            padding:25px;
            text-align: right;
            transition: .3s;
        }

        .card:hover {
            border-color: #cbd5e1;
            transform: translateY(-3px);
        }

        .card h3{
            margin-bottom:10px;
            color:#0f172a;
            font-size: 18px;
            font-weight: 700;
        }

        .card p{
            color:#64748b;
            line-height:1.7;
            font-size: 14px;
        }

        .quick-links{
            margin-top:50px;
            border-top: 1px dashed #e2e8f0;
            padding-top: 40px;
        }

        .quick-links h2{
            margin-bottom:25px;
            color:#0f172a;
            font-size: 22px;
            font-weight: 700;
        }
