<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا | بوابة المستثمر وإدارة المحافظ الرقمية</title>
    
    <meta name="description" content="منصة تيرا للاستثمار وإدارة المحافظ الاستثمارية وتحقيق العوائد المستدامة">
    <meta name="keywords" content="تيرا, استثمار, محافظ استثمارية, تمويل, عوائد مالية">
    <meta name="author" content="TERA">

    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="shortcut icon" type="image/x-icon" href="/images/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght=300;400;500;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/core.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #f4f7fa 0%, #eef2f7 100%); 
            min-height: 100vh; 
            color: #0A2540; 
            display: flex;
            flex-direction: column;
        }

        .hero-section { 
            flex-grow: 1;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 60px 20px; 
        }
        
        /* الحاوية الزجاجية الفاخرة (Glassmorphism) */
        .hero-card {
            width: 100%; 
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(12px);
            border-radius: 24px; 
            padding: 65px; 
            text-align: center;
            box-shadow: 0 25px 60px rgba(10, 37, 64, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.8);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo { margin-bottom: 35px; display: flex; justify-content: center; }
        .brand-logo img { width: 160px; height: auto; object-fit: contain; }
        
        .main-title { font-size: 36px; color: #0A2540; margin-bottom: 20px; font-weight: 800; }
        .main-subtitle { font-size: 18px; color: #475569; margin-bottom: 50px; line-height: 1.8; max-width: 750px; margin-left: auto; margin-right: auto; }
        
        /* أزرار الدخول والتسجيل */
        .auth-actions { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 60px; }
        .btn-action { text-decoration: none; padding: 16px 40px; border-radius: 12px; font-weight: 700; font-size: 16px; transition: all 0.3s ease; }
        
        .btn-login { 
            background: linear-gradient(135deg, #0A2540 0%, #028090 100%); 
            color: #ffffff; 
            box-shadow: 0 4px 15px rgba(2, 128, 144, 0.25); 
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(2, 128, 144, 0.35); opacity: 0.95; }
        
        .btn-register { 
            background: #f8fafc; 
            color: #0A2540; 
            border: 2px solid #e2e8f0; 
        }
        .btn-register:hover { background: #e2e8f0; transform: translateY(-3px); }
        
        /* شبكة المزايا (Features Grid) */
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; margin-top: 20px; }
        .feature-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 30px; text-align: right; transition: all 0.3s ease; }
        .feature-card:hover { border-color: #028090; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(10, 37, 64, 0.04); }
        .feature-card h3 { margin-bottom: 15px; color: #0A2540; font-size: 19px; font-weight: 700; border-right: 4px solid #028090; padding-right: 12px; }
        .feature-card p { color: #64748b; line-height: 1.7; font-size: 14.5px; }
        
        /* الفوتر السفلي */
        .portal-footer { margin-top: 60px; color: #94a3b8; font-size: 14px; border-top: 1px solid #f1f5f9; padding-top: 25px; }

        @media (max-width: 768px) {
            .hero-card { padding: 40px 25px; }
            .auth-actions { flex-direction: column; width: 100%; max-width: 300px; margin: 0 auto 40px auto; }
            .btn-action { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <main class="hero-section">
        <div class="hero-card">
            
            <div class="brand-logo">
                <img src="/images/logo.svg" alt="تيرا - بوابة المستثمر">
            </div>

            <h1 class="main-title">منصة تيرا للاستثمار الرقمي</h1>
            <p class="main-subtitle">
                بوابتك الموثوقة لإدارة الثروات والمحافظ الاستثمارية بذكاء. تابع نمو أصولك، استكشف فرصاً استثنائية، واطلع على تقاريرك المالية بكل شفافية وأمان.
            </p>
