<!-- ========================================
     header.html - الشريط العلوي (الهيدر) مع زر العودة
     ======================================== -->
<header class="header">
    <div class="header-left">
        <!-- زر تبديل القائمة الجانبية (للشاشات الصغيرة) -->
        <button class="sidebar-toggle" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>

        <!-- زر العودة إلى لوحة التحكم (يظهر في الصفحات الفرعية فقط) -->
        <a href="/pages/dashboard/index.html" class="back-to-dashboard" id="backToDashboard">
            <i class="fas fa-arrow-right"></i>
            <span>العودة للوحة التحكم</span>
        </a>

        <!-- عنوان الصفحة (ديناميكي، يتم تحديثه عبر JavaScript) -->
        <h1 class="page-title" id="pageTitle">لوحة التحكم</h1>
    </div>

    <div class="header-right">
        <!-- أيقونة الإشعارات -->
        <div class="notifications" title="الإشعارات">
            <i class="fas fa-bell"></i>
            <span class="badge">3</span>
        </div>

        <!-- معلومات المستخدم -->
        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=أحمد+محمد&background=0D6EFD&color=fff&size=40" alt="صورة المستخدم" />
            <span class="user-name">أحمد محمد</span>
        </div>
    </div>
</header>
