<!-- ============================================================
     الهيدر العلوي (Header) – مكون منفصل – تم إصلاح ازدواجية الأزرار
     ============================================================
     الاستخدام: 
       - يمكن تضمينه مباشرة في الصفحات باستخدام:
         <div id="header-container"></div>
         <script>
           fetch('/components/header.html')
             .then(res => res.text())
             .then(html => document.getElementById('header-container').innerHTML = html);
         </script>
       
       - أو باستخدام Server Side Includes (SSI):
         <!--#include virtual="/components/header.html" -->
       
       - أو باستخدام أي تقنية تضمين أخرى.
     ============================================================ -->

<header class="top-header no-print">
    
    <!-- الجزء الأيمن (الشعار + زر التحكم الوحيد) -->
    <div class="header-right-actions">
        
        <!-- زر تبديل القائمة الوحيد (يعمل في جميع الشاشات) -->
        <button class="menu-toggle-btn" id="sidebarToggle" aria-label="تبديل القائمة الجانبية">
            <i class="fas fa-bars"></i>
        </button>
        
        <!-- الشعار – تم تحسين حجمه ووضوحه -->
        <div class="header-logo">
            <a href="/pages/dashboard/index.html">
                <img src="/images/logo.svg" 
                     alt="Tera Logo" 
                     onerror="this.src='https://via.placeholder.com/150x45/028090/fff?text=Tera+Portal'" />
            </a>
        </div>
    </div>

    <!-- الجزء الأيسر (بيانات المستخدم) -->
    <div class="header-left-actions">
        <div class="user-profile-block">
            <div class="user-meta">
                <h5>محمد صالح جميعان الشمري</h5>
                <p>بوابة المستثمر، حائل</p>
            </div>
            <div class="user-avatar-circle">م</div>
        </div>
    </div>
</header>

<!-- ============================================================
     الأنماط الأساسية للهيدر (تُستكمل بـ dashboard.css)
     ============================================================ -->
<style>
    /* ============================================
       هذه الأنماط مدمجة هنا لضمان عمل الهيدر بشكل مستقل
       في حال عدم وجود ملف dashboard.css
       ============================================ */
    
    /* متغيرات أساسية */
    :root {
        --tera-teal: #028090;
        --tera-teal-light: #14b8a6;
        --tera-navy: #0A1B3F;
        --tera-gray: #64748b;
        --header-height: 75px;
    }

    /* إعادة تعيين أساسي */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    /* ============================================
       تنسيقات الهيدر العلوي
       ============================================ */
    .top-header {
        height: var(--header-height);
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 30px;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 998;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        transition: all 0.3s ease;
    }

    .header-right-actions {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .header-logo {
        flex-shrink: 0;
        display: flex;
        align-items: center;
    }

    .header-logo img {
        height: 40px;
        width: auto;
        display: block;
        transition: opacity 0.3s ease;
        flex-shrink: 0;
        filter: none !important;
        opacity: 1 !important;
    }

    .header-logo img:hover {
        opacity: 0.85;
    }

    /* زر تبديل القائمة (الوحيد) */
    .menu-toggle-btn {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        color: #64748b;
        font-size: 20px;
        width: 42px;
        height: 42px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s ease;
        flex-shrink: 0;
    }

    .menu-toggle-btn:hover {
        background: var(--tera-teal);
        border-color: var(--tera-teal);
        color: #ffffff;
        transform: scale(1.04);
    }

    .menu-toggle-btn:active {
        transform: scale(0.94);
    }

    /* بيانات المستخدم */
    .header-left-actions {
        display: flex;
        align-items: center;
    }

    .user-profile-block {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 4px 0;
    }

    .user-meta {
        text-align: left;
    }

    .user-meta h5 {
        margin: 0;
        font-size: 14px;
        color: var(--tera-navy);
        font-weight: 800;
        font-family: 'Cairo', sans-serif;
        line-height: 1.3;
        letter-spacing: -0.2px;
    }

    .user-meta p {
        margin: 0;
        font-size: 11px;
        color: var(--tera-gray);
        font-weight: 600;
        line-height: 1.4;
        margin-top: 2px;
    }

    .user-avatar-circle {
        width: 44px;
        height: 44px;
        background-color: var(--tera-navy);
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 800;
        border: 2px solid var(--tera-teal);
        flex-shrink: 0;
        transition: all 0.3s ease;
        cursor: default;
        user-select: none;
    }

    .user-avatar-circle:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(2, 128, 144, 0.25);
    }

    /* ============================================
       فئات مساعدة
       ============================================ */
    .no-print {
        /* يمكن إضافة تنسيقات للطباعة هنا */
    }

    /* ============================================
       التجاوب (Responsive)
       ============================================ */
    @media (max-width: 991px) {
        :root {
            --header-height: 60px;
        }

        .top-header {
            height: var(--header-height);
            padding: 0 16px;
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
        }

        .header-logo img {
            height: 36px; /* أكبر قليلاً للوضوح */
        }

        .header-right-actions {
            gap: 12px;
        }

        .menu-toggle-btn {
            width: 38px;
            height: 38px;
            font-size: 18px;
            border-radius: 8px;
        }

        .user-meta {
            display: none;
        }

        .user-avatar-circle {
            width: 38px;
            height: 38px;
            font-size: 16px;
            border-width: 2px;
        }
    }

    @media (max-width: 480px) {
        .top-header {
            padding: 0 12px;
        }

        .header-logo img {
            height: 30px;
        }

        .menu-toggle-btn {
            width: 34px;
            height: 34px;
            font-size: 16px;
        }

        .user-avatar-circle {
            width: 34px;
            height: 34px;
            font-size: 14px;
        }
    }

    /* دعم الوضع المظلم */
    @media (prefers-color-scheme: dark) {
        .top-header {
            background: #1e293b;
            border-bottom-color: #334155;
        }

        .top-header .user-meta h5 {
            color: #f8fafc;
        }

        .top-header .user-meta p {
            color: #94a3b8;
        }

        .menu-toggle-btn {
            background: #334155;
            border-color: #475569;
            color: #cbd5e1;
        }

        .menu-toggle-btn:hover {
            background: var(--tera-teal);
            color: #ffffff;
        }
    }

    /* تقليل الحركة */
    @media (prefers-reduced-motion: reduce) {
        .top-header,
        .menu-toggle-btn,
        .user-avatar-circle,
        .header-logo img {
            transition: none !important;
            animation: none !important;
            transform: none !important;
        }
    }
</style>
