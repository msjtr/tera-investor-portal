<!-- ==========================================
     كود الهيدر العلوي (يُوضع أعلى الـ main-content)
     ========================================== -->
<header class="top-header no-print">
    
    <div class="header-right-actions">
        <!-- زر فتح القائمة الجانبية (يظهر في الجوال فقط) -->
        <button class="menu-toggle-btn d-lg-none" id="openSidebarBtn">
            <i class="fas fa-bars"></i>
        </button>
        
        <!-- الشعار -->
        <div class="header-logo">
            <a href="/pages/dashboard/index.html">
                <img src="/images/logo.svg" 
                     alt="Tera Logo" 
                     onerror="this.src='https://via.placeholder.com/150x45/028090/fff?text=Tera+Portal'" />
            </a>
        </div>
    </div>

    <div class="header-left-actions">
        <!-- ملف المستخدم -->
        <div class="user-profile-block">
            <div class="user-meta">
                <h5>محمد صالح جميعان الشمري</h5>
                <p>بوابة المستثمر، حائل</p>
            </div>
            <div class="user-avatar-circle">م</div>
        </div>
    </div>

</header>

<style>
    /* =========================================
       تنسيقات الهيدر العلوي (Top Header)
       ========================================= */
    .top-header {
        height: 80px;
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        position: sticky;
        top: 0;
        z-index: 1000;
        width: 100%;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }

    .header-right-actions {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .header-logo a {
        display: flex;
        align-items: center;
        text-decoration: none;
    }

    .header-logo img {
        height: 45px;
        width: auto;
        object-fit: contain;
        transition: transform 0.3s ease;
    }

    .header-logo img:hover {
        transform: scale(1.02);
    }

    .header-left-actions {
        display: flex;
        align-items: center;
    }

    /* تنسيقات بيانات المستخدم */
    .user-profile-block {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .user-meta {
        text-align: left;
    }

    .user-meta h5 {
        margin: 0;
        font-size: 15px;
        color: #0A1B3F; /* Tera Navy */
        font-weight: 800;
        font-family: 'Cairo', sans-serif;
    }

    .user-meta p {
        margin: 4px 0 0 0;
        font-size: 12px;
        color: #64748b; /* Tera Gray */
        font-weight: 600;
    }

    .user-avatar-circle {
        width: 48px;
        height: 48px;
        background-color: #0A1B3F;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        font-size: 22px;
        font-weight: 800;
        border: 2px solid #028090; /* Tera Teal */
        box-shadow: 0 4px 10px rgba(2,128,144,0.15);
    }

    /* زر القائمة الجانبية (مخفي في الشاشات الكبيرة) */
    .menu-toggle-btn {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        color: #64748b;
        font-size: 20px;
        width: 42px;
        height: 42px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s ease;
    }

    .menu-toggle-btn:hover {
        background: #028090;
        color: #ffffff;
        border-color: #028090;
    }

    @media (min-width: 992px) {
        .d-lg-none { display: none !important; }
    }

    /* =========================================
       التجاوب مع شاشات الجوال (Mobile)
       ========================================= */
    @media (max-width: 991px) {
        .top-header {
            height: 65px; /* تقليل الارتفاع في الجوال لمنع الفراغ */
            padding: 0 15px;
        }

        .header-logo img {
            height: 35px; /* تصغير الشعار قليلاً ليناسب الشاشة */
        }

        .header-right-actions {
            gap: 15px;
        }

        .user-avatar-circle {
            width: 40px;
            height: 40px;
            font-size: 18px;
            border-radius: 10px;
        }

        /* إخفاء نصوص الاسم والمنطقة في الجوال لمنع التداخل والاهتزاز */
        .user-meta {
            display: none;
        }
    }
</style>
