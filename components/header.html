<!-- ============================================================
     الهيدر العلوي (Header) – مكون مستقل قابل لإعادة الاستخدام
     ============================================================
     الاستخدام:
       - تضمينه مباشرة: <div id="header-container"></div>
       - أو باستخدام fetch: fetch('/components/header.html')
       - أو باستخدام SSI: <!--#include virtual="/components/header.html" -->
     ============================================================ -->

<header class="top-header no-print" role="banner">
    
    <!-- ==========================================
    الجزء الأيمن (الشعار + زر القائمة)
    ========================================== -->
    <div class="header-right-actions">
        
        <!-- زر تبديل القائمة الجانبية (الزر الوحيد) -->
        <button class="menu-toggle-btn" id="sidebarToggle" aria-label="تبديل القائمة الجانبية" title="تبديل القائمة">
            <i class="fas fa-bars"></i>
        </button>

        <!-- الشعار -->
        <div class="header-logo">
            <a href="/pages/dashboard/index.html" aria-label="الرئيسية">
                <img src="/images/logo.svg" 
                     alt="Tera Investor Portal" 
                     onerror="this.src='https://via.placeholder.com/150x45/028090/fff?text=Tera+Portal'" />
            </a>
        </div>
    </div>

    <!-- ==========================================
    الجزء الأيسر (بيانات المستخدم)
    ========================================== -->
    <div class="header-left-actions">
        <div class="user-profile-block">
            <div class="user-meta">
                <h5>محمد صالح جميعان الشمري</h5>
                <p>بوابة المستثمر، حائل</p>
            </div>
            <div class="user-avatar-circle" aria-hidden="true">م</div>
        </div>
    </div>
</header>

<!-- ============================================================
     الأنماط الأساسية للهيدر (تعمل بشكل مستقل)
     ============================================================ -->
<style>
    /* ============================================
       هذه الأنماط مدمجة لضمان عمل الهيدر بشكل مستقل
       حتى في حال عدم وجود ملف dashboard.css
       ============================================ */

    /* --------------------------------------------
       المتغيرات الأساسية
       -------------------------------------------- */
    :root {
        --tera-teal: #028090;
        --tera-teal-light: #14b8a6;
        --tera-navy: #0A1B3F;
        --tera-gray: #64748b;
        --tera-bg: #f8fafc;
        --header-height: 75px;
    }

    /* --------------------------------------------
       إعادة تعيين أساسية للهيدر
       -------------------------------------------- */
    .top-header * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    /* --------------------------------------------
       الهيدر العلوي
       -------------------------------------------- */
    .top-header {
        height: var(--header-height);
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 30px;
        position: sticky;
        top: 0;
        left: 0;
        right: 0;
        z-index: 998;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        transition: all 0.3s ease;
        width: 100%;
        min-height: var(--header-height);
    }

    /* --------------------------------------------
       الجزء الأيمن
       -------------------------------------------- */
    .header-right-actions {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-shrink: 0;
    }

    /* --------------------------------------------
       الشعار
       -------------------------------------------- */
    .header-logo {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        line-height: 0;
    }

    .header-logo a {
        display: block;
        line-height: 0;
    }

    .header-logo img {
        height: 44px;
        width: auto;
        display: block;
        flex-shrink: 0;
        filter: none !important;
        opacity: 1 !important;
        max-width: none !important;
        image-rendering: auto;
        transition: opacity 0.3s ease;
    }

    .header-logo img:hover {
        opacity: 0.85;
    }

    /* --------------------------------------------
       زر تبديل القائمة
       -------------------------------------------- */
    .menu-toggle-btn {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        color: #64748b;
        font-size: 20px;
        width: 44px;
        height: 44px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s ease;
        flex-shrink: 0;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    .menu-toggle-btn:hover {
        background: var(--tera-teal);
        border-color: var(--tera-teal);
        color: #ffffff;
        transform: scale(1.04);
    }

    .menu-toggle-btn:active {
        transform: scale(0.92);
    }

    /* --------------------------------------------
       بيانات المستخدم
       -------------------------------------------- */
    .header-left-actions {
        display: flex;
        align-items: center;
        flex-shrink: 0;
    }

    .user-profile-block {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 4px 0;
    }

    .user-meta {
        text-align: left;
    }

    .user-meta h5 {
        margin: 0;
        font-size: 15px;
        color: var(--tera-navy);
        font-weight: 800;
        font-family: 'Cairo', 'Tajawal', sans-serif;
        line-height: 1.3;
        letter-spacing: -0.2px;
    }

    .user-meta p {
        margin: 0;
        font-size: 12px;
        color: var(--tera-gray);
        font-weight: 600;
        line-height: 1.4;
        margin-top: 2px;
    }

    .user-avatar-circle {
        width: 46px;
        height: 46px;
        background-color: var(--tera-navy);
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-size: 20px;
        font-weight: 800;
        border: 2px solid var(--tera-teal);
        flex-shrink: 0;
        transition: all 0.3s ease;
        cursor: default;
        user-select: none;
        font-family: 'Cairo', 'Tajawal', sans-serif;
    }

    .user-avatar-circle:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(2, 128, 144, 0.25);
    }

    /* --------------------------------------------
       فئات مساعدة
       -------------------------------------------- */
    .no-print {
        /* للطباعة */
    }

    /* --------------------------------------------
       التجاوب (Responsive)
       -------------------------------------------- */

    /* شاشات متوسطة (تابلت) */
    @media (max-width: 991px) {
        :root {
            --header-height: 64px;
        }

        .top-header {
            height: var(--header-height) !important;
            padding: 0 16px !important;
            min-height: var(--header-height) !important;
        }

        .header-logo img {
            height: 40px !important;
        }

        .menu-toggle-btn {
            width: 40px !important;
            height: 40px !important;
            font-size: 18px !important;
        }

        .user-meta {
            display: none !important;
        }

        .user-avatar-circle {
            width: 40px !important;
            height: 40px !important;
            font-size: 18px !important;
        }

        .header-right-actions {
            gap: 12px !important;
        }

        .user-profile-block {
            gap: 10px !important;
        }
    }

    /* شاشات صغيرة (جوال) */
    @media (max-width: 480px) {
        :root {
            --header-height: 58px;
        }

        .top-header {
            height: var(--header-height) !important;
            padding: 0 12px !important;
            min-height: var(--header-height) !important;
        }

        .header-logo img {
            height: 34px !important;
        }

        .menu-toggle-btn {
            width: 36px !important;
            height: 36px !important;
            font-size: 16px !important;
        }

        .user-avatar-circle {
            width: 36px !important;
            height: 36px !important;
            font-size: 16px !important;
        }

        .header-right-actions {
            gap: 10px !important;
        }

        .user-profile-block {
            gap: 8px !important;
        }
    }

    /* --------------------------------------------
       دعم الوضع المظلم (Dark Mode)
       -------------------------------------------- */
    @media (prefers-color-scheme: dark) {
        .top-header {
            background: #1e293b !important;
            border-bottom-color: #334155 !important;
        }

        .top-header .user-meta h5 {
            color: #f8fafc !important;
        }

        .top-header .user-meta p {
            color: #94a3b8 !important;
        }

        .menu-toggle-btn {
            background: #334155 !important;
            border-color: #475569 !important;
            color: #cbd5e1 !important;
        }

        .menu-toggle-btn:hover {
            background: var(--tera-teal) !important;
            color: #ffffff !important;
            border-color: var(--tera-teal) !important;
        }

        .user-avatar-circle {
            background-color: #0f172a !important;
            border-color: var(--tera-teal-light) !important;
        }
    }

    /* --------------------------------------------
       تقليل الحركة
       -------------------------------------------- */
    @media (prefers-reduced-motion: reduce) {
        .top-header,
        .menu-toggle-btn,
        .user-avatar-circle,
        .header-logo img {
            transition: none !important;
            animation: none !important;
            transform: none !important;
        }

        .menu-toggle-btn:hover {
            transform: none !important;
        }

        .user-avatar-circle:hover {
            transform: none !important;
        }
    }

    /* --------------------------------------------
       تحسين إمكانية الوصول
       -------------------------------------------- */
    .menu-toggle-btn:focus-visible,
    .header-logo a:focus-visible {
        outline: 2px solid var(--tera-teal);
        outline-offset: 2px;
        border-radius: 4px;
    }
</style>

<!-- ============================================================
     سكربت إضافي لربط الهيدر مع القائمة الجانبية
     ============================================================ -->
<script>
    (function() {
        'use strict';

        /**
         * ربط زر الهيدر مع القائمة الجانبية
         * يتم تشغيله تلقائياً عند تحميل الهيدر
         */
        function initHeaderSidebar() {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            if (!toggleBtn) {
                console.warn('⚠️ Header: #sidebarToggle button not found.');
                return;
            }

            if (!sidebar) {
                console.warn('⚠️ Header: #sidebar element not found.');
                return;
            }

            const isMobile = function() {
                return window.innerWidth <= 991;
            };

            // إزالة أي مستمع قديم لتجنب التكرار
            toggleBtn.removeEventListener('click', handleToggle);
            toggleBtn.addEventListener('click', handleToggle);

            function handleToggle(e) {
                e.preventDefault();
                e.stopPropagation();

                if (!isMobile()) {
                    // الديسكتوب: تصغير/تكبير القائمة
                    sidebar.classList.toggle('collapsed');
                    sidebar.classList.remove('sidebar-open');
                    if (overlay) overlay.classList.remove('active');
                } else {
                    // الجوال: فتح/غلق القائمة المنسدلة
                    const isOpen = sidebar.classList.contains('sidebar-open');
                    if (isOpen) {
                        sidebar.classList.remove('sidebar-open');
                        if (overlay) overlay.classList.remove('active');
                    } else {
                        sidebar.classList.add('sidebar-open');
                        if (overlay) overlay.classList.add('active');
                    }
                }
            }

            // إغلاق القائمة عند تغيير حجم النافذة من جوال إلى ديسكتوب
            window.addEventListener('resize', function() {
                if (window.innerWidth > 991 && sidebar) {
                    sidebar.classList.remove('sidebar-open');
                    if (overlay) overlay.classList.remove('active');
                }
            });

            console.log('✅ Header: Sidebar toggle connected successfully.');
        }

        // تشغيل التهيئة عند تحميل DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initHeaderSidebar);
        } else {
            // DOM جاهز بالفعل
            initHeaderSidebar();
        }
    })();
</script>
