<header class="top-header no-print">
    <div class="header-logo">
        <button class="sidebar-toggle btn-action" id="sidebarToggle" style="padding: 8px 15px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; cursor: pointer; display: none;">
            <i class="fas fa-bars" style="color: var(--tera-navy);"></i>
        </button>

        <a href="/pages/dashboard/index.html" style="display: flex; align-items: center; text-decoration: none; gap: 15px;">
            <img src="/images/logo.svg" 
                 alt="Tera Logo" 
                 class="logo-img"
                 style="height: 40px; width: auto; object-fit: contain; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; transform: translateZ(0); will-change: transform;" 
                 onerror="this.src='https://via.placeholder.com/120x40/028090/fff?text=Tera+Portal'" />
            <h1 style="margin: 0; font-size: 20px; color: var(--tera-navy); font-weight: 700;">بوابة المستثمر</h1>
        </a>
    </div>

    <div class="header-user">
        
        <div class="notifications-wrapper" style="position: relative; cursor: pointer; margin-left: 20px;" data-tooltip="الإشعارات">
            <i class="fas fa-bell" style="font-size: 22px; color: var(--tera-gray); transition: 0.2s;"></i>
            <span class="badge" style="background: #ef4444; color: #fff; position: absolute; font-size: 10px; font-weight: bold; padding: 3px 6px; border-radius: 50%; top: -8px; right: -8px; border: 2px solid #fff; box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);">3</span>
        </div>
        
        <div class="user-greeting">
            <h4 id="clientNameDisplay">محمد صالح جميعان الشمري</h4>
            <p id="clientLocationDisplay">بوابة الاستثمار، حائل</p>
        </div>

        <div class="user-avatar" style="cursor: pointer;" data-tooltip="إعدادات الحساب">
            <img src="https://ui-avatars.com/api/?name=محمد+الشمري&background=0A1B3F&color=fff&size=100&bold=true" 
                 alt="User Avatar" 
                 style="border-radius: 50%; border: 2px solid #e2e8f0; width: 45px; height: 45px; object-fit: cover; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.2s;" 
                 onmouseover="this.style.borderColor='var(--tera-teal)'"
                 onmouseout="this.style.borderColor='#e2e8f0'" />
        </div>
        
    </div>
</header>

<style>
    /* إظهار زر القائمة الجانبية في الشاشات الأصغر من 991px */
    @media (max-width: 991px) {
        .header-logo .sidebar-toggle { display: block !important; }
    }
    
    /* تكبير الهيدر والشعار في شاشات 4K */
    @media (min-width: 2560px) {
        .header-logo img { height: 60px !important; }
        .header-logo h1 { font-size: 28px !important; }
        .user-greeting h4 { font-size: 18px !important; }
        .user-greeting p { font-size: 16px !important; }
        .user-avatar img { width: 60px !important; height: 60px !important; }
        .notifications-wrapper i { font-size: 28px !important; }
        .notifications-wrapper .badge { font-size: 14px !important; padding: 4px 8px !important; }
    }
</style>
