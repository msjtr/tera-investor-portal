<!-- ========================================
     header.html - الشريط العلوي (الهيدر)
     ======================================== -->
<header class="header">
    <div class="header-left">
        <!-- زر تبديل القائمة الجانبية (للشاشات الصغيرة) -->
        <button class="sidebar-toggle" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
        <!-- عنوان الصفحة (ديناميكي، يمكن تغييره حسب الصفحة) -->
        <h1 class="page-title">لوحة التحكم</h1>
    </div>

    <div class="header-right">
        <!-- أيقونة الإشعارات -->
        <div class="notifications" title="الإشعارات">
            <i class="fas fa-bell"></i>
            <span class="badge">3</span>
        </div>

        <!-- معلومات المستخدم -->
        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=أحمد+محمد&background=0D6EFD&color=fff&size=40" alt="صورة المستخدم" />
            <span class="user-name">أحمد محمد</span>
        </div>
    </div>
</header>
