<style>
    .tera-header {
        height: 70px;
        background: var(--tera-white, #ffffff);
        border-bottom: 1px solid var(--tera-border, #E2E8F0);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 30px;
        position: sticky;
        top: 0;
        z-index: 900;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    /* زر القائمة الجانبية (يظهر فقط على الموبايل والتابلت) */
    .menu-toggle {
        display: none;
        background: none;
        border: 1px solid var(--tera-border);
        color: var(--tera-primary);
        font-size: 1.2rem;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
    }

    @media (max-width: 992px) {
        .menu-toggle { display: block; }
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .notification-bell {
        position: relative;
        font-size: 1.2rem;
        color: var(--tera-text-light);
        cursor: pointer;
    }

    #notificationCount {
        position: absolute;
        top: -5px;
        right: -5px;
        background: #EF4444;
        color: white;
        font-size: 0.65rem;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: none; /* يتم إظهاره عبر JS عند وجود إشعارات */
        align-items: center;
        justify-content: center;
        font-weight: 800;
    }

    .user-profile-summary {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        padding: 5px;
        border-radius: 8px;
        transition: 0.3s;
    }

    .user-profile-summary:hover { background: #F8FAFC; }

    .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--tera-secondary);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 0.9rem;
    }

    .investor-name {
        font-weight: 700;
        color: var(--tera-primary);
        font-size: 0.9rem;
    }
</style>

<header class="tera-header">
    <div class="header-left">
        <button class="menu-toggle" id="sidebarToggle">
            <i class="fa-solid fa-bars"></i>
        </button>
        <h2 class="page-title" style="margin: 0; font-size: 1.2rem;">بوابة المستثمر</h2>
    </div>

    <div class="header-right">
        <div class="notification-bell">
            <i class="fa-solid fa-bell"></i>
            <span id="notificationCount">0</span>
        </div>

        <div class="user-profile-summary" onclick="window.location.href='/pages/profile/personal-information.html'">
            <div class="user-avatar" id="userAvatarInitials">م</div>
            <span class="investor-name">جاري التحميل...</span>
        </div>
    </div>
</header>

<script>
    // تحديث بيانات المستخدم في الهيدر عند تحميله
    (function updateHeaderData() {
        const userData = JSON.parse(localStorage.getItem('tera_user'));
        if (userData && userData.fullName) {
            const nameEl = document.querySelector('.investor-name');
            const avatarEl = document.getElementById('userAvatarInitials');
            
            nameEl.textContent = userData.fullName;
            
            // استخراج أول حرف من الاسم للصورة الرمزية
            const initial = userData.fullName.charAt(0);
            avatarEl.textContent = initial;
        }
    })();
</script>
