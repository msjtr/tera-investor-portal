<header class="header">
    <div class="header-left">
        <button class="sidebar-toggle" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
        <a href="/pages/dashboard" class="back-to-dashboard" id="backToDashboardLink">

            <span>العودة للوحة التحكم</span>
