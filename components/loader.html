<style>
    /* حاوية اللودر (تغطي كامل الشاشة) */
    .tera-loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.95); /* خلفية بيضاء شبه شفافة */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        backdrop-filter: blur(5px);
    }

    /* تأثير الدوران للـ Logo */
    .loader-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
        animation: pulse 1.5s infinite ease-in-out;
    }

    /* مؤشر التحميل الدائري */
    .loader-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid var(--tera-secondary, #00C2C7);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    /* نصوص التحميل */
    .loader-text {
        margin-top: 15px;
        color: var(--tera-primary, #0A1B3F);
        font-weight: 700;
        font-family: var(--font-heading, 'Tajawal', sans-serif);
        letter-spacing: 1px;
    }

    /* تحريك اللوجو */
    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
    }

    /* تحريك الدوران */
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<div class="tera-loader-overlay" id="tera-loader">
    <img src="../../assets/images/logo-icon.png" alt="TERA Logo" class="loader-logo">
    
    <div class="loader-spinner"></div>
    
    <div class="loader-text">جاري التحميل...</div>
</div>
