<!-- ========================================
     loader.html - مؤشر التحميل (Spinner)
     ======================================== -->
<div class="loader-wrapper" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 50px 30px;">

    <!-- 1. مؤشر تحميل دائري (CSS) -->
    <div class="spinner" style="width: 50px; height: 50px; border: 6px solid var(--gray-200); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>

    <!-- 2. مؤشر مع نص -->
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="spinner" style="width: 30px; height: 30px; border: 4px solid var(--gray-200); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        <span style="color: var(--gray-600); font-weight: 500;">جاري التحميل، يرجى الانتظار...</span>
    </div>

    <!-- 3. مؤشر تحميل باستخدام FontAwesome (اختياري) -->
    <div style="display: flex; align-items: center; gap: 15px;">
        <i class="fas fa-spinner fa-pulse" style="font-size: 28px; color: var(--primary-color);"></i>
        <span style="color: var(--gray-600); font-weight: 500;">جاري معالجة الطلب...</span>
    </div>

    <!-- إضافة Keyframes للدوران -->
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</div>
