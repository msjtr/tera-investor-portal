<!-- ========================================
     cards.html - البطاقات الإحصائية
     ======================================== -->
<div class="cards-wrapper" style="padding: 20px 30px;">

    <!-- شبكة البطاقات -->
    <div class="stats-grid">

        <!-- بطاقة 1: إجمالي الاستثمارات -->
        <div class="stat-card">
            <div class="stat-icon" style="background: #D1E7DD; color: #0F5132;">
                <i class="fas fa-coins"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">إجمالي الاستثمارات</span>
                <span class="stat-value">$124,500</span>
            </div>
        </div>

        <!-- بطاقة 2: الأرباح المحققة -->
        <div class="stat-card">
            <div class="stat-icon" style="background: #CCE5FF; color: #084298;">
                <i class="fas fa-chart-pie"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">الأرباح المحققة</span>
                <span class="stat-value">$18,200</span>
            </div>
        </div>

        <!-- بطاقة 3: الاستثمارات النشطة -->
        <div class="stat-card">
            <div class="stat-icon" style="background: #FFF3CD; color: #856404;">
                <i class="fas fa-hand-holding-usd"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">الاستثمارات النشطة</span>
                <span class="stat-value">12</span>
            </div>
        </div>

        <!-- بطاقة 4: قيد الانتظار -->
        <div class="stat-card">
            <div class="stat-icon" style="background: #F8D7DA; color: #721C24;">
                <i class="fas fa-clock"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">قيد الانتظار</span>
                <span class="stat-value">3</span>
            </div>
        </div>

    </div>
</div>
