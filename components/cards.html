<template id="tera-stat-card-template">
    <div class="stat-card">
        <div class="stat-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div class="stat-icon" style="width: 48px; height: 48px; border-radius: 12px; background: rgba(0, 194, 199, 0.1); color: var(--tera-secondary); display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                <i class="fa-solid fa-wallet"></i>
            </div>
            <div class="stat-trend" style="font-size: 0.85rem; font-weight: 700; color: #10B981; background: rgba(16, 185, 129, 0.1); padding: 4px 8px; border-radius: 8px;">
                <i class="fa-solid fa-arrow-trend-up"></i> +5.2%
            </div>
        </div>
        <div class="stat-details">
            <h4 class="stat-title" style="color: var(--tera-text-light); font-size: 0.9rem; font-weight: 600; margin: 0 0 5px 0;">إجمالي المحفظة</h4>
            <div class="stat-value" style="color: var(--tera-primary); font-size: 1.8rem; font-weight: 800; font-family: var(--font-heading);">
                0 <span class="currency" style="font-size: 1rem; color: var(--tera-text-light);">ر.س</span>
            </div>
        </div>
    </div>
</template>

<template id="tera-glass-panel-template">
    <div class="glass-panel">
        <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px;">
            <h3 class="panel-title" style="margin: 0; color: var(--tera-primary); font-size: 1.2rem; font-weight: 800;">
                <i class="fa-solid fa-chart-pie" style="color: var(--tera-secondary); margin-left: 8px;"></i>
                ملخص الأداء
            </h3>
            <button class="btn-icon" style="background: none; border: none; color: var(--tera-text-light); cursor: pointer;"><i class="fa-solid fa-ellipsis"></i></button>
        </div>
        <div class="panel-body">
            <p style="color: var(--tera-text); font-size: 0.9rem; line-height: 1.6;">
                هذه المساحة مخصصة لعرض الرسوم البيانية أو القوائم المصغرة داخل تأثير الزجاج الضبابي (Glassmorphism).
            </p>
        </div>
    </div>
</template>
