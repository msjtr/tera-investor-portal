    <div class="sidebar-logo">
        <img src="../../images/logo.svg" alt="تيرا">
    </div>
    
    <nav class="sidebar-menu">
        <a href="../dashboard/index.html" class="menu-item" data-page="dashboard">
            <i class="fa-solid fa-chart-pie"></i> نظرة عامة
        </a>
        <a href="../investments/opportunities.html" class="menu-item" data-page="investments">
            <i class="fa-solid fa-briefcase"></i> الفرص الاستثمارية
        </a>
        <a href="../portfolio/portfolio-overview.html" class="menu-item" data-page="portfolio">
            <i class="fa-solid fa-wallet"></i> المحفظة والأصول
        </a>
        <a href="../reports/reports-dashboard.html" class="menu-item" data-page="reports">
            <i class="fa-solid fa-file-invoice-dollar"></i> التقارير المالية
        </a>
        <a href="../profile/personal-information.html" class="menu-item" data-page="profile">
            <i class="fa-solid fa-user-shield"></i> الملف الشخصي
        </a>
        <a href="../security/change-password.html" class="menu-item" data-page="security">
            <i class="fa-solid fa-lock"></i> الأمان

    <div class="sidebar-footer">
        <button class="btn-logout" id="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج
        </button>
    </div>
</aside>

<style>
    .tera-sidebar {
        width: 280px;
        min-height: 100vh;
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        flex-shrink: 0; /* منع انضغاط القائمة */
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar-logo { text-align: center; margin-bottom: 40px; }
    .sidebar-logo img { width: 140px; }
    
    .sidebar-menu { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
    .menu-item {
        display: flex; align-items: center; gap: 15px; padding: 15px 20px;
        text-decoration: none; color: #475569; border-radius: 12px;
        font-weight: 600; transition: 0.3s;
    }
    .menu-item:hover, .menu-item.active {
        background: var(--tera-teal);
        color: white;
    }
    .menu-item i { width: 20px; text-align: center; }

    .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); }
    .btn-logout {
        width: 100%; border: none; background: transparent; color: #ef4444;
        padding: 15px; display: flex; align-items: center; gap: 15px;
        font-weight: 700; cursor: pointer; border-radius: 12px; transition: 0.3s;
    }
    .btn-logout:hover { background: rgba(239, 68, 68, 0.05); }

    /* التجاوب */
    @media (max-width: 992px) {
        .tera-sidebar { 
            position: fixed; right: -280px; top: 0; height: 100vh; 
            z-index: 1000; background: white; box-shadow: 2px 0 20px rgba(0,0,0,0.1);
        }
        .tera-sidebar.active { right: 0; }
    }
</style>

<script>
    // تفعيل الرابط النشط
    const path = window.location.pathname;
    document.querySelectorAll('.menu-item').forEach(item => {
        if (path.includes(item.getAttribute('data-page'))) {
            item.classList.add('active');
        }
    });

    // تفعيل زر الخروج
    const logoutBtn = document.getElementById('btn-logout');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
            if(confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                if(typeof Session !== 'undefined') {
                    Session.logout();
                } else {
                    localStorage.clear();
                    window.location.href = '/auth/auth/login/login.html';
                }
            }
        });
    }

    // تفعيل زر التبديل في الهيدر (إذا ضغط المستخدم عليه)
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    if (toggleBtn && sidebar) {
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });
    }
</script>
