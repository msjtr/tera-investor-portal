<style>
    /* الحاوية التي ستظهر فيها التنبيهات */
    .tera-alerts-wrapper {
        position: fixed;
        top: 20px;
        right: 20px; /* تغيير لـ right بما أن الموقع RTL */
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 15px;
        pointer-events: none;
    }

    .tera-alert {
        min-width: 320px;
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        border-right: 5px solid transparent;
        pointer-events: auto;
        animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
        from { transform: translateX(50px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .alert-icon { font-size: 1.5rem; }
    .alert-content h4 { margin: 0; font-size: 0.95rem; color: #1e293b; }
    .alert-content p { margin: 2px 0 0; font-size: 0.85rem; color: #64748b; }

    /* الأنواع */
    .alert-success { border-right-color: #10b981; }
    .alert-success .alert-icon { color: #10b981; }

    .alert-error { border-right-color: #ef4444; }
    .alert-error .alert-icon { color: #ef4444; }
</style>

<div class="tera-alerts-wrapper" id="teraAlertsWrapper"></div>

<script>
    /**
     * نظام إظهار التنبيهات (استدعه من أي ملف JS باستخدام TeraAlert.show)
     */
    window.TeraAlert = {
        show: function(type, title, message) {
            const wrapper = document.getElementById('teraAlertsWrapper');
            const alert = document.createElement('div');
            
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
            
            alert.className = `tera-alert alert-${type}`;
            alert.innerHTML = `
                <div class="alert-icon"><i class="fa-solid ${icon}"></i></div>
                <div class="alert-content">
                    <h4>${title}</h4>
                    <p>${message}</p>
                </div>
            `;
            
            wrapper.appendChild(alert);
            
            // إخفاء التنبيه تلقائياً بعد 5 ثوانٍ
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 400);
            }, 5000);
        }
    };
</script>
