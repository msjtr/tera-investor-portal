<!-- ========================================
     alerts.html - رسائل التنبيه
     ======================================== -->
<div class="alerts-wrapper" style="padding: 20px 30px;">

    <!-- تنبيه نجاح -->
    <div class="alert alert-success" style="background: #D1E7DD; color: #0F5132; padding: 15px 20px; border-radius: var(--border-radius); border-right: 5px solid #198754; margin-bottom: 15px; display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-check-circle" style="font-size: 20px;"></i>
        <span><strong>تم بنجاح!</strong> تم تحديث بياناتك الشخصية بنجاح.</span>
        <button type="button" style="margin-right: auto; background: none; border: none; font-size: 20px; cursor: pointer; color: inherit;" onclick="this.parentElement.style.display='none';">&times;</button>
    </div>

    <!-- تنبيه تحذير -->
    <div class="alert alert-warning" style="background: #FFF3CD; color: #856404; padding: 15px 20px; border-radius: var(--border-radius); border-right: 5px solid #FFC107; margin-bottom: 15px; display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-exclamation-triangle" style="font-size: 20px;"></i>
        <span><strong>تنبيه!</strong> رصيدك الحالي منخفض، يرجى إيداع مبلغ إضافي.</span>
        <button type="button" style="margin-right: auto; background: none; border: none; font-size: 20px; cursor: pointer; color: inherit;" onclick="this.parentElement.style.display='none';">&times;</button>
    </div>

    <!-- تنبيه خطأ -->
    <div class="alert alert-danger" style="background: #F8D7DA; color: #721C24; padding: 15px 20px; border-radius: var(--border-radius); border-right: 5px solid #DC3545; margin-bottom: 15px; display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-times-circle" style="font-size: 20px;"></i>
        <span><strong>خطأ!</strong> فشلت عملية التحويل، يرجى المحاولة مرة أخرى.</span>
        <button type="button" style="margin-right: auto; background: none; border: none; font-size: 20px; cursor: pointer; color: inherit;" onclick="this.parentElement.style.display='none';">&times;</button>
    </div>

    <!-- تنبيه معلومات -->
    <div class="alert alert-info" style="background: #CCE5FF; color: #084298; padding: 15px 20px; border-radius: var(--border-radius); border-right: 5px solid #0DCAF0; display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-info-circle" style="font-size: 20px;"></i>
        <span><strong>معلومات:</strong> سيتم إطلاق الميزة الجديدة خلال الأسبوع القادم.</span>
        <button type="button" style="margin-right: auto; background: none; border: none; font-size: 20px; cursor: pointer; color: inherit;" onclick="this.parentElement.style.display='none';">&times;</button>
    </div>

</div>
