<style>
    /* خلفية المودال (Overlay) */
    .modal {
        display: none; /* مخفي افتراضياً */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(10, 27, 63, 0.4); /* خلفية داكنة خفيفة */
        backdrop-filter: blur(8px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    /* هيكل المودال */
    .modal-content {
        background: var(--tera-white, #ffffff);
        border-radius: var(--tera-radius, 16px);
        width: 100%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 40px rgba(10, 27, 63, 0.2);
        animation: modalSlide 0.3s ease-out;
    }

    @keyframes modalSlide {
        from { transform: translateY(50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    /* رأس المودال */
    .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--tera-border, #E2E8F0);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-title {
        margin: 0;
        color: var(--tera-primary, #0A1B3F);
        font-weight: 800;
        font-size: 1.25rem;
    }

    /* محتوى المودال */
    .modal-body {
        padding: 24px;
        color: var(--tera-text, #1E293B);
        line-height: 1.6;
    }

    /* تذييل المودال (للأزرار) */
    .modal-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--tera-border, #E2E8F0);
        display: flex;
        justify-content: flex-end;
        gap: 12px;
    }

    /* إغلاق */
    .modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--tera-text-light, #64748B);
    }
</style>

<div id="teraGlobalModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">عنوان النافذة</h3>
            <button class="modal-close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">
            <p>المحتوى الافتراضي للنافذة يظهر هنا.</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" data-dismiss="modal" style="background: #E2E8F0; color: #475569;">إلغاء</button>
            <button class="btn btn-primary" id="modalConfirmBtn">تأكيد</button>
        </div>
    </div>
</div>
