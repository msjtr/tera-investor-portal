<!-- ========================================
     modals.html - النوافذ المنبثقة (مثال)
     ======================================== -->
<div class="modals-wrapper" style="padding: 20px 30px;">

    <!-- زر لفتح النافذة المنبثقة (للتجربة) -->
    <button class="btn btn-primary" onclick="document.getElementById('exampleModal').style.display='flex';">
        <i class="fas fa-eye"></i> معاينة النافذة المنبثقة
    </button>

    <!-- النافذة المنبثقة نفسها (مخفية افتراضياً) -->
    <div id="exampleModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center; padding: 20px;">
        <div class="modal-content" style="background: white; border-radius: var(--border-radius); max-width: 500px; width: 100%; padding: 30px; box-shadow: var(--box-shadow); position: relative; animation: fadeIn 0.3s ease;">
            
            <!-- زر الإغلاق (X) -->
            <button onclick="this.closest('#exampleModal').style.display='none';" style="position: absolute; top: 15px; left: 20px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--gray-600);">
                &times;
            </button>

            <!-- عنوان النافذة -->
            <h3 style="margin-bottom: 10px; font-weight: 700;">تأكيد العملية</h3>
            <p style="color: var(--gray-600); margin-bottom: 25px;">هل أنت متأكد من رغبتك في تنفيذ هذه العملية؟ لا يمكن التراجع عنها لاحقاً.</p>

            <!-- أزرار التحكم -->
            <div style="display: flex; gap: 10px; justify-content: flex-start;">
                <button class="btn btn-primary" onclick="alert('تم تأكيد العملية!'); this.closest('#exampleModal').style.display='none';">تأكيد</button>
                <button class="btn" style="background: var(--gray-200);" onclick="this.closest('#exampleModal').style.display='none';">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- إضافة Keyframe للتحريك -->
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</div>
