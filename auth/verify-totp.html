 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>التحقق من المصادقة الثنائية | تيرا</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- أيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ملفات CSS الأساسية -->
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">

    <style>
        :root {
            --primary: #028090;
            --primary-dark: #0A1B3F;
            --danger: #dc2626;
            --success: #059669;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #d1d9e6;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gray-900: #0A1B3F;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--gray-100);
            font-family: 'Tajawal', 'Cairo', sans-serif;
            margin: 0;
            color: var(--gray-900);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .focused-header {
            background: #ffffff;
            border-bottom: 1px solid var(--gray-200);
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            min-height: 60px;
            width: 100%;
        }
        .focused-header .logo img { height: 44px; width: auto; display: block; }
        .client-info { display: flex; align-items: center; gap: 12px; }
        .client-info h5 {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            color: var(--primary-dark);
            font-weight: 800;
        }
        .avatar {
            width: 38px;
            height: 38px;
            background: var(--primary-dark);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            border: 2px solid var(--primary);
            flex-shrink: 0;
        }

        .page-subheader {
            background: var(--primary-dark);
            padding: 16px 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-subheader h1 {
            margin: 0;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-subheader h1 i { color: #5eead4; }
        .btn-back {
            background: rgba(255,255,255,0.1);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-back:hover { background: var(--primary); border-color: var(--primary); }

        .content-container {
            max-width: 520px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
            width: 100%;
        }
        .auth-card {
            background: #ffffff;
            border-radius: var(--radius-xl);
            padding: 36px 28px 32px 28px;
            box-shadow: 0 25px 50px rgba(2,128,144,0.08);
            border: 1px solid var(--gray-200);
        }
        .text-center { text-align: center; }

        .totp-icon-circle {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: var(--success);
            box-shadow: 0 8px 20px rgba(5,150,105,0.15);
            border: 3px solid rgba(255,255,255,0.8);
        }
        .portal-title {
            color: var(--primary-dark);
            font-weight: 800;
            margin-bottom: 10px;
            font-size: 22px;
        }
        .instruction-wrapper {
            margin-bottom: 24px;
            background: var(--gray-50);
            padding: 12px 14px;
            border-radius: var(--radius-md);
            border-right: 4px solid var(--primary);
        }
        #instructionText {
            font-size: 14px;
            color: var(--gray-700);
            line-height: 1.6;
            margin-bottom: 6px;
        }
        #instructionEmailText {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-dark);
            word-break: break-all;
            direction: ltr;
            display: block;
            text-align: right;
            background: var(--gray-200);
            padding: 4px 10px;
            border-radius: 6px;
            margin-top: 8px;
        }

        .alert-box {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 14px;
        }
        .alert-box.show { display: flex; }
        .alert-box.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
        .alert-box.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }

        .otp-fields-container {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            direction: ltr;
        }
        .otp-input {
            width: 42px;
            height: 54px;
            text-align: center;
            font-weight: 800;
            font-size: 20px;
            border: 2px solid var(--gray-300);
            border-radius: var(--radius-sm);
            background: #ffffff;
            transition: 0.25s;
            caret-color: var(--primary);
            font-family: 'Tajawal', sans-serif;
            outline: none;
            direction: ltr;
            color: var(--gray-900);
        }
        .otp-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(2,128,144,0.1);
            background: #f0fdfa;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, #0d9488 100%);
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 16px rgba(2,128,144,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
            font-family: inherit;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #0d9488 0%, var(--primary-dark) 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(2,128,144,0.3);
        }
        .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

        .page-footer {
            text-align: center;
            padding: 16px 20px;
            color: #94a3b8;
            font-size: 13px;
            border-top: 1px solid var(--gray-200);
            background: #ffffff;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .focused-header { padding: 8px 16px; }
            .focused-header .logo img { height: 36px; }
            .client-info h5 { font-size: 13px; }
            .avatar { width: 32px; height: 32px; font-size: 14px; }
            .page-subheader { padding: 12px 16px; }
            .page-subheader h1 { font-size: 18px; }
            .content-container { padding: 0 12px; margin: 24px auto; }
            .auth-card { padding: 24px 18px 22px 18px; border-radius: 20px; }
            .totp-icon-circle { width: 60px; height: 60px; font-size: 26px; margin-bottom: 16px; }
            .portal-title { font-size: 19px; margin-bottom: 8px; }
            .instruction-wrapper { padding: 10px 12px; margin-bottom: 20px; }
            #instructionText { font-size: 13px; }
            #instructionEmailText { font-size: 13px; padding: 4px 8px; }
            .otp-input { width: 36px; height: 46px; font-size: 17px; }
            .btn-submit { padding: 13px 16px; font-size: 14px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <header class="focused-header no-print">
        <div class="logo">
            <img src="/images/logo.svg" alt="تيرا">
        </div>
        <div class="client-info">
            <h5 id="headerUserName">مستخدم</h5>
            <div class="avatar" id="headerAvatar">م</div>
        </div>
    </header>

    <div class="page-subheader no-print">
        <h1><i class="fas fa-shield-alt"></i> التحقق من المصادقة الثنائية</h1>
        <a href="/auth/auth/login/login.html" class="btn-back" id="backLink">
            <i class="fas fa-arrow-right"></i> العودة
        </a>
    </div>

    <main class="content-container">
        <div class="auth-card">
            <div class="text-center">
                <div class="totp-icon-circle">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2 class="portal-title">المصادقة الثنائية</h2>
            </div>

            <div class="instruction-wrapper">
                <p id="instructionText">أدخل رمز التحقق المكون من 6 أرقام من تطبيق المصادقة على هاتفك.</p>
                <span id="instructionEmailText"></span>
            </div>

            <div id="totpError" class="alert-box error" role="alert"></div>
            <div id="totpSuccess" class="alert-box success" role="alert"></div>

            <div class="otp-fields-container" id="totpFieldsContainer">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            </div>

            <button type="button" id="verifyTotpBtn" class="btn-submit" disabled>
                <i class="fas fa-check-circle"></i> تحقق
            </button>
        </div>
    </main>

    <footer class="page-footer no-print">
        © 2026 بوابة تيرا للمستثمرين. جميع الحقوق محفوظة.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/modules/session-manager.js"></script>
    <script>
        // سكربت خاص بصفحة TOTP (6 أرقام)
        (function() {
            const OTP_LENGTH = 6;
            const TOTP_TIMEOUT = 10 * 60 * 1000; // 10 دقائق
            let totpTimeout;

            const inputs = document.querySelectorAll('#totpFieldsContainer .otp-input');
            const verifyBtn = document.getElementById('verifyTotpBtn');
            const errorEl = document.getElementById('totpError');
            const successEl = document.getElementById('totpSuccess');
            const backLink = document.getElementById('backLink');

            function getCode() {
                let code = '';
                inputs.forEach(i => code += i.value);
                return code;
            }

            function checkComplete() {
                verifyBtn.disabled = getCode().length !== OTP_LENGTH;
            }

            function showError(msg) {
                if (errorEl) { errorEl.textContent = msg; errorEl.style.display = 'flex'; }
                if (successEl) successEl.style.display = 'none';
            }

            function clearMessages() {
                if (errorEl) errorEl.style.display = 'none';
                if (successEl) successEl.style.display = 'none';
            }

            // تهيئة اسم المستخدم والبريد
            const name = sessionStorage.getItem('otpName');
            if (name) {
                document.getElementById('headerUserName').textContent = name;
                document.getElementById('headerAvatar').textContent = name.charAt(0).toUpperCase();
            }
            const email = sessionStorage.getItem('otpEmail');
            if (email) {
                document.getElementById('instructionEmailText').textContent = email;
            } else {
                // إذا لم يوجد بريد، قد تكون الجلسة انتهت، نتأكد
                showError('انتهت الجلسة. يرجى العودة لصفحة الدخول.');
            }

            // أحداث الحقول
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    if (e.target.value && index < OTP_LENGTH - 1) {
                        inputs[index + 1].focus();
                    }
                    checkComplete();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const digits = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
                    if (digits.length === OTP_LENGTH) {
                        for (let i = 0; i < OTP_LENGTH; i++) inputs[i].value = digits[i] || '';
                        checkComplete();
                    }
                });
            });

            verifyBtn.addEventListener('click', async () => {
                const code = getCode();
                if (code.length !== OTP_LENGTH) return;
                clearMessages();
                verifyBtn.disabled = true;
                verifyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';

                try {
                    if (!window.Auth || !window.Auth.completeLoginWithTOTP) throw new Error('خدمة المصادقة غير متاحة');
                    const result = await window.Auth.completeLoginWithTOTP(code);
                    if (result?.user) {
                        // تسجيل الجلسة اختياري
                        if (window.SessionManager) {
                            try {
                                const sessionRes = await window.SessionManager.createSessionRecord(result.user.id);
                                if (sessionRes?.success) {
                                    sessionStorage.setItem('currentSessionId', sessionRes.sessionId);
                                    window.SessionManager.startSessionGuard?.(result.user.id, sessionRes.sessionId);
                                }
                            } catch (e) {}
                        }
                        successEl.textContent = 'تم التحقق بنجاح، جاري تحويلك...';
                        successEl.style.display = 'flex';
                        setTimeout(() => {
                            window.location.href = '/pages/dashboard/index.html';
                        }, 3000);
                    }
                } catch (error) {
                    showError(error.message || 'رمز التحقق غير صحيح');
                    verifyBtn.disabled = false;
                    verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> تحقق';
                }
            });

            // مؤقت انتهاء الجلسة (10 دقائق)
            function startTimeout() {
                totpTimeout = setTimeout(async () => {
                    if (window.Auth?.cancelTOTPLogin) await window.Auth.cancelTOTPLogin();
                    sessionStorage.removeItem('loginMethod');
                    sessionStorage.removeItem('otpEmail');
                    sessionStorage.removeItem('otpName');
                    window.location.href = '/auth/auth/login/login.html';
                }, TOTP_TIMEOUT);
            }
            startTimeout();

            // زر العودة – إلغاء الجلسة
            if (backLink) {
                backLink.addEventListener('click', async (e) => {
                    e.preventDefault();
                    if (window.Auth?.cancelTOTPLogin) await window.Auth.cancelTOTPLogin();
                    sessionStorage.removeItem('loginMethod');
                    sessionStorage.removeItem('otpEmail');
                    sessionStorage.removeItem('otpName');
                    window.location.href = backLink.href;
                });
            }

            // عند مغادرة الصفحة تنظيف المؤقت
            window.addEventListener('beforeunload', () => {
                if (totpTimeout) clearTimeout(totpTimeout);
            });
        })();
    </script>
</body>
</html>
