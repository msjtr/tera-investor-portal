```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="بوابة المستثمر - تيرا">

    <title>تسجيل الدخول | تيرا</title>

    <!-- Global CSS -->

    <link rel="stylesheet"
          href="../assets/css/app.css">

    <link rel="stylesheet"
          href="../assets/css/responsive.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-logo">
                TERA
            </div>

            <h1>
                تسجيل الدخول
            </h1>

            <p>
                أهلاً بك في بوابة المستثمر
            </p>

            <form id="loginForm">

                <div class="form-group">

                    <label for="email">
                        البريد الإلكتروني
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="example@email.com"
                        required>

                </div>

                <div class="form-group">

                    <label for="password">
                        كلمة المرور
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="********"
                        required>

                </div>

                <div class="auth-options">

                    <label>

                        <input
                            type="checkbox"
                            id="rememberMe">

                        تذكرني

                    </label>

                    <a href="forgot-password.html">

                        نسيت كلمة المرور؟

                    </a>

                </div>

                <button
                    type="submit">

                    تسجيل الدخول

                </button>

            </form>

            <div class="auth-footer">

                <span>
                    ليس لديك حساب؟
                </span>

                <a href="register.html">

                    إنشاء حساب جديد

                </a>

            </div>

        </div>

    </div>

    <!-- Global JS -->

    <script src="../assets/js/app.js"></script>

    <!-- Auth JS -->

    <script src="../assets/js/auth.js"></script>

</body>

</html>
```
