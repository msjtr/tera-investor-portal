```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="بوابة المستثمر - تيرا">

    <title>تسجيل الدخول | تيرا</title>

    <link rel="icon"
          href="/images/favicon.svg">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="/assets/css/core.css">

    <link rel="stylesheet"
          href="/assets/css/main.css">

    <link rel="stylesheet"
          href="/assets/css/auth.css">

    <link rel="stylesheet"
          href="/assets/css/responsive.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-logo">

                <img src="/images/logo.svg"
                     alt="TERA"
                     style="max-width:140px;">

            </div>

            <h1>
                تسجيل الدخول
            </h1>

            <p>
                أهلاً بك في بوابة المستثمر
            </p>

            <form id="loginForm">

                <div class="form-group">

                    <label for="email">
                        البريد الإلكتروني
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="example@email.com"
                        autocomplete="email"
                        required>

                </div>

                <div class="form-group">

                    <label for="password">
                        كلمة المرور
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="********"
                        autocomplete="current-password"
                        required>

                </div>

                <div class="auth-options">

                    <label>

                        <input
                            type="checkbox"
                            id="rememberMe">

                        تذكرني

                    </label>

                    <a href="/auth/forgot-password.html">
                        نسيت كلمة المرور؟
                    </a>

                </div>

                <button
                    type="submit"
                    class="btn-primary">

                    تسجيل الدخول

                </button>

            </form>

            <div class="auth-footer">

                <span>
                    ليس لديك حساب؟
                </span>

                <a href="/auth/register/register.html">
                    إنشاء حساب جديد
                </a>

            </div>

        </div>

    </div>

    <!-- JS -->

    <script src="/assets/js/core.js"></script>

    <script src="/assets/js/app.js"></script>

    <script src="/assets/js/auth.js"></script>

    <script>

        document
        .getElementById('loginForm')
        .addEventListener('submit', function(e){

            e.preventDefault();

            localStorage.setItem(
                'tera_token',
                'authenticated'
            );

            window.location.href =
            '/pages/dashboard/index.html';

        });

    </script>

</body>

</html>
```
