```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>تسجيل الدخول | تيرا</title>

    <link rel="stylesheet"
          href="../assets/css/app.css">

    <link rel="stylesheet"
          href="../assets/css/responsive.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>تسجيل الدخول</h1>

            <p>
                مرحباً بك في بوابة المستثمر
            </p>

            <form id="loginForm">

                <div class="form-group">

                    <label>
                        البريد الإلكتروني
                    </label>

                    <input
                        type="email"
                        id="email"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        كلمة المرور
                    </label>

                    <input
                        type="password"
                        id="password"
                        required>

                </div>

                <button type="submit">

                    تسجيل الدخول

                </button>

            </form>

        </div>

    </div>

    <script>

        document
        .getElementById('loginForm')
        .addEventListener(
            'submit',
            function(e){

                e.preventDefault();

                localStorage.setItem(
                    'investorToken',
                    'demo-token'
                );

                window.location.href =
                '../pages/dashboard/index.html';

            }
        );

    </script>

</body>

</html>
