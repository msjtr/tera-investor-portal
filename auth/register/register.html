<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب شريك | بوابة تيرا</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
<main class="register-page">
    <section class="register-card">
        <div class="register-steps">
            <div class="step active" data-step="0">① الحساب</div>
            <div class="step" data-step="1">② الهوية</div>
            <div class="step" data-step="2">③ التواصل</div>
            <div class="step" data-step="3">④ الإقرارات</div>
        </div>

        <form id="partnerRegisterForm">
            <section id="step0" class="form-step active">
                <h3>معلومات الحساب</h3>
                <div class="split-section">
                    <div class="input-side">
                        <div class="form-group"><label>اسم المستخدم</label><input type="text" id="username" maxlength="20"></div>
                        <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="email"></div>
                        <div class="form-group"><label>تأكيد البريد</label><input type="email" id="confirmEmail"></div>
                        <div class="form-group"><label>كلمة المرور</label><input type="password" id="password"></div>
                        <div class="form-group"><label>تأكيد كلمة المرور</label><input type="password" id="confirmPassword"></div>
                    </div>
                    <div class="validation-side">
                        <ul class="rule-list" id="rules0">
                            <li id="rule_u_len">☐ 4-20 خانة</li>
                            <li id="rule_u_start">☐ يبدأ بحرف إنجليزي</li>
                            <li id="rule_p_match">☐ تطابق كلمة المرور</li>
                        </ul>
                    </div>
                </div>
            </section>

            <section id="step1" class="form-step d-none">
                <div class="split-section">
                    <div class="input-side">
                        <h3>بيانات الهوية</h3>
                        <div class="form-group"><label>الاسم بالعربية</label><input type="text" id="fullNameAr"></div>
                        <div class="form-group"><label>الاسم بالإنجليزية</label><input type="text" id="fullNameEn"></div>
                        <div class="form-group"><label>الفئة</label>
                            <select id="accountCategory">
                                <option value="saudi">سعودي</option><option value="resident">مقيم</option>
                                <option value="gcc">خليجي</option><option value="foreign">أجنبي</option>
                            </select>
                        </div>
                        <div id="identityFields">
                            <div class="form-group"><label>رقم الوثيقة</label><input type="text" id="docNum"></div>
                            <div class="form-group"><label>تاريخ الإصدار</label><input type="date" id="issueDate"></div>
                            <div class="form-group"><label>تاريخ الانتهاء</label><input type="date" id="expiryDate"></div>
                        </div>
                    </div>
                    <div class="validation-side">
                        <ul class="rule-list"><li id="rule_id">☐ اكتمال وصلاحية الوثيقة</li></ul>
                    </div>
                </div>
            </section>

            <section id="step2" class="form-step d-none">
                <div class="split-section">
                    <div class="input-side">
                        <h3>التواصل والعنوان</h3>
                        <div class="form-group"><label>رقم الجوال (بدون صفر)</label><input type="text" id="mobile" class="num-only"></div>
                        <div id="nationalAddr" class="addr-group">
                            <div class="form-group"><label>رقم المبنى</label><input type="text" class="num-only" id="bldgNum"></div>
                            <div class="form-group"><label>الشارع</label><input type="text" id="street"></div>
                            <div class="form-group"><label>الحي</label><input type="text" id="district"></div>
                            <div class="form-group"><label>المدينة</label><input type="text" id="city"></div>
                            <div class="form-group"><label>الرمز البريدي</label><input type="text" class="num-only" id="zip"></div>
                            <div class="form-group"><label>الرقم الإضافي</label><input type="text" class="num-only" id="addNum"></div>
                            <div class="form-group"><label>الاسم المختصر</label><input type="text" id="shortAddr"></div>
                        </div>
                    </div>
                    <div class="validation-side">
                        <ul class="rule-list"><li id="rule_contact">☐ صحة رقم الجوال والعنوان</li></ul>
                    </div>
                </div>
            </section>

            <section id="step3" class="form-step d-none">
                <div class="split-section">
                    <div class="input-side">
                        <h3>الإقرارات</h3>
                        <label><input type="checkbox" class="agreement-chk"> أقر بأن عمري 18+</label><br>
                        <label><input type="checkbox" class="agreement-chk"> أقر بأنني المستفيد الحقيقي</label><br>
                        <label><input type="checkbox" class="agreement-chk"> أوافق على شروط تيرا</label><br>
                        <label><input type="checkbox" id="finalAgreement"> **أوافق على الإقرار النهائي**</label>
                    </div>
                    <div class="validation-side">
                        <ul class="rule-list"><li id="rule_agreements">☐ الموافقة على كافة الشروط</li></ul>
                    </div>
                </div>
            </section>

            <div class="form-actions">
                <button type="button" id="prevBtn" class="btn btn-secondary d-none">السابق</button>
                <button type="button" id="nextBtn" class="btn btn-primary">التالي</button>
                <button type="button" id="submitBtn" class="btn btn-success d-none">إنشاء الحساب</button>
            </div>
        </form>
    </section>
</main>
<script src="register.js"></script>
</body>
</html>
