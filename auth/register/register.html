```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="إنشاء حساب مستثمر جديد - تيرا">

    <title>إنشاء حساب | تيرا</title>

    <link rel="stylesheet"
          href="/assets/css/app.css">

    <link rel="stylesheet"
          href="/assets/css/register.css">

    <link rel="stylesheet"
          href="/assets/css/responsive.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card register-container">

            <div class="auth-logo">
                TERA
            </div>

            <h1>
                إنشاء حساب مستثمر
            </h1>

            <p>
                أكمل البيانات التالية لإنشاء حسابك الاستثماري
            </p>

            <!-- Stepper -->

            <div class="register-stepper">

                <div class="step active">
                    <div class="step-number">1</div>
                    <div class="step-title">الحساب</div>
                </div>

                <div class="step">
                    <div class="step-number">2</div>
                    <div class="step-title">الشخصية</div>
                </div>

                <div class="step">
                    <div class="step-number">3</div>
                    <div class="step-title">الهوية</div>
                </div>

                <div class="step">
                    <div class="step-number">4</div>
                    <div class="step-title">الإقرار</div>
                </div>

            </div>

            <form id="registerForm">

                <!-- المرحلة الأولى -->

                <div class="form-step active">

                    <div class="form-grid">

                        <div class="form-group">
                            <label>اسم المستخدم</label>
                            <input type="text"
                                   id="username"
                                   minlength="3"
                                   maxlength="20"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email"
                                   id="email"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>تأكيد البريد الإلكتروني</label>
                            <input type="email"
                                   id="confirmEmail"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>مفتاح الدولة</label>

                            <select id="countryCode">

                                <optgroup label="دول الخليج">
                                    <option value="+966">السعودية +966</option>
                                    <option value="+971">الإمارات +971</option>
                                    <option value="+965">الكويت +965</option>
                                    <option value="+973">البحرين +973</option>
                                    <option value="+968">عمان +968</option>
                                    <option value="+974">قطر +974</option>
                                </optgroup>

                                <optgroup label="دول عربية">
                                    <option value="+20">مصر +20</option>
                                    <option value="+962">الأردن +962</option>
                                    <option value="+964">العراق +964</option>
                                    <option value="+961">لبنان +961</option>
                                    <option value="+212">المغرب +212</option>
                                </optgroup>

                            </select>

                        </div>

                        <div class="form-group">
                            <label>رقم الجوال</label>
                            <input type="tel"
                                   id="mobile"
                                   placeholder="بدون الصفر"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>كلمة المرور</label>

                            <input type="password"
                                   id="password"
                                   required>

                        </div>

                        <div class="password-strength">

                            <div class="strength-bar">
                                <div id="strengthFill"
                                     class="strength-fill">
                                </div>
                            </div>

                            <div id="strengthText"
                                 class="strength-text">
                                أدخل كلمة المرور
                            </div>

                        </div>

                        <div class="password-rules">

                            <ul>

                                <li>
                                    8 أحرف على الأقل
                                </li>

                                <li>
                                    حرف كبير واحد
                                </li>

                                <li>
                                    حرف صغير واحد
                                </li>

                                <li>
                                    رقم واحد
                                </li>

                                <li>
                                    رمز خاص واحد
                                </li>

                            </ul>

                        </div>

                        <div class="form-group">

                            <label>
                                تأكيد كلمة المرور
                            </label>

                            <input type="password"
                                   id="confirmPassword"
                                   required>

                        </div>

                    </div>

                    <div class="step-actions">

                        <button type="button"
                                class="btn-next">
                            التالي
                        </button>

                    </div>

                </div>

                <!-- المرحلة الثانية -->

                <div class="form-step">

                    <div class="form-grid">

                        <div class="form-group">
                            <label>الاسم الأول</label>
                            <input type="text" required>
                        </div>

                        <div class="form-group">
                            <label>اسم الأب</label>
                            <input type="text" required>
                        </div>

                        <div class="form-group">
                            <label>اسم الجد</label>
                            <input type="text">
                        </div>

                        <div class="form-group">
                            <label>اسم العائلة</label>
                            <input type="text" required>
                        </div>

                        <div class="form-group">
                            <label>تاريخ الميلاد</label>
                            <input type="date" required>
                        </div>

                        <div class="form-group">

                            <label>الجنسية</label>

                            <select id="nationality">

                                <option value="saudi">
                                    سعودي
                                </option>

                                <option value="resident">
                                    مقيم
                                </option>

                                <option value="other">
                                    غير سعودي
                                </option>

                            </select>

                        </div>

                    </div>

                </div>

                <!-- المرحلة الثالثة -->

                <div class="form-step">

                    <div class="identity-section">

                        <div class="form-group">

                            <label id="identityLabel">
                                رقم الهوية الوطنية
                            </label>

                            <input type="text"
                                   id="identityNumber">

                        </div>

                        <div class="form-group">

                            <label>
                                تاريخ الانتهاء
                            </label>

                            <input type="date"
                                   id="identityExpiry">

                        </div>

                    </div>

                </div>

                <!-- المرحلة الرابعة -->

                <div class="form-step">

                    <div class="terms-box">

                        <label>
                            <input type="checkbox"
                                   required>
                            أوافق على الشروط والأحكام
                        </label>

                        <label>
                            <input type="checkbox"
                                   required>
                            أوافق على سياسة الخصوصية
                        </label>

                        <label>
                            <input type="checkbox"
                                   required>
                            أقر بصحة البيانات
                        </label>

                    </div>

                    <div class="step-actions">

                        <button type="submit"
                                class="btn-submit">

                            إنشاء الحساب

                        </button>

                    </div>

                </div>

            </form>

            <div class="auth-footer">

                <span>
                    لديك حساب بالفعل؟
                </span>

                <a href="/auth/login.html">
                    تسجيل الدخول
                </a>

            </div>

        </div>

    </div>

    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/register.js"></script>

</body>

</html>
```
