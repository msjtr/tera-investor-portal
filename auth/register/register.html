<form id="registerForm" autocomplete="off">

    <div class="form-step active">
        <h3>معلومات الحساب</h3>
        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" name="username" class="tera-input-field" required>
        </div>
        <div class="form-row-split">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" name="email" class="tera-input-field" required>
            </div>
            <div class="form-group">
                <label>تأكيد البريد الإلكتروني</label>
                <input type="email" name="confirm_email" class="tera-input-field" required>
            </div>
        </div>
        <div class="form-row-split">
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" name="password" class="tera-input-field" required>
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <input type="password" name="confirm_password" class="tera-input-field" required>
            </div>
        </div>
        <div class="password-strength"><div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div></div>
        <div class="step-actions">
            <div></div>
            <button type="button" class="btn-next">التالي</button>
        </div>
    </div>

    <div class="form-step">
        <h3>المعلومات الشخصية</h3>
        <div class="form-row-split">
            <div class="form-group"><label>الاسم الأول</label><input type="text" name="first_name" class="tera-input-field" required></div>
            <div class="form-group"><label>اسم العائلة</label><input type="text" name="last_name" class="tera-input-field" required></div>
        </div>
        <div class="form-row-split">
            <div class="form-group">
                <label>الجنس</label>
                <select name="gender" class="tera-input-field"><option>ذكر</option><option>أنثى</option></select>
            </div>
            <div class="form-group"><label>تاريخ الميلاد</label><input type="date" name="dob" class="tera-input-field" required></div>
        </div>
        <div class="step-actions">
            <button type="button" class="btn-prev">السابق</button>
            <button type="button" class="btn-next">التالي</button>
        </div>
    </div>

    <div class="form-step">
        <h3>بيانات الهوية</h3>
        <div class="form-group">
            <label>الجنسية</label>
            <select name="nationality" id="nationality" class="tera-input-field">
                <option value="saudi">سعودي</option>
                <option value="gcc">خليجي</option>
                <option value="resident">مقيم</option>
                <option value="foreign">أجنبي</option>
            </select>
        </div>
        <div class="form-group">
            <label id="identityLabel">رقم الهوية الوطنية</label>
            <input type="text" name="id_number" class="tera-input-field" required>
        </div>
        <div class="step-actions">
            <button type="button" class="btn-prev">السابق</button>
            <button type="button" class="btn-next">التالي</button>
        </div>
    </div>

    <div class="form-step">
        <h3>بيانات التواصل</h3>
        <div class="form-group"><label>رقم الجوال</label><input type="tel" name="phone" class="tera-input-field" placeholder="05XXXXXXXX" required></div>
        <div class="form-group"><label>العنوان الوطني</label><input type="text" name="address" class="tera-input-field" required></div>
        <div class="step-actions">
            <button type="button" class="btn-prev">السابق</button>
            <button type="button" class="btn-next">التالي</button>
        </div>
    </div>

    <div class="form-step">
        <h3>البيانات البنكية</h3>
        <div class="form-group"><label>اسم البنك</label><input type="text" name="bank_name" class="tera-input-field" required></div>
        <div class="form-group"><label>رقم الآيبان (IBAN)</label><input type="text" name="iban" class="tera-input-field" placeholder="SA..." required></div>
        <div class="step-actions">
            <button type="button" class="btn-prev">السابق</button>
            <button type="button" class="btn-next">التالي</button>
        </div>
    </div>

    <div class="form-step">
        <h3>رفع المستندات</h3>
        <div class="form-group"><label>صورة الهوية الوطنية</label><input type="file" name="id_image" class="tera-input-field"></div>
        <div class="form-group"><label>شهادة الحساب البنكي</label><input type="file" name="bank_cert" class="tera-input-field"></div>
        <div class="step-actions">
            <button type="button" class="btn-prev">السابق</button>
            <button type="button" class="btn-next">التالي</button>
        </div>
    </div>

    <div class="form-step">
        <h3>الإقرارات</h3>
        <div class="form-group">
            <label><input type="checkbox" name="terms" required> أوافق على الشروط والأحكام وسياسة الخصوصية.</label>
            <label><input type="checkbox" name="aml" required> أقر بصحة البيانات وأوافق على سياسة مكافحة غسل الأموال.</label>
        </div>
        <div class="step-actions">
            <button type="button" class="btn-prev">السابق</button>
            <button type="submit" class="btn-submit">إنشاء الحساب</button>
        </div>
    </div>
</form>
