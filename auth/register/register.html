<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="إنشاء حساب مستثمر جديد في منصة تيرا الاستثمارية">
    
    <title>إنشاء حساب جديد | تيرا</title>

    <link rel="icon" href="/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">
    <link rel="stylesheet" href="/auth/register/register.css">
    <link rel="stylesheet" href="/assets/css/responsive.css">
</head>

<body>

<div class="auth-container">
    <div class="register-card-wide">

        <div class="auth-logo">
            <img src="/images/logo.svg" alt="TERA Logo">
        </div>

        <h1>إنشاء حساب مستثمر</h1>
        <p>أكمل الخطوات التالية لتجهيز محفظتك الاستثمارية في منصة تيرا</p>

        <div class="reg-steps-tracker">
            <div class="reg-step-node active"><div class="step-number">1</div><div class="step-label">الحساب</div></div>
            <div class="reg-step-node"><div class="step-number">2</div><div class="step-label">البيانات</div></div>
            <div class="reg-step-node"><div class="step-number">3</div><div class="step-label">التوثيق</div></div>
            <div class="reg-step-node"><div class="step-number">4</div><div class="step-label">الإقرار</div></div>
        </div>

        <form id="registerForm" autocomplete="off">
            <div class="form-step active">
                <div class="step-actions" style="margin-top: 32px;">
                    <div></div>
                    <button type="button" class="btn-next">التالي</button>
                </div>
            </div>

            <div class="form-step">
                <div class="form-row-split">
                    <div class="form-group">
                        <label for="fullNameAr">الاسم الكامل</label>
                        <input type="text" id="fullNameAr" name="full_name_ar" class="tera-input-field" required>
                    </div>
                </div>
                <div class="step-actions" style="margin-top: 32px;">
                    <button type="button" class="btn-prev">السابق</button>
                    <button type="button" class="btn-next">التالي</button>
                </div>
            </div>

            <div class="form-step">
                <p>يجب الموافقة على الشروط والأحكام لإتمام التسجيل.</p>
                <div class="step-actions" style="margin-top: 32px;">
                    <button type="button" class="btn-prev">السابق</button>
                    <button type="submit" class="btn-submit">إنشاء الحساب</button>
                </div>
            </div>
        </form>

        <div class="auth-footer">
            <span>لديك حساب بالفعل؟</span> <a href="/auth/login.html">تسجيل الدخول</a>
        </div>
    </div>
</div>

<script src="/assets/js/core.js"></script>
<script src="/assets/js/app.js"></script>
<script type="module">
    import '/assets/js/auth.js';
    import '/auth/register/register.js';
</script>

</body>
</html>
