<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب مستثمر جديد | منصة تيرا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../assets/css/core.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
    
    <link rel="shortcut icon" href="../../images/favicon.svg" type="image/x-icon">

    <style>
        .auth-header-custom {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .header-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .portal-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #333;
        }

        .header-logo-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .main-logo-updated {
            max-width: 140px;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <header class="auth-header-custom">
            <div class="header-top-bar">
                <div class="portal-title">بوابة المستثمر</div>
                <div class="header-actions-side">
                    <a href="../../index.html" class="back-home-btn-updated">
                        <span>الرئيسية</span>
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </div>
            </div>
            <div class="header-logo-container">
                <img src="../../images/logo.svg" alt="TERA Logo" class="main-logo-updated">
            </div>
        </header>

        <div class="form-card">
            <div class="form-instruction">
                <h2>إنشاء حساب مستثمر جديد</h2>
                <p>أكمل البيانات التالية لإنشاء حسابك في بوابة المستثمر والاستفادة من الخدمات الاستثمارية المقدمة عبر منصة تيرا — عالمك بلا حدود.</p>
            </div>

            <div class="registration-steps">
                <div class="step-item active" data-step="1">
                    <span class="step-number">①</span>
                    <span class="step-text">إنشاء الحساب</span>
                </div>
                <div class="step-item" data-step="2">
                    <span class="step-number">②</span>
                    <span class="step-text">الهوية والشخصية</span>
                </div>
                <div class="step-item" data-step="3">
                    <span class="step-number">③</span>
                    <span class="step-text">التواصل والعنوان</span>
                </div>
                <div class="step-item" data-step="4">
                    <span class="step-number">④</span>
                    <span class="step-text">الإقرارات والاتفاقيات</span>
                </div>
            </div>

            <form id="registerMultiStepForm" novalidate>
                <div class="form-step-content active" id="step1">
                    <h3 class="step-section-title">المرحلة الأولى: إنشاء الحساب</h3>
                    </div>
                </form>
        </div>
    </div>
</body>
</html>
