<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | تيرا</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">
    <link rel="stylesheet" href="/auth/auth/login/login.css">
    <style>
        .auth-layout { min-height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg, #f0f9ff, #e6f7f5); padding:20px; }
        .auth-container { max-width:480px; width:100%; background:#fff; border-radius:28px; padding:40px 32px 32px; box-shadow:0 20px 60px rgba(2,128,144,0.12); }
        .brand-logo-box { text-align:center; margin-bottom:20px; }
        .brand-logo-box img { height:52px; }
        .portal-title { font-family:'Cairo',sans-serif; font-size:24px; font-weight:800; color:#0A1B3F; text-align:center; margin:0 0 4px; }
        .page-subtitle { font-size:18px; font-weight:700; color:#028090; text-align:center; margin:0 0 8px; }
        .welcome-text { font-size:14px; color:#64748b; text-align:center; margin:0 0 32px; }
        .form-field-group { margin-bottom:20px; }
        .field-label { display:block; font-weight:700; font-size:14px; color:#1e293b; margin-bottom:6px; }
        .field-label-flex { display:flex; justify-content:space-between; }
        .form-input-control { width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:12px; font-size:15px; font-family:inherit; transition: border-color 0.3s; background:#f8fafc; }
        .form-input-control:focus { border-color:#028090; box-shadow:0 0 0 4px rgba(2,128,144,0.10); outline:none; background:#fff; }
        .forgot-pass-link { font-size:13px; color:#028090; font-weight:600; text-decoration:none; }
        .checkbox-toggle-label { display:flex; align-items:center; gap:6px; font-size:14px; color:#475569; cursor:pointer; margin-top:8px; }
        .btn-submit-login { width:100%; padding:16px; background:linear-gradient(135deg, #028090, #0d9488); color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:800; cursor:pointer; transition:all 0.3s; }
        .btn-submit-login:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 28px rgba(2,128,144,0.35); }
        .btn-submit-login:disabled { opacity:0.65; cursor:not-allowed; transform:none; }
        .bottom-routing-footer-links { margin-top:28px; border-top:1px solid #e2e8f0; padding-top:20px; text-align:center; font-size:14px; color:#475569; }
        .routing-link { color:#028090; font-weight:700; text-decoration:none; }
        .alert-box { display:none; align-items:center; gap:10px; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-weight:700; font-size:14px; }
        .alert-box.show { display:flex; }
        .alert-box.success { background:#ecfdf5; color:#065f46; border:1px solid #6ee7b7; }
        .alert-box.error { background:#fef2f2; color:#b91c1c; border:1px solid #fca5a5; }
        .tera-loader-overlay { display:none; position:fixed; inset:0; background:rgba(10,27,63,0.7); backdrop-filter:blur(6px); z-index:9999; flex-direction:column; align-items:center; justify-content:center; }
        .spinning-infinity-ring { width:56px; height:56px; border:5px solid #e2e8f0; border-top-color:#028090; border-radius:50%; animation:spin 0.9s linear infinite; margin-bottom:16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-container">
            <div class="brand-logo-box">
                <img src="/images/logo.svg" alt="تيرا" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%2240%22%3E%3Crect width=%22120%22 height=%2240%22 rx=%226%22 fill=%22%23028090%22/%3E%3Ctext x=%2260%22 y=%2226%22 font-family=%22Cairo,sans-serif%22 font-size=%2220%22 font-weight=%22bold%22 fill=%22%23ffffff%22 text-anchor=%22middle%22%3Eتيرا%3C/text%3E%3C/svg%3E'">
            </div>
            <h2 class="portal-title">بوابة المستثمر - تيرا</h2>
            <h3 class="page-subtitle">تسجيل الدخول الموحد</h3>
            <p class="welcome-text">مرحباً بك مجدداً. سجل دخولك للوصول إلى محفظتك الاستثمارية الذكية.</p>
            <div class="alert-box" id="formAlert">
                <span class="alert-icon" id="alertIcon"><i class="fas fa-exclamation-circle"></i></span>
                <span id="alertMessage"></span>
            </div>
            <form id="teraLoginForm" novalidate>
                <div class="form-field-group">
                    <label class="field-label">البريد الإلكتروني <span style="color:#dc2626">*</span></label>
                    <input type="email" id="login_identifier" class="form-input-control" placeholder="أدخل بريدك الإلكتروني" autocomplete="username" required>
                </div>
                <div class="form-field-group">
                    <div class="field-label-flex">
                        <label class="field-label">كلمة المرور <span style="color:#dc2626">*</span></label>
                        <a href="/auth/forgot-password.html" class="forgot-pass-link">نسيت كلمة المرور؟</a>
                    </div>
                    <input type="password" id="login_password" class="form-input-control" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
                    <label class="checkbox-toggle-label"><input type="checkbox" id="show_login_password"> إظهار كلمة المرور</label>
                </div>
                <button type="submit" class="btn-submit-login" id="loginSubmitBtn"><i class="fa-solid fa-lock"></i> تسجيل الدخول الآمن</button>
            </form>
            <div class="bottom-routing-footer-links">
                <p>ليس لديك حساب؟ <a href="/auth/register/register.html" class="routing-link">إنشاء حساب جديد</a></p>
                <p><a href="/index.html" style="color:#64748b;"><i class="fa-solid fa-arrow-right"></i> العودة للشاشة الرئيسية</a></p>
            </div>
        </div>
        <div class="tera-loader-overlay" id="creativeLoaderScreen">
            <div class="spinning-infinity-ring"></div>
            <p style="color:#fff; font-weight:700;">جاري تسجيل الدخول...</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/auth/auth/login/login.js"></script>
</body>
</html>
