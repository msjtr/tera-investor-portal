<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | تيرا</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">

    <!-- ======== إضافة سكربتات OneSignal ======== -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script src="/assets/js/onesignal-init.js" defer></script>
    <!-- ======================================== -->

    <style>
        :root {
            --primary: #028090; --primary-dark: #0A1B3F; --danger: #dc2626;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --gray-300: #d1d9e6; --gray-500: #64748b; --gray-700: #334155; --gray-900: #0A1B3F;
            --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: #f1f5f9; margin: 0; color: #1e293b; -webkit-tap-highlight-color: transparent;
        }
        .auth-layout {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f0f9ff, #e6f7f5); padding: 20px;
        }
        .auth-container {
            max-width: 480px; width: 100%; background: #ffffff; border-radius: var(--radius-xl);
            padding: 32px 28px 28px; box-shadow: 0 20px 60px rgba(2, 128, 144, 0.12); border: 1px solid var(--gray-200);
        }
        .brand-logo-box { text-align: center; margin-bottom: 16px; }
        .brand-logo-box img { height: 44px; width: auto; display: inline-block; }
        .portal-title { font-family: 'Cairo', sans-serif; font-size: 22px; font-weight: 800; color: var(--gray-900); text-align: center; margin: 0 0 4px; }
        .page-subtitle { font-size: 16px; font-weight: 700; color: var(--primary); text-align: center; margin: 0 0 20px; }
        .tabs-container {
            display: flex; gap: 0; margin-bottom: 24px; border-radius: var(--radius-md);
            overflow: hidden; border: 1px solid var(--gray-200);
        }
        .tab-btn {
            flex: 1; padding: 12px 8px; background: var(--gray-50); border: none;
            font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
            color: var(--gray-500); transition: all 0.2s; text-align: center;
        }
        .tab-btn.active { background: var(--primary); color: #fff; }
        .tab-btn i { margin-left: 6px; }
        .form-field-group { margin-bottom: 18px; }
        .field-label { display: block; font-weight: 700; font-size: 13px; color: #1e293b; margin-bottom: 6px; }
        .field-label-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .form-input-control {
            width: 100%; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: var(--radius-md);
            font-size: 15px; font-family: inherit; transition: border-color 0.3s, box-shadow 0.3s;
            background: var(--gray-50); color: var(--gray-900);
        }
        .form-input-control:focus {
            border-color: var(--primary); box-shadow: 0 0 0 4px rgba(2, 128, 144, 0.1);
            background: #ffffff; outline: none;
        }
        .forgot-pass-link { font-size: 13px; color: var(--primary); font-weight: 600; text-decoration: none; white-space: nowrap; }
        .forgot-pass-link:hover { color: var(--primary-dark); text-decoration: underline; }
        .checkbox-toggle-label {
            display: flex; align-items: center; gap: 6px; font-size: 14px;
            color: var(--gray-700); cursor: pointer; margin-top: 8px;
        }
        .checkbox-toggle-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .btn-submit-login {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), #0d9488);
            color: #ffffff; border: none; border-radius: 14px; font-size: 16px; font-weight: 800;
            font-family: 'Tajawal', sans-serif; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px;
        }
        .btn-submit-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(2, 128, 144, 0.35); }
        .btn-submit-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
        .bottom-routing-footer-links {
            margin-top: 24px; border-top: 1px solid var(--gray-200); padding-top: 18px;
            text-align: center; font-size: 14px; color: var(--gray-500);
        }
        .bottom-routing-footer-links p { margin: 6px 0; }
        .routing-link { color: var(--primary); font-weight: 700; text-decoration: none; }
        .routing-link:hover { color: var(--primary-dark); text-decoration: underline; }
        .alert-box {
            display: none; align-items: center; gap: 10px; padding: 12px 16px;
            border-radius: 10px; margin-bottom: 16px; font-weight: 700; font-size: 14px;
        }
        .alert-box.show { display: flex; }
        .alert-box.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
        .tera-loader-overlay {
            display: none; position: fixed; inset: 0; background: rgba(10, 27, 63, 0.7);
            backdrop-filter: blur(6px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinning-infinity-ring {
            width: 56px; height: 56px; border: 5px solid var(--gray-200); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .auth-container { padding: 28px 20px 24px; }
            .portal-title { font-size: 20px; }
            .page-subtitle { font-size: 15px; margin-bottom: 16px; }
            .form-input-control { font-size: 14px; padding: 12px 14px; }
            .btn-submit-login { padding: 14px; font-size: 15px; }
            .tab-btn { font-size: 13px; padding: 10px 6px; }
        }
        @media (max-width: 480px) {
            .auth-layout { padding: 10px; }
            .auth-container { padding: 24px 16px 20px; border-radius: 16px; }
            .brand-logo-box img { height: 38px; }
            .portal-title { font-size: 18px; }
            .page-subtitle { font-size: 14px; margin-bottom: 14px; }
            .form-field-group { margin-bottom: 14px; }
            .field-label { font-size: 13px; }
            .form-input-control { font-size: 13px; padding: 10px 12px; }
            .btn-submit-login { font-size: 14px; padding: 12px; }
            .bottom-routing-footer-links { font-size: 13px; margin-top: 20px; padding-top: 14px; }
            .forgot-pass-link { font-size: 12px; }
            .spinning-infinity-ring { width: 44px; height: 44px; }
            .tab-btn { font-size: 12px; padding: 10px 4px; }
        }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-container">
            <div class="brand-logo-box"><img src="/images/logo.svg" alt="تيرا"></div>
            <h2 class="portal-title">بوابة المستثمر - تيرا</h2>
            <h3 class="page-subtitle">تسجيل الدخول الآمن</h3>
            <div class="tabs-container" id="tabsContainer">
                <button class="tab-btn active" id="tabPassword"><i class="fas fa-key"></i> كلمة المرور</button>
                <button class="tab-btn" id="tabTOTP"><i class="fas fa-shield-alt"></i> المصادقة الثنائية</button>
            </div>
            <div class="alert-box error" id="loginError" style="display:none;" role="alert"></div>
            <!-- نموذج كلمة المرور -->
            <div id="passwordSection">
                <form id="loginForm" novalidate>
                    <div class="form-field-group">
                        <label class="field-label" for="email">البريد الإلكتروني <span style="color:var(--danger)">*</span></label>
                        <input type="email" id="email" class="form-input-control" placeholder="أدخل بريدك الإلكتروني" autocomplete="username" required>
                    </div>
                    <div class="form-field-group">
                        <div class="field-label-flex">
                            <label class="field-label" for="password">كلمة المرور <span style="color:var(--danger)">*</span></label>
                            <a href="/auth/forgot-password.html" class="forgot-pass-link">نسيت كلمة المرور؟</a>
                        </div>
                        <input type="password" id="password" class="form-input-control" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
                        <label class="checkbox-toggle-label" for="togglePassword">
                            <input type="checkbox" id="togglePassword"> <i class="fas fa-eye"></i> إظهار كلمة المرور
                        </label>
                    </div>
                    <button type="submit" class="btn-submit-login" id="loginBtn"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
                </form>
            </div>
            <!-- نموذج المصادقة الثنائية (بريد + كلمة مرور) -->
            <div id="totpSection" style="display:none;">
                <p style="margin-bottom:20px; color: var(--gray-700);">أدخل بريدك الإلكتروني وكلمة المرور، ثم أكمل التحقق برمز التطبيق.</p>
                <form id="totpForm" novalidate>
                    <div class="form-field-group">
                        <label class="field-label" for="totpEmail">البريد الإلكتروني <span style="color:var(--danger)">*</span></label>
                        <input type="email" id="totpEmail" class="form-input-control" placeholder="أدخل بريدك الإلكتروني" autocomplete="username" required>
                    </div>
                    <div class="form-field-group">
                        <label class="field-label" for="totpPassword">كلمة المرور <span style="color:var(--danger)">*</span></label>
                        <input type="password" id="totpPassword" class="form-input-control" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
                    </div>
                    <button type="button" class="btn-submit-login" id="totpSubmitBtn">
                        <i class="fas fa-arrow-left"></i> متابعة إلى التحقق
                    </button>
                </form>
            </div>
            <div class="bottom-routing-footer-links">
                <p>ليس لديك حساب؟ <a href="/auth/register/register.html" class="routing-link">إنشاء حساب جديد</a></p>
                <p><a href="/index.html" style="color: var(--gray-500);"><i class="fas fa-arrow-right"></i> العودة للشاشة الرئيسية</a></p>
            </div>
        </div>
        <div class="tera-loader-overlay" id="creativeLoaderScreen" style="display:none;">
            <div class="spinning-infinity-ring"></div>
            <p style="color:#ffffff; font-weight:700;">جاري التحقق...</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/modules/network-monitor.js"></script>
    <script src="/assets/js/modules/security-enforcer.js"></script>

    <!-- ملفات JavaScript المنفصلة لصفحة الدخول -->
    <script src="/auth/auth/login/login-tabs.js"></script>
    <script src="/auth/auth/login/login-password.js"></script>
    <script src="/auth/auth/login/login-totp.js"></script>
</body>
</html>
