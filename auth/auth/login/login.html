<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا | تسجيل الدخول إلى المحفظة الاستثمارية</title>

    <!-- أيقونة الموقع (مسار مطلق) -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="shortcut icon" type="image/x-icon" href="/images/favicon.svg">

    <!-- خطوط Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <!-- مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- الملفات الأساسية CSS (مسارات مطلقة لتجنب 404) -->
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">

    <!-- أنماط مدمجة لصفحة تسجيل الدخول (تجنب 404 لـ login.css) -->
    <style>
        /* ============================================================
           أنماط صفحة تسجيل الدخول (مدمجة لضمان عدم وجود 404)
           ============================================================ */
        .auth-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f4f7fa 0%, #eef2f7 100%);
            padding: 20px;
            direction: rtl;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 50px 40px 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(10, 37, 64, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .auth-card-header { text-align: center; margin-bottom: 30px; }
        .brand-logo-box { margin-bottom: 20px; }
        .brand-logo-box img { width: 80px; height: auto; object-fit: contain; transition: transform 0.3s ease; }
        .brand-logo-box img:hover { transform: scale(1.05); }
        .portal-title { font-size: 24px; font-weight: 800; color: #0A2540; margin-bottom: 4px; letter-spacing: -0.5px; }
        .page-subtitle { font-size: 18px; font-weight: 700; color: #028090; margin-bottom: 10px; }
        .welcome-text { font-size: 14px; color: #64748b; line-height: 1.7; max-width: 360px; margin: 0 auto; }

        .form-field-group { margin-bottom: 20px; }
        .field-label { display: block; font-weight: 600; margin-bottom: 8px; color: #0A2540; font-size: 14px; }
        .field-label .required { color: #DC3545; margin-right: 2px; }
        .field-label-flex { display: flex; justify-content: space-between; align-items: center; }
        .forgot-pass-link { font-size: 13px; color: #028090; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .forgot-pass-link:hover { text-decoration: underline; color: #026b73; }
        .input-wrapper { position: relative; }
        .form-input-control {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px;
            font-family: 'Tajawal', sans-serif; transition: all 0.25s ease; background: #ffffff; color: #1e293b;
            direction: ltr; text-align: right;
        }
        .form-input-control:focus { outline: none; border-color: #028090; box-shadow: 0 0 0 4px rgba(2, 128, 144, 0.10); }
        .form-input-control::placeholder { color: #94a3b8; font-size: 14px; }
        .form-input-control.is-valid-active { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12); }
        .form-input-control.is-invalid-active { border-color: #ef4444; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.12); }
        .error-feedback-msg { font-size: 13px; color: #ef4444; margin-top: 6px; min-height: 20px; }

        .checkbox-options-container { margin-top: 10px; }
        .remember-me-box { margin-top: 5px; margin-bottom: 5px; }
        .checkbox-toggle-label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #475569; cursor: pointer; user-select: none; }
        .checkbox-toggle-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: #028090; cursor: pointer; flex-shrink: 0; }
        .checkbox-toggle-label:hover { color: #0A2540; }

        .form-actions-block { margin-top: 25px; }
        .btn-submit-login {
            width: 100%; padding: 14px 20px; background: linear-gradient(135deg, #0A2540 0%, #028090 100%);
            color: #ffffff; border: none; border-radius: 12px; font-size: 18px; font-weight: 700;
            font-family: 'Tajawal', sans-serif; cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-submit-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(2, 128, 144, 0.35); }
        .btn-submit-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .bottom-routing-footer-links { margin-top: 25px; text-align: center; font-size: 14px; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        .bottom-routing-footer-links p { margin-bottom: 8px; }
        .bottom-routing-footer-links p:last-child { margin-bottom: 0; }
        .routing-link { color: #028090; font-weight: 600; text-decoration: none; transition: color 0.2s; }
        .routing-link:hover { text-decoration: underline; color: #026b73; }
        .routing-link-secondary { color: #64748b; text-decoration: none; transition: color 0.2s; }
        .routing-link-secondary:hover { text-decoration: underline; color: #1e293b; }

        .error-summary-box {
            background: #FEE2E2; border: 1px solid #FCA5A5; border-radius: 12px; padding: 12px 16px;
            display: flex; align-items: center; gap: 12px; color: #991B1B; margin-bottom: 20px;
            animation: shakeError 0.4s ease;
        }
        .error-box-icon { font-size: 20px; flex-shrink: 0; }
        #errorBoxText { font-size: 14px; font-weight: 500; }

        .tera-loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 37, 64, 0.88); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
            animation: fadeInOverlay 0.5s ease;
        }
        .loader-content-card {
            background: #ffffff; border-radius: 24px; padding: 40px 50px 45px;
            max-width: 420px; width: 90%; text-align: center; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
            animation: scaleUp 0.5s ease;
        }
        .spinning-infinity-ring {
            width: 60px; height: 60px; margin: 0 auto 20px;
            border: 6px solid #e2e8f0; border-top-color: #028090; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loader-primary-heading { font-size: 20px; font-weight: 700; color: #0A2540; margin-bottom: 10px; }
        .creative-motivational-text { font-size: 15px; color: #64748b; margin-bottom: 25px; min-height: 60px; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s ease; line-height: 1.6; }
        .loading-progress-track { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .progress-fill-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #028090, #0A2540); border-radius: 10px; transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 576px) {
            .auth-container { padding: 30px 20px 25px; border-radius: 18px; }
            .portal-title { font-size: 20px; }
            .page-subtitle { font-size: 16px; }
            .welcome-text { font-size: 13px; }
            .form-input-control { padding: 10px 14px; font-size: 15px; }
            .btn-submit-login { padding: 12px 16px; font-size: 16px; }
            .loader-content-card { padding: 30px 20px 35px; }
            .loader-primary-heading { font-size: 18px; }
            .brand-logo-box img { width: 65px; }
            .field-label-flex { flex-direction: column; align-items: flex-start; gap: 4px; }
        }
        @media (max-width: 400px) {
            .auth-container { padding: 20px 15px 20px; }
            .bottom-routing-footer-links { font-size: 13px; }
            .creative-motivational-text { font-size: 14px; min-height: 50px; }
        }
        @media (prefers-color-scheme: dark) {
            .auth-layout { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
            .auth-container { background: rgba(30, 41, 59, 0.96); border-color: rgba(71, 85, 105, 0.5); }
            .portal-title { color: #f1f5f9; }
            .welcome-text { color: #94a3b8; }
            .field-label { color: #e2e8f0; }
            .form-input-control { background: #1e293b; border-color: #334155; color: #f1f5f9; }
            .form-input-control:focus { border-color: #14b8a6; box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.15); }
            .form-input-control::placeholder { color: #64748b; }
            .checkbox-toggle-label { color: #94a3b8; }
            .checkbox-toggle-label:hover { color: #e2e8f0; }
            .bottom-routing-footer-links { border-top-color: #334155; color: #94a3b8; }
            .routing-link-secondary { color: #94a3b8; }
            .routing-link-secondary:hover { color: #e2e8f0; }
            .error-summary-box { background: rgba(239, 68, 68, 0.15); border-color: #f87171; color: #fca5a5; }
            .loader-content-card { background: #1e293b; }
            .loader-primary-heading { color: #f1f5f9; }
            .creative-motivational-text { color: #94a3b8; }
            .spinning-infinity-ring { border-color: #334155; border-top-color: #14b8a6; }
            .loading-progress-track { background: #334155; }
            .btn-submit-login { background: linear-gradient(135deg, #0f172a 0%, #14b8a6 100%); }
        }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-container" id="loginCardBlock">
            <div class="auth-card-header text-center">
                <div class="brand-logo-box">
                    <img src="/images/logo.svg" alt="تيرا">
                </div>
                <h2 class="portal-title">بوابة المستثمر - تيرا</h2>
                <h3 class="page-subtitle">تسجيل الدخول الموحد</h3>
                <p class="welcome-text">مرحباً بك مجدداً. سجل دخولك للوصول إلى محفظتك الاستثمارية الذكية.</p>
            </div>

            <!-- صندوق الأخطاء -->
            <div class="error-summary-box" id="loginErrorBox" style="display: none;">
                <span class="error-box-icon">❌</span>
                <span id="errorBoxText">البيانات المدخلة غير متطابقة مع سجلات المستثمرين.</span>
            </div>

            <form id="teraLoginForm" novalidate>
                <!-- حقل اسم المستخدم / البريد / الجوال -->
                <div class="form-field-group">
                    <label class="field-label">اسم المستخدم / البريد الإلكتروني / الجوال <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="login_identifier" class="form-input-control" 
                               placeholder="أدخل اسم المستخدم، البريد، أو الجوال" 
                               autocomplete="username" required>
                    </div>
                    <div class="error-feedback-msg" id="identifier-error"></div>
                </div>

                <!-- حقل كلمة المرور -->
                <div class="form-field-group">
                    <div class="field-label-flex">
                        <label class="field-label">كلمة المرور <span class="required">*</span></label>
                        <a href="/auth/forgot-password.html" class="forgot-pass-link">نسيت كلمة المرور؟</a>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="login_password" class="form-input-control" 
                               placeholder="أدخل كلمة المرور" 
                               autocomplete="current-password" required>
                    </div>
                    <div class="checkbox-options-container">
                        <label class="checkbox-toggle-label">
                            <input type="checkbox" id="show_login_password"> إظهار كلمة المرور
                        </label>
                    </div>
                    <div class="error-feedback-msg" id="password-error"></div>
                </div>

                <!-- تذكرني -->
                <div class="form-field-group remember-me-box">
                    <label class="checkbox-toggle-label">
                        <input type="checkbox" id="remember_me"> تذكرني على هذا الجهاز
                    </label>
                </div>

                <!-- زر الإرسال -->
                <div class="form-actions-block">
                    <button type="submit" class="btn-submit-login" id="loginSubmitBtn">
                        <i class="fa-solid fa-lock"></i> تسجيل الدخول الآمن
                    </button>
                </div>
            </form>

            <div class="bottom-routing-footer-links text-center">
                <p>ليس لديك حساب؟ <a href="/auth/register/register.html" class="routing-link">إنشاء حساب جديد</a></p>
                <p><a href="/index.html" class="routing-link-secondary"><i class="fa-solid fa-arrow-right"></i> العودة للشاشة الرئيسية</a></p>
            </div>
        </div>

        <!-- شاشة التحميل -->
        <div class="tera-loader-overlay" id="creativeLoaderScreen">
            <div class="loader-content-card">
                <div class="spinning-infinity-ring"></div>
                <h4 class="loader-primary-heading">مرحباً بك في أفق تيرا</h4>
                <p class="creative-motivational-text" id="creativeQuoteText">جاري مصادقة بياناتك الاستثمارية...</p>
                <div class="loading-progress-track">
                    <div class="progress-fill-bar" id="progressFillBar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== تحميل ملفات JavaScript بالترتيب الصحيح (مسارات مطلقة) ====== -->
    <script src="/assets/js/core.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/login.js"></script>

    <!-- ====== سكريبت إضافي للتأكد من تهيئة الصفحة ومنع الحلقات ====== -->
    <script>
        (function() {
            'use strict';

            console.log('🚀 [login.html] تم تحميل صفحة تسجيل الدخول');

            // 1. تنظيف المفاتيح القديمة التي قد تسبب تعارضاً
            if (localStorage.getItem('tera_auth_token') || localStorage.getItem('tera_user_data')) {
                console.warn('🧹 [login.html] تنظيف المفاتيح القديمة...');
                localStorage.removeItem('tera_auth_token');
                localStorage.removeItem('tera_user_data');
            }

            // 2. تعطيل التوجيه التلقائي في auth.js (منع الحلقات)
            if (window.TeraAuth && typeof TeraAuth.disableAutoRedirect === 'function') {
                TeraAuth.disableAutoRedirect();
                console.log('🔒 [login.html] تم تعطيل التوجيه التلقائي مؤقتاً');
            }

            // 3. إذا كان المستخدم مسجلاً بالفعل، نوجهه للوحة التحكم (تجاوز الحلقات)
            if (localStorage.getItem('tera_token')) {
                console.log('👤 [login.html] مستخدم مسجل بالفعل، يتم التوجيه للوحة التحكم');
                window.location.replace('/pages/dashboard/index.html');
                return;
            }

            // 4. بعد تحميل الصفحة، نعيد تفعيل checkSession جزئياً
            window.addEventListener('load', function() {
                console.log('✅ [login.html] الصفحة جاهزة، انتظار إدخال البيانات');
                // نترك التوجيه معطلاً حتى يتم تسجيل الدخول بنجاح
            });

            // 5. معالجة أي محاولة لتسجيل الخروج من صفحة الدخول
            document.addEventListener('click', function(e) {
                const logoutBtn = e.target.closest('.logout-btn, .btn-logout, #btn-logout');
                if (logoutBtn) {
                    e.preventDefault();
                    console.log('🔒 [login.html] محاولة تسجيل خروج من صفحة الدخول - تم تجاهلها');
                    // في صفحة الدخول، نقوم فقط بتنظيف التخزين وإعادة التحميل
                    localStorage.removeItem('tera_token');
                    localStorage.removeItem('tera_user');
                    window.location.reload();
                }
            });

        })();
    </script>

</body>
</html>
