<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | تيرا</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">
    <link rel="stylesheet" href="/auth/auth/login/login.css">
    <style>
        :root {
            --primary: #028090;
            --primary-dark: #0A1B3F;
            --danger: #dc2626;
            --gray-50: #f8fafc;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gray-900: #0A1B3F;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f1f5f9;
            margin: 0;
            color: #1e293b;
        }
        .auth-layout {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f9ff, #e6f7f5);
            padding: 20px;
        }
        .auth-container {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: var(--radius-xl);
            padding: 40px 32px 32px;
            box-shadow: 0 20px 60px rgba(2, 128, 144, 0.12);
        }
        .brand-logo-box { text-align: center; margin-bottom: 20px; }
        .brand-logo-box img { height: 52px; width: auto; }
        .portal-title { font-family: 'Cairo', sans-serif; font-size: 24px; font-weight: 800; color: var(--gray-900); text-align: center; margin: 0 0 4px; }
        .page-subtitle { font-size: 18px; font-weight: 700; color: var(--primary); text-align: center; margin: 0 0 8px; }
        .welcome-text { font-size: 14px; color: var(--gray-500); text-align: center; margin: 0 0 32px; line-height: 1.6; }
        .form-field-group { margin-bottom: 20px; }
        .field-label { display: block; font-weight: 700; font-size: 14px; color: #1e293b; margin-bottom: 6px; }
        .field-label-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .form-input-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: var(--gray-50);
            color: var(--gray-900);
        }
        .form-input-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(2, 128, 144, 0.10);
            background: #fff;
            outline: none;
        }
        .forgot-pass-link {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
        }
        .forgot-pass-link:hover { color: var(--primary-dark); text-decoration: underline; }
        .checkbox-toggle-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--gray-700);
            cursor: pointer;
            margin-top: 8px;
        }
        .checkbox-toggle-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .btn-submit-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #0d9488);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(2, 128, 144, 0.35); }
        .btn-submit-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
        .bottom-routing-footer-links {
            margin-top: 28px;
            border-top: 1px solid var(--gray-200);
            padding-top: 20px;
            text-align: center;
            font-size: 14px;
            color: var(--gray-500);
        }
        .bottom-routing-footer-links p { margin: 8px 0; }
        .routing-link { color: var(--primary); font-weight: 700; text-decoration: none; }
        .routing-link:hover { color: var(--primary-dark); text-decoration: underline; }
        .alert-box {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 14px;
        }
        .alert-box.show { display: flex; }
        .alert-box.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
        .tera-loader-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 27, 63, 0.7);
            backdrop-filter: blur(6px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinning-infinity-ring {
            width: 56px;
            height: 56px;
            border: 5px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .auth-container { padding: 32px 24px 24px; }
            .portal-title { font-size: 20px; }
            .page-subtitle { font-size: 16px; }
            .welcome-text { font-size: 13px; margin-bottom: 24px; }
            .form-input-control { font-size: 14px; padding: 12px 14px; }
            .btn-submit-login { padding: 14px; font-size: 15px; }
        }
        @media (max-width: 480px) {
            .auth-layout { padding: 10px; }
            .auth-container { padding: 24px 16px 20px; border-radius: 16px; }
            .brand-logo-box img { height: 40px; }
            .portal-title { font-size: 18px; }
            .page-subtitle { font-size: 14px; }
            .welcome-text { font-size: 12px; margin-bottom: 20px; }
            .form-field-group { margin-bottom: 16px; }
            .field-label { font-size: 13px; }
            .form-input-control { font-size: 13px; padding: 10px 12px; }
            .btn-submit-login { font-size: 14px; padding: 12px; }
            .bottom-routing-footer-links { font-size: 13px; margin-top: 20px; padding-top: 16px; }
            .forgot-pass-link { font-size: 12px; }
            .spinning-infinity-ring { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-container">
            <div class="brand-logo-box">
                <img src="/images/logo.svg" alt="تيرا" onerror="this.src='data:image/svg+xml,...'">
            </div>
            <h2 class="portal-title">بوابة المستثمر - تيرا</h2>
            <h3 class="page-subtitle">تسجيل الدخول الآمن</h3>
            <p class="welcome-text">أدخل بريدك الإلكتروني وكلمة المرور، ثم سنرسل لك رمز تحقق للدخول.</p>
            <div class="alert-box" id="loginError"></div>
            <form id="loginForm" novalidate>
                <div class="form-field-group">
                    <label class="field-label" for="email">البريد الإلكتروني <span style="color:var(--danger)">*</span></label>
                    <input type="email" id="email" class="form-input-control" placeholder="أدخل بريدك الإلكتروني" autocomplete="username" required>
                </div>
                <div class="form-field-group">
                    <div class="field-label-flex">
                        <label class="field-label" for="password">كلمة المرور <span style="color:var(--danger)">*</span></label>
                        <a href="/auth/forgot-password.html" class="forgot-pass-link">نسيت كلمة المرور؟</a>
                    </div>
                    <input type="password" id="password" class="form-input-control" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
                    <label class="checkbox-toggle-label" for="togglePassword">
                        <input type="checkbox" id="togglePassword"> <i class="fas fa-eye"></i> إظهار كلمة المرور
                    </label>
                </div>
                <button type="submit" class="btn-submit-login" id="loginBtn"><i class="fas fa-paper-plane"></i> إرسال رمز التحقق</button>
            </form>
            <div class="bottom-routing-footer-links">
                <p>ليس لديك حساب؟ <a href="/auth/register/register.html" class="routing-link">إنشاء حساب جديد</a></p>
                <p><a href="/index.html" style="color: var(--gray-500);"><i class="fa-solid fa-arrow-right"></i> العودة للشاشة الرئيسية</a></p>
            </div>
        </div>
        <div class="tera-loader-overlay" id="creativeLoaderScreen">
            <div class="spinning-infinity-ring"></div>
            <p style="color:#fff; font-weight:700;">جاري التحقق...</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/security.js"></script>
    <script src="/auth/auth/login/login.js"></script>
</body>
</html>
