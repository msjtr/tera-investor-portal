<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="إعادة تعيين كلمة المرور - تيرا">

    <title>إعادة تعيين كلمة المرور | تيرا</title>

    <link rel="stylesheet"
          href="/assets/css/app.css">

    <link rel="stylesheet"
          href="/assets/css/responsive.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-logo">
                TERA
            </div>

            <h1>
                إعادة تعيين كلمة المرور
            </h1>

            <p>
                أدخل كلمة المرور الجديدة لحسابك
            </p>

            <form id="resetPasswordForm">

                <div class="form-group">

                    <label for="newPassword">
                        كلمة المرور الجديدة
                    </label>

                    <input
                        type="password"
                        id="newPassword"
                        name="newPassword"
                        placeholder="********"
                        required>

                </div>

                <div class="form-group">

                    <label for="confirmPassword">
                        تأكيد كلمة المرور
                    </label>

                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="********"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn-primary">

                    حفظ كلمة المرور

                </button>

            </form>

            <div class="auth-footer">

                <a href="/auth/login.html">
                    العودة إلى تسجيل الدخول
                </a>

            </div>

        </div>

    </div>

    <script>

        document
        .getElementById('resetPasswordForm')
        .addEventListener(
            'submit',
            function(e){

                e.preventDefault();

                const password =
                document.getElementById(
                    'newPassword'
                ).value;

                const confirmPassword =
                document.getElementById(
                    'confirmPassword'
                ).value;

                if(password !== confirmPassword){

                    alert(
                        'كلمتا المرور غير متطابقتين'
                    );

                    return;

                }

                alert(
                    'تم تغيير كلمة المرور بنجاح'
                );

                window.location.href =
                '/auth/login.html';

            }
        );

    </script>

</body>

</html>
