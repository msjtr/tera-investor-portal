<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>التحقق من الرمز | تيرا</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- أيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ملفات CSS الأساسية -->
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">

    <!-- ======== إضافة سكربتات OneSignal ======== -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script src="/assets/js/onesignal-init.js" defer></script>
    <!-- ======================================== -->

    <style>
        :root {
            --primary: #028090;
            --primary-dark: #0A1B3F;
            --danger: #dc2626;
            --success: #059669;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #d1d9e6;
            --gray-500: #64748b;
            --gray-700: #334155;
            --gray-900: #0A1B3F;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--gray-100);
            font-family: 'Tajawal', 'Cairo', sans-serif;
            margin: 0;
            color: var(--gray-900);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .focused-header {
            background: #ffffff;
            border-bottom: 1px solid var(--gray-200);
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            min-height: 60px;
            width: 100%;
        }
        .focused-header .logo img { height: 44px; width: auto; display: block; }
        .client-info { display: flex; align-items: center; gap: 12px; }
        .client-info h5 {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            color: var(--primary-dark);
            font-weight: 800;
        }
        .avatar {
            width: 38px;
            height: 38px;
            background: var(--primary-dark);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            border: 2px solid var(--primary);
            flex-shrink: 0;
        }

        .page-subheader {
            background: var(--primary-dark);
            padding: 16px 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-subheader h1 {
            margin: 0;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-subheader h1 i { color: #5eead4; }
        .btn-back {
            background: rgba(255,255,255,0.1);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-back:hover { background: var(--primary); border-color: var(--primary); }

        .content-container {
            max-width: 520px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
            width: 100%;
        }
        .auth-card {
            background: #ffffff;
            border-radius: var(--radius-xl);
            padding: 36px 28px 32px 28px;
            box-shadow: 0 25px 50px rgba(2,128,144,0.08);
            border: 1px solid var(--gray-200);
        }
        .text-center { text-align: center; }

        .otp-icon-circle {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            color: var(--success);
            box-shadow: 0 8px 20px rgba(5,150,105,0.15);
            border: 3px solid rgba(255,255,255,0.8);
        }
        .portal-title {
            color: var(--primary-dark);
            font-weight: 800;
            margin-bottom: 10px;
            font-size: 22px;
        }
        .instruction-wrapper {
            margin-bottom: 24px;
            background: var(--gray-50);
            padding: 12px 14px;
            border-radius: var(--radius-md);
            border-right: 4px solid var(--primary);
        }
        #instructionText {
            font-size: 14px;
            color: var(--gray-700);
            line-height: 1.6;
            margin-bottom: 6px;
        }
        #instructionEmailText {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-dark);
            word-break: break-all;
            direction: ltr;
            display: block;
            text-align: right;
            background: var(--gray-200);
            padding: 4px 10px;
            border-radius: 6px;
            margin-top: 8px;
        }

        .alert-box {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 14px;
        }
        .alert-box.show { display: flex; }
        .alert-box.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
        .alert-box.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }

        .otp-fields-container {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            direction: ltr;
        }
        .otp-input {
            width: 42px;
            height: 54px;
            text-align: center;
            font-weight: 800;
            font-size: 20px;
            border: 2px solid var(--gray-300);
            border-radius: var(--radius-sm);
            background: #ffffff;
            transition: 0.25s;
            caret-color: var(--primary);
            font-family: 'Tajawal', sans-serif;
            outline: none;
            direction: ltr;
            color: var(--gray-900);
        }
        .otp-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(2,128,144,0.1);
            background: #f0fdfa;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, #0d9488 100%);
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 16px rgba(2,128,144,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
            font-family: inherit;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #0d9488 0%, var(--primary-dark) 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(2,128,144,0.3);
        }
        .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

        .timer-container {
            text-align: center;
            font-size: 14px;
            color: var(--gray-500);
            font-weight: 600;
            margin-bottom: 16px;
        }
        #otpTimer { color: var(--primary); font-weight: 800; direction: ltr; display: inline-block; }

        .btn-resend {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            background: rgba(2,128,144,0.04);
            text-decoration: none;
            margin-top: 6px;
            border: none;
            font-family: inherit;
        }
        .btn-resend:hover { background: rgba(2,128,144,0.1); color: var(--primary-dark); }
        .btn-resend:disabled { color: #94a3b8; pointer-events: none; cursor: not-allowed; background: var(--gray-100); }

        .page-footer {
            text-align: center;
            padding: 16px 20px;
            color: #94a3b8;
            font-size: 13px;
            border-top: 1px solid var(--gray-200);
            background: #ffffff;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .focused-header { padding: 8px 16px; }
            .focused-header .logo img { height: 36px; }
            .client-info h5 { font-size: 13px; }
            .avatar { width: 32px; height: 32px; font-size: 14px; }
            .page-subheader { padding: 12px 16px; }
            .page-subheader h1 { font-size: 18px; }
            .content-container { padding: 0 12px; margin: 24px auto; }
            .auth-card { padding: 24px 18px 22px 18px; border-radius: 20px; }
            .otp-icon-circle { width: 60px; height: 60px; font-size: 26px; margin-bottom: 16px; }
            .portal-title { font-size: 19px; margin-bottom: 8px; }
            .instruction-wrapper { padding: 10px 12px; margin-bottom: 20px; }
            #instructionText { font-size: 13px; }
            #instructionEmailText { font-size: 13px; padding: 4px 8px; }
            .otp-input { width: 36px; height: 46px; font-size: 17px; }
            .btn-submit { padding: 13px 16px; font-size: 14px; margin-bottom: 20px; }
            .timer-container { font-size: 13px; margin-bottom: 14px; }
            .btn-resend { font-size: 13px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <header class="focused-header no-print">
        <div class="logo">
            <img src="/images/logo.svg" alt="تيرا">
        </div>
        <div class="client-info">
            <h5 id="headerUserName">مستخدم</h5>
            <div class="avatar" id="headerAvatar">م</div>
        </div>
    </header>

    <div class="page-subheader no-print">
        <h1><i class="fas fa-envelope-open-text"></i> التحقق من الرمز</h1>
        <a href="/auth/auth/login/login.html" class="btn-back" id="backLink">
            <i class="fas fa-arrow-right"></i> العودة
        </a>
    </div>

    <main class="content-container">
        <div class="auth-card">
            <div class="text-center">
                <div class="otp-icon-circle">
                    <i class="fas fa-envelope-open-text"></i>
                </div>
                <h2 class="portal-title">التحقق من الرمز</h2>
            </div>

            <div class="instruction-wrapper">
                <p id="instructionText">أدخل رمز التحقق المكون من 8 أرقام المرسل إلى بريدك الإلكتروني</p>
                <span id="instructionEmailText"></span>
            </div>

            <div id="otpError" class="alert-box error" role="alert"></div>
            <div id="otpSuccess" class="alert-box success" role="alert"></div>

            <div class="otp-fields-container" id="otpFieldsContainer">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            </div>

            <button type="button" id="verifyOtpBtn" class="btn-submit" disabled>
                <i class="fas fa-check-circle"></i> تأكيد الرمز والمتابعة
            </button>

            <div class="timer-container" id="timerContainer">
                <span>يمكنك إعادة الإرسال بعد </span>
                <span id="otpTimer">05:00</span>
            </div>

            <div class="text-center">
                <button id="resendOtpBtn" class="btn-resend" disabled>
                    <i class="fas fa-redo-alt"></i> إعادة إرسال الرمز
                </button>
            </div>
        </div>
    </main>

    <footer class="page-footer no-print">
        © 2026 بوابة تيرا للمستثمرين. جميع الحقوق محفوظة.
    </footer>

    <!-- السكربتات الأساسية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/modules/session-manager.js"></script>

    <!-- ملف الجافا سكريبت المستقل لصفحة OTP البريدية (8 أرقام) -->
    <script src="/assets/js/verify-otp.js"></script>
</body>
</html>
