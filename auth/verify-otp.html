<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الرمز | تيرا</title>

    <!-- أيقونات وخطوط -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <!-- ملفات التنسيق الأساسية -->
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">

    <!-- أيقونة الموقع -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

    <style>
        :root {
            --tera-teal: #028090;
            --tera-navy: #0A1B3F;
        }

        .auth-layout {
            background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px 32px 32px 32px;
            box-shadow: 0 25px 50px rgba(2, 128, 144, 0.08);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .otp-icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            color: #059669;
            box-shadow: 0 8px 20px rgba(5, 150, 105, 0.15);
            border: 3px solid rgba(255,255,255,0.8);
        }

        .portal-title {
            color: var(--tera-navy);
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 24px;
        }

        #instructionText {
            font-size: 14px;
            color: #475569;
            margin-bottom: 24px;
            line-height: 1.6;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border-right: 4px solid var(--tera-teal);
            word-break: break-all;
        }

        /* حقل OTP واحد بتنسيق أنيق */
        .otp-input {
            width: 100%;
            padding: 16px 18px;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 800;
            font-size: 24px;
            direction: ltr;
            border: 2px solid #d1d9e6;
            border-radius: 14px;
            background: #ffffff;
            transition: 0.25s;
            caret-color: var(--tera-teal);
            font-family: 'Tajawal', sans-serif;
        }

        .otp-input:focus {
            border-color: var(--tera-teal);
            box-shadow: 0 0 0 4px rgba(2,128,144,0.10);
            background: #f0fdfa;
            outline: none;
        }

        /* مؤقت */
        .timer-container {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
            font-weight: 600;
        }

        #timerDisplay {
            color: var(--tera-teal);
            font-weight: 800;
            direction: ltr;
            display: inline-block;
        }

        .resend-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--tera-teal);
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 8px;
            background: rgba(2,128,144,0.04);
            text-decoration: none;
        }

        .resend-link:hover {
            background: rgba(2,128,144,0.1);
            color: #0A1B3F;
        }

        .resend-link.disabled {
            color: #94a3b8;
            pointer-events: none;
            cursor: not-allowed;
            background: #f1f5f9;
        }

        .btn-submit-login {
            background: linear-gradient(135deg, var(--tera-teal) 0%, #0d9488 100%);
            border: none;
            color: white;
            padding: 15px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 16px rgba(2,128,144,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit-login:hover {
            background: linear-gradient(135deg, #0d9488 0%, var(--tera-navy) 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(2,128,144,0.3);
        }

        .btn-submit-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            color: #64748b;
            font-size: 14px;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--tera-navy);
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 28px 16px 24px 16px;
                border-radius: 20px;
            }
            .otp-input {
                font-size: 20px;
                letter-spacing: 8px;
                padding: 14px 12px;
            }
            .btn-submit-login {
                padding: 13px 18px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-container">
            <div class="text-center mb-3">
                <img src="/images/logo.svg" alt="تيرا" class="logo-img" style="height:40px; margin-bottom:16px;">
                <div class="otp-icon-circle">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2 class="portal-title">التحقق من الرمز</h2>
                <p id="instructionText">أدخل رمز التحقق المكون من 6 أرقام المرسل إلى بريدك الإلكتروني</p>
            </div>

            <div class="alert-box" id="formAlert" style="display: none;">
                <span class="alert-icon" id="alertIcon"><i class="fas fa-exclamation-circle"></i></span>
                <span id="alertMessage"></span>
            </div>

            <form id="otpForm" novalidate>
                <div class="form-field-group">
                    <input type="text" id="otp" class="form-input-control otp-input" maxlength="6"
                           placeholder="000000" autocomplete="one-time-code" inputmode="numeric" required>
                    <div class="error-feedback-msg" id="otp-error"></div>
                </div>

                <div class="form-actions-block">
                    <button type="submit" id="submitBtn" class="btn-submit-login">
                        <i class="fas fa-check-circle"></i> تأكيد الرمز والمتابعة
                    </button>
                </div>
            </form>

            <!-- المؤقت وإعادة الإرسال -->
            <div class="timer-container" id="timerContainer">
                <span>يمكنك إعادة الإرسال بعد </span>
                <span id="timerDisplay">01:00</span>
            </div>

            <div class="text-center mt-3">
                <span id="resendCode" class="resend-link disabled">
                    <i class="fas fa-redo-alt"></i> إعادة إرسال الرمز
                </span>
            </div>

            <div class="text-center mt-3">
                <a href="#" id="backLink" class="back-link">
                    <i class="fas fa-arrow-right"></i> <span id="backLinkText">العودة لتسجيل الدخول</span>
                </a>
            </div>
        </div>

        <div class="tera-loader-overlay" id="creativeLoaderScreen" style="display: none;">
            <div class="loader-content-card">
                <div class="spinning-infinity-ring"></div>
                <h4>جاري التحقق من الرمز</h4>
                <p>يرجى الانتظار...</p>
                <div class="loading-progress-track">
                    <div class="progress-fill-bar" id="progressFillBar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ملفات الجافاسكريبت الأساسية فقط (بدون أي كود داخلي) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/verify-otp.js"></script>
</body>
</html>
