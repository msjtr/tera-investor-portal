<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الرمز | تيرا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <style>
        .otp-input {
            text-align: center;
            letter-spacing: 8px;
            font-weight: bold;
            font-size: 26px;
            direction: ltr;
        }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-container">
            <div class="text-center mb-5">
                <img src="/images/logo.svg" alt="تيرا" class="logo-img">
                <h2 class="portal-title mt-3">التحقق من الرمز</h2>
                <p id="instructionText">أدخل رمز التحقق المكون من 6 أرقام</p>
            </div>
            <div class="alert-box" id="formAlert" style="display: none;">
                <span class="alert-icon" id="alertIcon"><i class="fas fa-exclamation-circle"></i></span>
                <span id="alertMessage"></span>
            </div>
            <form id="otpForm" novalidate>
                <div class="form-field-group">
                    <label>رمز التحقق</label>
                    <div class="input-wrapper">
                        <input type="text" id="otp" class="form-input-control otp-input" maxlength="6"
                               placeholder="000000" autocomplete="one-time-code" inputmode="numeric" required>
                    </div>
                    <div class="error-feedback-msg" id="otp-error"></div>
                </div>
                <div class="form-actions-block">
                    <button type="submit" id="submitBtn" class="btn-submit-login">
                        <i class="fas fa-check-circle"></i> تأكيد الرمز
                    </button>
                </div>
            </form>
            <div class="text-center mt-3">
                <span id="resendCode" class="resend-link"><i class="fas fa-redo-alt"></i> إعادة الإرسال</span>
            </div>
            <div class="text-center mt-4">
                <a href="/auth/auth/login/login.html"><i class="fas fa-arrow-right"></i> العودة لتسجيل الدخول</a>
            </div>
        </div>
        <div class="tera-loader-overlay" id="creativeLoaderScreen" style="display: none;">
            <div class="loader-content-card">
                <div class="spinning-infinity-ring"></div>
                <h4>جاري التحقق...</h4>
                <div class="loading-progress-track">
                    <div class="progress-fill-bar" id="progressFillBar"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/verify-otp.js"></script>
</body>
</html>
