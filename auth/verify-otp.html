<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الرمز | تيرا</title>

    <!-- أيقونات وخطوط -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <!-- ملفات التنسيق الأساسية -->
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/auth.css">

    <!-- أيقونة الموقع -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

    <style>
        :root {
            --tera-teal: #028090;
            --tera-navy: #0A1B3F;
        }

        body {
            background-color: #f1f5f9;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .focused-header {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            min-height: 60px;
            width: 100%;
        }

        .focused-header .logo img {
            height: 44px;
            width: auto;
            display: block;
        }

        .header-client-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-client-info h5 {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            color: #0A1B3F;
            font-weight: 800;
        }

        .header-client-info .avatar {
            width: 38px;
            height: 38px;
            background: #0A1B3F;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            border: 2px solid #028090;
            flex-shrink: 0;
        }

        .page-title-section {
            background: #0A1B3F;
            padding: 16px 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-title-section h1 {
            margin: 0;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title-section h1 i {
            color: #5eead4;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.10);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-back:hover {
            background: #028090;
            border-color: #028090;
        }

        .content-container {
            max-width: 520px;
            margin: 40px auto;
            padding: 0 24px;
            flex: 1;
            width: 100%;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 32px 36px 32px;
            box-shadow: 0 25px 50px rgba(2, 128, 144, 0.08);
            border: 1px solid #e2e8f0;
        }

        .otp-icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            color: #059669;
            box-shadow: 0 8px 20px rgba(5, 150, 105, 0.15);
            border: 3px solid rgba(255,255,255,0.8);
        }

        .portal-title {
            color: var(--tera-navy);
            font-weight: 800;
            margin-bottom: 12px;
            font-size: 24px;
            text-align: center;
        }

        .instruction-wrapper {
            margin-bottom: 28px;
            background: #f8fafc;
            padding: 14px 16px;
            border-radius: 12px;
            border-right: 4px solid var(--tera-teal);
        }

        #instructionMainText {
            font-size: 15px;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 6px;
        }

        #instructionEmailText {
            font-size: 15px;
            font-weight: 700;
            color: var(--tera-navy);
            word-break: break-all;
            direction: ltr;
            display: block;
            text-align: right;
            background: #e2e8f0;
            padding: 4px 10px;
            border-radius: 6px;
            margin-top: 8px;
        }

        .alert-box {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 14px;
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }

        .alert-box.show {
            display: flex;
        }

        .otp-input {
            width: 100%;
            padding: 16px 18px;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 800;
            font-size: 24px;
            direction: ltr;
            border: 2px solid #d1d9e6;
            border-radius: 14px;
            background: #ffffff;
            transition: 0.25s;
            caret-color: var(--tera-teal);
            font-family: 'Tajawal', sans-serif;
            margin-bottom: 8px;
        }

        .otp-input:focus {
            border-color: var(--tera-teal);
            box-shadow: 0 0 0 4px rgba(2,128,144,0.10);
            background: #f0fdfa;
            outline: none;
        }

        .error-feedback-msg {
            color: #dc2626;
            font-size: 13px;
            min-height: 20px;
            margin-bottom: 16px;
        }

        .btn-submit-login {
            background: linear-gradient(135deg, var(--tera-teal) 0%, #0d9488 100%);
            border: none;
            color: white;
            padding: 15px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 16px rgba(2,128,144,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .btn-submit-login:hover {
            background: linear-gradient(135deg, #0d9488 0%, var(--tera-navy) 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(2,128,144,0.3);
        }

        .btn-submit-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .timer-container {
            text-align: center;
            font-size: 15px;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 20px;
        }

        #timerDisplay {
            color: var(--tera-teal);
            font-weight: 800;
            direction: ltr;
            display: inline-block;
        }

        .resend-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--tera-teal);
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 8px;
            background: rgba(2,128,144,0.04);
            text-decoration: none;
            margin-top: 8px;
        }

        .resend-link:hover {
            background: rgba(2,128,144,0.1);
            color: #0A1B3F;
        }

        .resend-link.disabled {
            color: #94a3b8;
            pointer-events: none;
            cursor: not-allowed;
            background: #f1f5f9;
        }

        .page-footer {
            text-align: center;
            padding: 18px 20px;
            color: #94a3b8;
            font-size: 13px;
            border-top: 1px solid #e2e8f0;
            background: #ffffff;
            margin-top: auto;
        }

        @media (max-width: 576px) {
            .focused-header { padding: 8px 16px; }
            .focused-header .logo img { height: 36px; }
            .header-client-info h5 { font-size: 13px; }
            .header-client-info .avatar { width: 32px; height: 32px; font-size: 14px; }
            .page-title-section { padding: 14px 16px; }
            .page-title-section h1 { font-size: 19px; }
            .content-container { padding: 0 12px; margin: 20px auto; }
            .auth-card { padding: 24px 16px 20px 16px; border-radius: 20px; }
            .otp-icon-circle { width: 64px; height: 64px; font-size: 28px; margin-bottom: 20px; }
            .portal-title { font-size: 20px; margin-bottom: 8px; }
            .instruction-wrapper { padding: 12px; margin-bottom: 20px; }
            #instructionMainText { font-size: 14px; }
            #instructionEmailText { font-size: 14px; padding: 4px 8px; }
            .otp-input { font-size: 20px; letter-spacing: 8px; padding: 14px 12px; margin-bottom: 8px; }
            .btn-submit-login { padding: 13px 18px; font-size: 15px; margin-bottom: 24px; }
            .timer-container { font-size: 14px; margin-bottom: 16px; }
            .resend-link { font-size: 14px; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <!-- هيدر علوي مع الشعار واسم العميل -->
    <header class="focused-header no-print">
        <div class="logo">
            <img src="/images/logo.svg" alt="تيرا" onerror="this.src='https://via.placeholder.com/120x35/028090/fff?text=Tera'">
        </div>
        <div class="header-client-info">
            <h5 id="headerUserName">مستخدم</h5>
            <div class="avatar" id="headerAvatar">م</div>
        </div>
    </header>

    <!-- عنوان الصفحة وزر العودة -->
    <div class="page-title-section no-print">
        <h1><i class="fas fa-shield-alt"></i> التحقق من الرمز</h1>
        <a href="#" id="backLink" class="btn-back">
            <i class="fas fa-arrow-right"></i> <span id="backLinkText">العودة</span>
        </a>
    </div>

    <!-- المحتوى -->
    <main class="content-container">
        <div class="auth-card">
            <div class="text-center">
                <div class="otp-icon-circle">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2 class="portal-title">التحقق من الرمز</h2>
            </div>

            <!-- تعليمات مع البريد في سطر منفصل -->
            <div class="instruction-wrapper">
                <p id="instructionMainText">أدخل رمز التحقق المكون من 8 أرقام المرسل إلى بريدك الإلكتروني</p>
                <span id="instructionEmailText">example@domain.com</span>
            </div>

            <!-- صندوق التنبيهات -->
            <div id="formAlert" class="alert-box">
                <span id="alertIcon"><i class="fas fa-exclamation-circle"></i></span>
                <span id="alertMessage"></span>
            </div>

            <form id="otpForm" novalidate>
                <input type="text" id="otp" class="otp-input" maxlength="8"
                       placeholder="00000000" autocomplete="one-time-code" inputmode="numeric" required>
                <div class="error-feedback-msg" id="otp-error"></div>

                <button type="submit" id="submitBtn" class="btn-submit-login">
                    <i class="fas fa-check-circle"></i> تأكيد الرمز والمتابعة
                </button>
            </form>

            <div class="timer-container" id="timerContainer">
                <span>يمكنك إعادة الإرسال بعد </span>
                <span id="timerDisplay">05:00</span>
            </div>

            <div class="text-center">
                <span id="resendCode" class="resend-link disabled">
                    <i class="fas fa-redo-alt"></i> إعادة إرسال الرمز
                </span>
            </div>
        </div>
    </main>

    <!-- تذييل -->
    <footer class="page-footer no-print">
        © 2026 بوابة تيرا للمستثمرين. جميع الحقوق محفوظة.
    </footer>

    <!-- ملفات الجافاسكريبت الأساسية -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/verify-otp.js"></script>
</body>
</html>
