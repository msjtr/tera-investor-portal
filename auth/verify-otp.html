<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الرمز | تيرا</title>

    <!-- أيقونات وخطوط -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- ملفات التنسيق الأساسية (مسارات نسبية) -->
    <link rel="stylesheet" href="../assets/css/core.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/auth.css">

    <!-- أيقونة الموقع -->
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">

    <style>
        /* الأنماط الخاصة بالصفحة (كما في الكود السابق) */
        :root {
            --tera-teal: #028090;
            --tera-navy: #0A1B3F;
        }
        body {
            background-color: #f1f5f9;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* ... باقي الأنماط كما هي ... */
        /* (تم حذف التكرار للاختصار، لكن يجب تضمين كل الأنماط من الكود الأصلي) */
    </style>
</head>
<body>

    <!-- ===== LOADER OVERLAY ===== -->
    <div id="creativeLoaderScreen">
        <div class="loader-box">
            <div class="loader-spinner"></div>
            <div class="loader-text">جاري التحقق...</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFillBar"></div>
            </div>
        </div>
    </div>

    <!-- ===== HEADER ===== -->
    <header class="focused-header no-print">
        <div class="logo">
            <img src="../images/logo.svg" alt="تيرا" onerror="this.src='https://via.placeholder.com/120x35/028090/fff?text=Tera'">
        </div>
        <div class="header-client-info">
            <h5 id="headerUserName">مستخدم</h5>
            <div class="avatar" id="headerAvatar">م</div>
        </div>
    </header>

    <!-- ===== PAGE TITLE ===== -->
    <div class="page-title-section no-print">
        <h1><i class="fas fa-shield-alt"></i> التحقق من الرمز</h1>
        <a href="#" id="backLink" class="btn-back">
            <i class="fas fa-arrow-right"></i> <span id="backLinkText">العودة</span>
        </a>
    </div>

    <!-- ===== CONTENT ===== -->
    <main class="content-container">
        <div class="auth-card">
            <div class="text-center">
                <div class="otp-icon-circle">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2 class="portal-title">التحقق من الرمز</h2>
            </div>

            <div class="instruction-wrapper">
                <p id="instructionMainText">أدخل رمز التحقق المكون من 8 أرقام المرسل إلى بريدك الإلكتروني</p>
                <span id="instructionEmailText">example@domain.com</span>
            </div>

            <div id="formAlert" class="alert-box">
                <span id="alertIcon"><i class="fas fa-exclamation-circle"></i></span>
                <span id="alertMessage"></span>
            </div>

            <form id="otpForm" novalidate>
                <input type="text" id="otp" class="otp-input" maxlength="8"
                       placeholder="00000000" autocomplete="one-time-code" inputmode="numeric" required>
                <div class="error-feedback-msg" id="otp-error"></div>
                <button type="submit" id="submitBtn" class="btn-submit-login">
                    <i class="fas fa-check-circle"></i> تأكيد الرمز والمتابعة
                </button>
            </form>

            <div class="timer-container" id="timerContainer">
                <span>يمكنك إعادة الإرسال بعد </span>
                <span id="timerDisplay">05:00</span>
            </div>

            <div class="text-center">
                <span id="resendCode" class="resend-link disabled">
                    <i class="fas fa-redo-alt"></i> إعادة إرسال الرمز
                </span>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="page-footer no-print">
        © 2026 بوابة تيرا للمستثمرين. جميع الحقوق محفوظة.
    </footer>

    <!-- ===== جافا سكريبت ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-client.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/verify-otp.js"></script>
</body>
</html>
