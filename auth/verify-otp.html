
```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="التحقق من رمز التفعيل - تيرا">

    <title>التحقق من الرمز | تيرا</title>

    <link rel="stylesheet"
          href="/assets/css/app.css">

    <link rel="stylesheet"
          href="/assets/css/responsive.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-logo">
                TERA
            </div>

            <h1>
                التحقق من الرمز
            </h1>

            <p>
                أدخل رمز التحقق المرسل إلى جوالك أو بريدك الإلكتروني
            </p>

            <form id="otpForm">

                <div class="form-group">

                    <label for="otp">
                        رمز التحقق
                    </label>

                    <input
                        type="text"
                        id="otp"
                        name="otp"
                        maxlength="6"
                        placeholder="000000"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn-primary">

                    تحقق

                </button>

            </form>

            <div class="auth-footer">

                <a href="#"
                   id="resendCode">

                    إعادة إرسال الرمز

                </a>

            </div>

        </div>

    </div>

    <script>

        document
        .getElementById('otpForm')
        .addEventListener(
            'submit',
            function(e){

                e.preventDefault();

                const otp =
                document.getElementById(
                    'otp'
                ).value;

                if(otp.length !== 6){

                    alert(
                        'الرجاء إدخال رمز مكون من 6 أرقام'
                    );

                    return;

                }

                window.location.href =
                '/auth/reset-password.html';

            }
        );

        document
        .getElementById('resendCode')
        .addEventListener(
            'click',
            function(e){

                e.preventDefault();

                alert(
                    'تم إعادة إرسال رمز التحقق'
                );

            }
        );

    </script>

</body>

</html>
```
