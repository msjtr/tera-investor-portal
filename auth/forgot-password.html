```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="استعادة كلمة المرور - تيرا">

    <title>نسيت كلمة المرور | تيرا</title>

    <link rel="stylesheet"
          href="/assets/css/app.css">

    <link rel="stylesheet"
          href="/assets/css/responsive.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-logo">
                TERA
            </div>

            <h1>
                استعادة كلمة المرور
            </h1>

            <p>
                أدخل البريد الإلكتروني أو رقم الجوال لإرسال رمز التحقق
            </p>

            <form id="forgotPasswordForm">

                <div class="form-group">

                    <label for="identity">
                        البريد الإلكتروني أو رقم الجوال
                    </label>

                    <input
                        type="text"
                        id="identity"
                        name="identity"
                        placeholder="البريد الإلكتروني أو رقم الجوال"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn-primary">

                    إرسال رمز التحقق

                </button>

            </form>

            <div class="auth-footer">

                <a href="/auth/login.html">
                    العودة إلى تسجيل الدخول
                </a>

            </div>

        </div>

    </div>

    <script>

        document
        .getElementById('forgotPasswordForm')
        .addEventListener(
            'submit',
            function(e){

                e.preventDefault();

                const identity =
                document.getElementById(
                    'identity'
                ).value;

                if(!identity){

                    alert(
                        'الرجاء إدخال البريد الإلكتروني أو رقم الجوال'
                    );

                    return;

                }

                alert(
                    'تم إرسال رمز التحقق'
                );

                window.location.href =
                '/auth/verify-otp.html';

            }
        );

    </script>

</body>

</html>
```
