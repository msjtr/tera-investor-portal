<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="إنشاء حساب مستثمر جديد - تيرا">

    <title>إنشاء حساب | تيرا</title>

    <link rel="stylesheet"
          href="/assets/css/app.css">

    <link rel="stylesheet"
          href="/assets/css/responsive.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-logo">
                TERA
            </div>

            <h1>
                إنشاء حساب جديد
            </h1>

            <p>
                أدخل بياناتك لإنشاء حساب مستثمر
            </p>

            <form id="registerForm">

                <div class="form-group">

                    <label for="fullName">
                        الاسم الكامل
                    </label>

                    <input
                        type="text"
                        id="fullName"
                        name="fullName"
                        required>

                </div>

                <div class="form-group">

                    <label for="nationalId">
                        رقم الهوية
                    </label>

                    <input
                        type="text"
                        id="nationalId"
                        name="nationalId"
                        maxlength="10"
                        required>

                </div>

                <div class="form-group">

                    <label for="mobile">
                        رقم الجوال
                    </label>

                    <input
                        type="tel"
                        id="mobile"
                        name="mobile"
                        placeholder="05XXXXXXXX"
                        required>

                </div>

                <div class="form-group">

                    <label for="email">
                        البريد الإلكتروني
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        required>

                </div>

                <div class="form-group">

                    <label for="password">
                        كلمة المرور
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        required>

                </div>

                <div class="form-group">

                    <label for="confirmPassword">
                        تأكيد كلمة المرور
                    </label>

                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        required>

                </div>

                <div class="auth-options">

                    <label>

                        <input
                            type="checkbox"
                            id="agreeTerms"
                            required>

                        أوافق على الشروط والأحكام

                    </label>

                </div>

                <button
                    type="submit"
                    class="btn-primary">

                    إنشاء الحساب

                </button>

            </form>

            <div class="auth-footer">

                <span>
                    لديك حساب بالفعل؟
                </span>

                <a href="/auth/login.html">
                    تسجيل الدخول
                </a>

            </div>

        </div>

    </div>

    <script>

        document
        .getElementById('registerForm')
        .addEventListener(
            'submit',
            function(e){

                e.preventDefault();

                const password =
                document.getElementById(
                    'password'
                ).value;

                const confirmPassword =
                document.getElementById(
                    'confirmPassword'
                ).value;

                if(password !== confirmPassword){

                    alert(
                        'كلمتا المرور غير متطابقتين'
                    );

                    return;

                }

                window.location.href =
                '/auth/complete-profile.html';

            }
        );

    </script>

</body>

</html>
